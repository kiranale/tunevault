    /** Render the loaded housekeeping status payload into the container. */
    function renderHousekeepingResult(result) {
        const clients  = result.autotask_clients || [];
        const windows  = result.windows || [];
        const top10    = result.stale_tables_top10 || [];
        const disabledClients = result.disabled_clients || [];
        const disabledWindows = result.disabled_windows || [];

        let html = '';

        // ── Summary banner ──────────────────────────────────────────
        // Stale = enabled but traffic_light is amber or red (not actually running).
        // Disabled = already in disabledClients list (traffic_light red, status DISABLED).
        // Both conditions are problems; only flag stale separately to avoid double-counting.
        const staleClients = clients.filter(c =>
            c.traffic_light !== 'green' && !disabledClients.includes(c.client_name)
        );
        const problemCount = disabledClients.length + disabledWindows.length + staleClients.length;
        if (problemCount === 0) {
            html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:18px;font-size:13px;color:var(--green)">
                <span style="font-size:16px">&#10003;</span>
                All autotask clients and maintenance windows are enabled and have run recently.
            </div>`;
        } else {
            // Use amber styling when there are no hard-disabled issues but stale ones exist.
            const hasDisabled = disabledClients.length > 0 || disabledWindows.length > 0;
            const borderColor = hasDisabled ? 'rgba(248,113,113,0.3)' : 'rgba(251,191,36,0.3)';
            const bgColor     = hasDisabled ? 'rgba(248,113,113,0.06)' : 'rgba(251,191,36,0.06)';
            html += `<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:18px;padding:14px 16px;border-radius:8px;border:1px solid ${borderColor};background:${bgColor}">
                <span style="font-size:16px;flex-shrink:0">&#9888;</span>
                <div style="font-size:13px">
                    <strong>${problemCount} issue${problemCount > 1 ? 's' : ''} found</strong>
                    ${staleClients.length ? `<div style="margin-top:4px;color:var(--text-dim)">${staleClients.length} autotask client${staleClients.length > 1 ? 's' : ''} have not run in the last 7 days: ${staleClients.map(c => '<strong style="color:var(--text)">' + esc(c.client_name) + '</strong>').join(', ')}</div>` : ''}
                    ${disabledClients.length ? `<div style="margin-top:4px;color:var(--text-dim)">Disabled client${disabledClients.length > 1 ? 's' : ''}: ${disabledClients.map(c => '<strong style="color:var(--text)">' + esc(c) + '</strong>').join(', ')}</div>` : ''}
                    ${disabledWindows.length ? `<div style="margin-top:4px;color:var(--text-dim)">Disabled window${disabledWindows.length > 1 ? 's' : ''}: ${disabledWindows.map(w => '<strong style="color:var(--text)">' + esc(w) + '</strong>').join(', ')}</div>` : ''}
                </div>
            </div>`;
        }

        // ── Section 1: Autotask clients ──────────────────────────────
        html += `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-dim);margin-bottom:10px">Automatic Housekeeping Clients</div>`;

        if (clients.length === 0) {
            html += `<div style="font-size:13px;color:var(--text-dim)">DBA_AUTOTASK_CLIENT not accessible with current user privileges.</div>`;
        } else {
            html += `<div style="margin-bottom:24px">`;
            for (const c of clients) {
                const tlClass = c.traffic_light === 'green' ? 'green' : c.traffic_light === 'amber' ? 'amber' : c.traffic_light === 'red' ? 'red' : 'unknown';
                const statusTag = c.status === 'ENABLED' && c.traffic_light === 'green'
                    ? `<span class="maint-tag maint-tag-enabled">ENABLED</span>`
                    : c.status === 'ENABLED' && c.traffic_light === 'amber'
                    ? `<span class="maint-tag maint-tag-amber">STALE</span>`
                    : c.status === 'DISABLED'
                    ? `<span class="maint-tag maint-tag-disabled">DISABLED</span>`
                    : `<span class="maint-tag maint-tag-unknown">${esc(c.status)}</span>`;

                const lastRun = c.last_run_date ? new Date(c.last_run_date).toLocaleString() : '—';
                const durLabel = c.last_run_duration_secs != null
                    ? (c.last_run_duration_secs < 60 ? c.last_run_duration_secs + 's' : Math.round(c.last_run_duration_secs / 60) + 'min')
                    : null;

                const tuningNote = c.tuning_pack_required
                    ? (c.tuning_pack_licensed === false
                        ? `<span style="color:var(--yellow);font-size:11px">&#9888; Tuning Pack not detected — SQL Tuning Advisor results may be limited</span>`
                        : `<span style="font-size:11px;color:var(--text-dim)">Requires Tuning Pack license</span>`)
                    : '';

                html += `<div class="maint-client-row">
                    <div class="maint-traffic-dot ${tlClass}"></div>
                    <div class="maint-client-name">${esc(c.client_name)}</div>
                    ${statusTag}
                    <div class="maint-client-meta">
                        <span>Last run: ${esc(lastRun)}</span>
                        ${c.last_run_status ? `<span>Status: <strong style="color:${c.last_run_status === 'SUCCEEDED' ? 'var(--green)' : 'var(--red)'}">${esc(c.last_run_status)}</strong></span>` : ''}
                        ${durLabel ? `<span>Duration: ${esc(durLabel)}</span>` : ''}
                        <span>7-day runs: ${c.runs_7d}</span>
                        ${c.failures_7d > 0 ? `<span style="color:var(--red)">Failures: ${c.failures_7d}</span>` : ''}
                        ${tuningNote}
                    </div>
                </div>`;
            }
            html += `</div>`;
        }

        // ── Re-enable snippets for disabled clients ──────────────────
        const reenableTargets = clients.filter(c => c.status === 'DISABLED');
        if (reenableTargets.length > 0) {
            const reenableCode = reenableTargets.map(c =>
                `EXEC DBMS_AUTO_TASK_ADMIN.ENABLE(\n  client_name => '${c.client_name}',\n  operation   => NULL,\n  window_name => NULL\n);`
            ).join('\n\n');
            const reenableId = 'maint-reenable-block';
            html += `<div class="maint-enable-block" id="${reenableId}">
                <div class="maint-enable-block-label">Re-enable disabled client${reenableTargets.length > 1 ? 's' : ''} — run as DBA</div>
                <div class="maint-enable-code">${esc(reenableCode)}</div>
                <button class="maint-enable-copy" onclick="copyMaintBlock(this,'${reenableId}')">Copy</button>
            </div>`;
        }

        // ── Section 2: Housekeeping windows ──────────────────────────
        if (windows.length > 0) {
            html += `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-dim);margin-top:28px;margin-bottom:4px">Scheduler Housekeeping Windows</div>`;
            html += `<div style="font-size:12px;color:var(--text-dim);margin-bottom:10px">Oracle runs autotask jobs within these windows. Disabled or zero-duration windows reduce housekeeping capacity.</div>`;
            html += `<div class="maint-window-grid">`;
            for (const w of windows) {
                const dayName = w.window_name.replace('_WINDOW', '');
                const isDisabled = !w.enabled || w.duration_hours === 0;
                html += `<div class="maint-window-card ${isDisabled ? 'disabled' : ''}">
                    <div class="maint-window-name">${esc(dayName)}</div>
                    <div class="maint-window-detail">Duration: <strong style="color:${isDisabled ? 'var(--red)' : 'var(--text)'}">${w.duration_hours}h</strong></div>
                    <div class="maint-window-detail">Status: <strong style="color:${w.enabled ? 'var(--green)' : 'var(--red)'}">${w.enabled ? 'ENABLED' : 'DISABLED'}</strong></div>
                    ${w.next_start_date ? `<div class="maint-window-detail" style="margin-top:4px;font-size:11px">${esc(w.next_start_date)}</div>` : ''}
                </div>`;
            }
            html += `</div>`;

            // Re-enable disabled windows
            const disabledWins = windows.filter(w => !w.enabled);
            if (disabledWins.length > 0) {
                const winCode = disabledWins.map(w =>
                    `EXEC DBMS_SCHEDULER.ENABLE('${w.window_name}');`
                ).join('\n');
                const winBlockId = 'maint-win-reenable';
                html += `<div class="maint-enable-block" id="${winBlockId}" style="margin-top:16px">
                    <div class="maint-enable-block-label">Re-enable disabled window${disabledWins.length > 1 ? 's' : ''}</div>
                    <div class="maint-enable-code">${esc(winCode)}</div>
                    <button class="maint-enable-copy" onclick="copyMaintBlock(this,'${winBlockId}')">Copy</button>
                </div>`;
            }
        }

        // ── Section 3: Stale stats ───────────────────────────────────
        html += `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-dim);margin-top:28px;margin-bottom:6px">Stats Staleness Summary</div>`;

        const staleCount = result.stale_tables_count || 0;
        const staleColor = staleCount === 0 ? 'var(--green)' : staleCount < 10 ? 'var(--yellow)' : 'var(--red)';
        html += `<div style="font-size:13px;margin-bottom:10px">
            Tables with stale stats: <strong style="color:${staleColor}">${staleCount}</strong>
            ${staleCount > 0 ? `<span style="font-size:12px;color:var(--text-dim);margin-left:8px">— optimizer may choose suboptimal plans for these tables</span>` : ''}
        </div>`;

        if (top10.length > 0) {
            html += `<table class="maint-stale-table">
                <thead><tr>
                    <th>Owner</th><th>Table</th><th>Rows</th><th>Last Analyzed</th>
                </tr></thead>
                <tbody>`;
            for (const t of top10) {
                const lastAn = t.last_analyzed || 'Never';
                html += `<tr>
                    <td>${esc(t.owner)}</td>
                    <td>${esc(t.table_name)}</td>
                    <td style="color:var(--text-dim)">${formatNum(t.num_rows)}</td>
                    <td style="color:var(--text-dim)">${esc(lastAn)}</td>
                </tr>`;
            }
            html += `</tbody></table>`;

            if (staleCount > 0) {
                const gatherCode = `-- Gather stats for all stale tables (run as DBA or schema owner)\nEXEC DBMS_STATS.GATHER_SCHEMA_STATS(\n  ownname => 'SCHEMA_NAME',  -- replace with target schema\n  options => 'GATHER STALE',\n  degree  => DBMS_STATS.AUTO_DEGREE\n);\n\n-- Or gather stats for a single table:\nEXEC DBMS_STATS.GATHER_TABLE_STATS(\n  ownname => 'SCHEMA_NAME',\n  tabname => 'TABLE_NAME',\n  degree  => DBMS_STATS.AUTO_DEGREE\n);`;
                const gatherBlockId = 'maint-gather-stats';
                html += `<div class="maint-enable-block" id="${gatherBlockId}" style="margin-top:16px">
                    <div class="maint-enable-block-label">Gather stale stats manually</div>
                    <div class="maint-enable-code">${esc(gatherCode)}</div>
                    <button class="maint-enable-copy" onclick="copyMaintBlock(this,'${gatherBlockId}')">Copy</button>
                </div>`;
            }
        } else if (staleCount === 0) {
            html += `<div style="font-size:13px;color:var(--green)">&#10003; No stale statistics detected — optimizer has fresh data for all user tables.</div>`;
        }

        return html;
    }

    // ─── HOUSEKEEPING DATA LOADING ─────────────────────────────────────────────

    async function loadHousekeepingStatus(btn) {
        const container = document.getElementById('maint-status-container');
        if (btn) {
            btn.disabled = true;
            btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Loading...';
        }
        if (container) {
            container.innerHTML = '<div style="font-size:13px;color:var(--text-dim)">Querying Oracle housekeeping window configuration...</div>';
        }
        try {
            const res = await fetch('/api/health-checks/' + reportId + '/housekeeping', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                if (err.code === 'PROXY_OUTDATED') {
                    if (container) container.innerHTML = `<div style="padding:14px 18px;border-radius:10px;background:rgba(255,193,7,0.08);border:1px solid rgba(255,193,7,0.25)">
                        <div style="font-size:13px;font-weight:600;color:#ffc107;margin-bottom:6px">&#x26A0; Proxy Update Required</div>
                        <div style="font-size:12px;color:var(--text-dim);line-height:1.6">
                            Your proxy agent needs to be updated to v3.2.1+ to support the Housekeeping tab.<br>
                            It will <strong>auto-update within 6 hours</strong>, or restart it now:<br>
                            <code style="background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:4px;font-size:11px">pm2 restart tunevault-proxy</code> or
                            <code style="background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:4px;font-size:11px">python3 oracle-proxy.py</code><br>
                            If the problem persists, re-download from <strong>Settings &rarr; Proxy Setup</strong>.
                        </div>
                    </div>`;
                    if (btn) { btn.disabled = false; btn.textContent = 'Retry'; }
                    return;
                }
                const msg = err.error || 'Failed to load housekeeping status';
                if (container) container.innerHTML = `<div style="font-size:13px;color:var(--red)">&#9888; ${esc(msg)}</div>`;
                if (btn) { btn.disabled = false; btn.textContent = 'Retry'; }
                return;
            }
            const data = await res.json();
            if (container) container.innerHTML = renderHousekeepingResult(data);
            if (btn) {
                btn.innerHTML = '&#10003; Housekeeping Status Loaded';
                btn.style.color = 'var(--green)';
                btn.style.borderColor = 'var(--green)';
            }
            // Show Re-check button after first load
            const recheckBtn = document.getElementById('maint-recheck-btn');
            if (recheckBtn) recheckBtn.style.display = '';
            // Timestamp
            maintLastCheckedAt = Date.now();
            updateMaintTimestamp();
        } catch (err) {
            if (container) container.innerHTML = '<div style="font-size:13px;color:var(--red)">&#9888; Network error — try again</div>';
            if (btn) { btn.disabled = false; btn.textContent = 'Retry'; }
        }
    }

    let maintLastCheckedAt = null;

    function updateMaintTimestamp() {
        const el = document.getElementById('maint-last-check-ts');
        if (!el || !maintLastCheckedAt) return;
        const diff = Math.round((Date.now() - maintLastCheckedAt) / 1000);
        const label = diff < 60 ? 'just now' : diff < 3600 ? Math.floor(diff / 60) + ' min ago' : Math.floor(diff / 3600) + 'h ago';
        el.textContent = 'Last checked: ' + label;
        el.style.display = '';
    }

    /**
     * recheckHousekeeping — re-query Oracle autotask clients and maintenance windows
     * for fresh status without a full page reload.
     */
    async function recheckHousekeeping(btn) {
        const container = document.getElementById('maint-status-container');
        const loadBtn = document.getElementById('maint-load-btn');
        if (btn) {
            btn.disabled = true;
            btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Checking…';
        }
        if (container) {
            container.innerHTML = '<div style="font-size:13px;color:var(--text-dim)">Re-querying Oracle housekeeping window configuration…</div>';
        }
        try {
            const res = await fetch('/api/health-checks/' + reportId + '/housekeeping', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                const msg = err.error || 'Failed to re-check housekeeping status';
                if (container) container.innerHTML = `<div style="font-size:13px;color:var(--red)">&#9888; ${esc(msg)}</div>`;
                if (btn) { btn.disabled = false; btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Re-check'; }
                return;
            }
            const data = await res.json();
            if (container) container.innerHTML = renderHousekeepingResult(data);
            if (btn) {
                btn.disabled = false;
                btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Re-check';
            }
            // Update load button
            if (loadBtn) {
                loadBtn.innerHTML = '&#10003; Housekeeping Status Loaded';
                loadBtn.style.color = 'var(--green)';
                loadBtn.style.borderColor = 'var(--green)';
            }
            // Timestamp
            maintLastCheckedAt = Date.now();
            updateMaintTimestamp();

            // Toast summary
            showMaintRecheckToast(data);
        } catch (err) {
            if (container) container.innerHTML = '<div style="font-size:13px;color:var(--red)">&#9888; Network error — try again</div>';
            if (btn) { btn.disabled = false; btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Re-check'; }
        }
    }

    /** Toast notification after housekeeping re-check. */
    function showMaintRecheckToast(data) {
        const clients = (data && data.autotask_clients) || [];
        const staleClients = clients.filter(c => c.traffic_light !== 'green' && c.status !== 'DISABLED');
        const disabledCount = (data.disabled_clients || []).length + (data.disabled_windows || []).length;
        let msg;
        if (disabledCount + staleClients.length === 0) {
            msg = '&#10003; All autotask clients and windows are healthy.';
        } else {
            const parts = [];
            if (staleClients.length) parts.push(staleClients.length + ' client' + (staleClients.length > 1 ? 's' : '') + ' still stale');
            if (disabledCount) parts.push(disabledCount + ' disabled');
            msg = parts.join(', ') + '.';
        }
        const toast = document.createElement('div');
        toast.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9999;background:#1e1e2e;border:1px solid rgba(99,102,241,0.4);border-radius:10px;padding:12px 18px;font-size:13px;color:var(--text,#e2e8f0);box-shadow:0 4px 24px rgba(0,0,0,0.4);max-width:340px;line-height:1.5;transition:opacity 0.3s';
        toast.innerHTML = '<strong style="color:#a5b4fc">Housekeeping Re-checked</strong><br>' + msg;
        document.body.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 4000);
    }

    function copyMaintBlock(btn, elemId) {
        const el = document.getElementById(elemId);
        if (!el) return;
        // Get only the code text, not the button text
        const codeEl = el.querySelector('.maint-enable-code');
        const text = (codeEl || el).textContent || (codeEl || el).innerText;
        navigator.clipboard.writeText(text.trim()).then(() => {
            const orig = btn.textContent;
            btn.textContent = 'Copied!';
            btn.style.color = 'var(--green)';
            setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500);
        }).catch(() => {
            prompt('Copy this command:', text.trim());
        });
    }

    function renderBlockingResult(result) {
        const chains = result.chains || [];
        const severity = result.severity || 'green';
        const maxWait = result.max_wait_seconds || 0;
        const totalBlocked = result.total_blocked || 0;

        if (chains.length === 0) {
            return `<div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--green)">
                <span style="font-size:16px">&#10003;</span>
                No blocking sessions detected — all sessions are running freely.
            </div>`;
        }

        let html = '';

        // Summary banner
        const bannerColor = severity === 'red' ? 'var(--red)' : 'var(--yellow)';
        const bannerBg    = severity === 'red' ? 'rgba(248,113,113,0.06)' : 'rgba(251,191,36,0.06)';
        const bannerBorder= severity === 'red' ? 'rgba(248,113,113,0.3)' : 'rgba(251,191,36,0.3)';
        html += `<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:18px;padding:14px 16px;border-radius:8px;border:1px solid ${bannerBorder};background:${bannerBg}">
            <span style="font-size:16px;flex-shrink:0">&#9888;</span>
            <div style="font-size:13px">
                <strong style="color:${bannerColor}">${chains.length} blocking chain${chains.length > 1 ? 's' : ''}</strong>
                — ${totalBlocked} session${totalBlocked !== 1 ? 's' : ''} waiting,
                longest wait: <strong style="color:${bannerColor}">${maxWait}s</strong>
                <div style="margin-top:4px;color:var(--text-dim);font-size:12px">
                    Kill the blocker's session to release the lock:
                    <code style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text);background:rgba(255,255,255,0.06);padding:1px 5px;border-radius:3px">ALTER SYSTEM KILL SESSION 'sid,serial#' IMMEDIATE;</code>
                </div>
            </div>
        </div>`;

        for (const chain of chains) {
            const blockedCount = (chain.blocked || []).length;
            html += `<div class="blocking-chain">
                <div class="blocking-chain-header">
                    <span class="blocking-blocker-badge">BLOCKER</span>
                    <div class="blocking-blocker-info">
                        <div class="blocking-blocker-title">SID ${chain.blocker_sid} — ${esc(chain.blocker_user || 'UNKNOWN')}
                            <span style="font-size:11px;font-weight:400;color:var(--text-dim);margin-left:8px">${esc(chain.blocker_status || '')}</span>
                        </div>
                        <div class="blocking-blocker-sub">
                            Blocking ${blockedCount} session${blockedCount !== 1 ? 's' : ''}
                            ${chain.blocker_sql_id ? `· SQL_ID: <span style="font-family:'JetBrains Mono',monospace">${esc(chain.blocker_sql_id)}</span>` : ''}
                        </div>
                    </div>
                </div>`;

            if (chain.blocker_sql) {
                html += `<div class="blocking-sql-preview">${esc(chain.blocker_sql)}</div>`;
            }

            for (const blocked of (chain.blocked || [])) {
                const s = blocked.seconds_in_wait || 0;
                const waitClass = s > 300 ? 'blocking-wait-red' : s > 60 ? 'blocking-wait-yellow' : 'blocking-wait-dim';
                const waitLabel = s >= 3600 ? Math.round(s/3600) + 'h' : s >= 60 ? Math.round(s/60) + 'm ' + (s%60) + 's' : s + 's';
                html += `<div class="blocking-blocked-row">
                    <span class="blocking-wait-badge ${waitClass}">${waitLabel}</span>
                    <div class="blocking-blocked-info">
                        SID ${blocked.sid} — ${esc(blocked.user || 'UNKNOWN')}
                        <span style="margin-left:8px;font-family:'JetBrains Mono',monospace;font-size:11px">${esc(blocked.wait_event || '')}</span>
                    </div>
                </div>`;
            }

            html += `</div>`;
        }

        return html;
    }

    function renderLongOpsResult(result) {
        const ops = result.operations || [];
        const severity = result.severity || 'green';

        if (ops.length === 0) {
            return `<div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--green)">
                <span style="font-size:16px">&#10003;</span>
                No long operations currently running.
            </div>`;
        }

        let html = '';

        const slowOps = ops.filter(o => o.minutes_remaining > 60);
        if (slowOps.length > 0) {
            html += `<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:18px;padding:12px 16px;border-radius:8px;border:1px solid rgba(251,191,36,0.3);background:rgba(251,191,36,0.05)">
                <span style="font-size:16px;flex-shrink:0">&#9888;</span>
                <div style="font-size:13px">
                    <strong style="color:var(--yellow)">${slowOps.length} operation${slowOps.length > 1 ? 's' : ''} with &gt;60 min remaining</strong>
                    <div style="font-size:12px;color:var(--text-dim);margin-top:3px">Monitor these — if they're unexpected, they may be consuming significant I/O.</div>
                </div>
            </div>`;
        } else {
            html += `<div style="font-size:13px;color:var(--text-dim);margin-bottom:14px">${ops.length} long operation${ops.length > 1 ? 's' : ''} in progress — all within expected duration.</div>`;
        }

        html += `<table class="longops-table">
            <thead><tr>
                <th>Operation</th>
                <th>Target</th>
                <th style="min-width:120px">Progress</th>
                <th>% Done</th>
                <th>Elapsed</th>
                <th>Remaining</th>
                <th>SID</th>
            </tr></thead>
            <tbody>`;

        for (const op of ops) {
            const pct = Math.min(100, op.pct_complete || 0);
            const isSlow = op.minutes_remaining > 60;
            const fillClass = isSlow ? 'slow' : '';
            const remainColor = isSlow ? 'var(--yellow)' : 'var(--text-dim)';
            html += `<tr>
                <td><span class="longops-opname">${esc(op.opname)}</span></td>
                <td><span class="longops-target" title="${esc(op.target)}">${esc(op.target)}</span></td>
                <td>
                    <div class="longops-progress-bar">
                        <div class="longops-progress-fill ${fillClass}" style="width:${pct}%"></div>
                    </div>
                </td>
                <td style="font-family:'JetBrains Mono',monospace;font-size:11px">${pct}%</td>
                <td style="color:var(--text-dim);white-space:nowrap">${op.minutes_elapsed}m</td>
                <td style="color:${remainColor};white-space:nowrap;font-weight:${isSlow ? '600' : '400'}">${op.minutes_remaining}m</td>
                <td style="color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:11px">${op.sid}</td>
            </tr>`;
        }

        html += `</tbody></table>`;
        return html;
    }

        if (btn) {

            { key: 'by_buffer_gets', icon: '📥', label: 'Top SQL by Buffer Gets',   desc: 'V$SQL · buffer_gets DESC — high gets/exec often indicates full-table scans or missing indexes.' },

    function renderTopSqlTable(rows) {
        if (!rows || rows.length === 0) {
            return '<div style="font-size:13px;color:var(--text-dim)">No data returned.</div>';
        }
        const firstRow = rows[0];
        const hasPerExec = firstRow.per_exec !== null && firstRow.per_exec !== undefined;
        const keyLabel    = firstRow.key_label    || 'Metric';
        const perExecLabel= firstRow.per_exec_label || 'Per Exec';

        let html = `<div style="overflow-x:auto"><table class="data-table" style="font-size:12px">
            <thead><tr>
                <th style="width:120px">SQL ID</th>
                <th style="width:90px">Schema</th>
                <th style="text-align:right">${esc(keyLabel)}</th>
                ${hasPerExec ? `<th style="text-align:right">${esc(perExecLabel)}</th>` : ''}
                <th style="text-align:right">Executions</th>
                <th>SQL Text (first 100 chars)</th>
            </tr></thead>
            <tbody>`;

        const maxMetric = rows.length > 0 ? rows[0].key_metric : 1;
        rows.forEach((row, idx) => {
            const barPct = maxMetric > 0 ? Math.round((row.key_metric / maxMetric) * 100) : 0;
            const rowBg  = idx === 0 ? 'rgba(99,102,241,0.06)' : '';
            html += `<tr style="background:${rowBg}">
                <td><span class="mono" style="color:var(--accent);font-size:11px">${esc(row.sql_id)}</span></td>
                <td><span style="font-size:11px;color:var(--text-dim)">${esc(row.schema)}</span></td>
                <td style="text-align:right">
                    <div style="display:flex;align-items:center;justify-content:flex-end;gap:8px">
                        <div style="width:60px;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden">
                            <div style="height:100%;width:${barPct}%;background:var(--accent);border-radius:2px"></div>
                        </div>
                        <span class="mono" style="font-size:11px">${formatNum(row.key_metric)}</span>
                    </div>
                </td>
                ${hasPerExec ? `<td style="text-align:right;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim)">${formatNum(row.per_exec)}</td>` : ''}
                <td style="text-align:right;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim)">${formatNum(row.executions)}</td>
                <td><span class="mono" style="font-size:11px;color:var(--text-dim)" title="${esc(row.sql_text)}">${esc(row.sql_text.length > 80 ? row.sql_text.substring(0, 80) + '…' : row.sql_text)}</span></td>
            </tr>`;
        });

        html += `</tbody></table></div>`;
        return html;
    }

        if (btn) {
            btn.disabled = true;
            btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Loading...';
        }
        // Show loading state in all 5 containers

            const el = document.getElementById('topsql-container-' + k);

        }
    }

    function renderStaleStatsTab(data) {
        return `
        <div id="stalestats-tab-content">
            <div class="section">
                <div class="section-header" onclick="toggleSection(this)">
                    <h3>Stale Statistics
                        <span style="font-size:11px;font-weight:400;color:var(--text-dim);margin-left:8px">

                        </span>
                    </h3>
                    <span class="section-toggle">&#9662;</span>
                </div>
                <div class="section-body">
                    <div style="display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:18px">
                        <button class="longops-load-btn" id="stalestats-load-btn" onclick="loadStaleStatistics(this)">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>

            </div>
        </div>`;
    }

    function renderStaleStatsResult(result) {
        const schemas   = result.schemas   || [];
        const staleTop20 = result.staleTop20 || [];
        const autoJob   = result.autoJob   || [];

        let html = '';

        // ── Auto-optimizer-stats job status ──
        if (autoJob.length > 0) {
            const job = autoJob[0];
            const enabled = job.STATUS === 'ENABLED';
            const lastGood = job.LAST_GOOD_DATE ? new Date(job.LAST_GOOD_DATE).toLocaleDateString() : 'never';
            const dot = enabled ? '🟢' : '🔴';
            html += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;padding:12px 16px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.02)">
                <span style="font-size:18px">${dot}</span>
                <div style="font-size:13px">
                    <strong>Auto Optimizer Stats</strong>
                    <span style="margin-left:8px;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;background:${enabled ? 'rgba(52,211,153,0.15)' : 'rgba(248,113,113,0.15)'};color:${enabled ? 'var(--green)' : 'var(--red)'}">${esc(job.STATUS)}</span>
                    <span style="margin-left:10px;font-size:12px;color:var(--text-dim)">Last good run: ${esc(lastGood)}</span>
                </div>
            </div>`;
        }

        // ── Per-schema summary ──
        if (schemas.length > 0) {
            html += `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-dim);margin-bottom:10px">Statistics Health by Schema</div>`;
            html += `<div style="overflow-x:auto;margin-bottom:24px"><table class="data-table" style="font-size:12px">
                <thead><tr>
                    <th>Owner</th>
                    <th style="text-align:right">Total Tables</th>
                    <th style="text-align:right">No Stats</th>
                    <th style="text-align:right">Older 30d</th>
                    <th>Oldest Analyzed</th>
                    <th>Newest Analyzed</th>
                </tr></thead>
                <tbody>`;

            for (const s of schemas) {
                const noStats  = s.NO_STATS || 0;
                const older30  = s.OLDER_30D || 0;
                const dot = noStats > 5 || older30 > 20 ? '🔴' : noStats > 0 || older30 > 5 ? '🟡' : '🟢';
                const oldest = s.OLDEST_ANALYZE ? new Date(s.OLDEST_ANALYZE).toLocaleDateString() : '—';
                const newest = s.NEWEST_ANALYZE ? new Date(s.NEWEST_ANALYZE).toLocaleDateString() : '—';
                html += `<tr>
                    <td><span style="margin-right:6px">${dot}</span><span style="font-family:'JetBrains Mono',monospace;font-size:11px">${esc(s.OWNER || '')}</span></td>
                    <td style="text-align:right;font-family:'JetBrains Mono',monospace;font-size:11px">${s.TOTAL_TABLES || 0}</td>
                    <td style="text-align:right;font-family:'JetBrains Mono',monospace;font-size:11px;color:${noStats > 0 ? 'var(--red)' : 'inherit'}">${noStats}</td>
                    <td style="text-align:right;font-family:'JetBrains Mono',monospace;font-size:11px;color:${older30 > 5 ? 'var(--yellow)' : 'inherit'}">${older30}</td>
                    <td style="font-size:11px;color:var(--text-dim)">${esc(oldest)}</td>
                    <td style="font-size:11px;color:var(--text-dim)">${esc(newest)}</td>
                </tr>`;
            }
            html += `</tbody></table></div>`;
        }

        // ── Top 20 stale tables ──
        if (staleTop20.length > 0) {
            html += `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-dim);margin-bottom:10px">Top ${staleTop20.length} Stale Tables (by Row Count)</div>`;
            html += `<div style="overflow-x:auto"><table class="data-table" style="font-size:12px">
                <thead><tr>
                    <th>Owner</th>
                    <th>Table Name</th>
                    <th style="text-align:right">Num Rows</th>
                    <th>Last Analyzed</th>
                </tr></thead>
                <tbody>`;

            for (const t of staleTop20) {
                const lastAnalyzed = t.LAST_ANALYZED ? new Date(t.LAST_ANALYZED).toLocaleDateString() : '—';
                const numRows = t.NUM_ROWS || 0;
                const dot = numRows > 1000000 ? '🔴' : numRows > 100000 ? '🟡' : '🟡';
                html += `<tr>
                    <td><span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim)">${esc(t.OWNER || '')}</span></td>
                    <td><span style="font-family:'JetBrains Mono',monospace;font-size:11px">${esc(t.TABLE_NAME || '')}</span></td>
                    <td style="text-align:right">
                        <span style="margin-right:6px">${dot}</span>
                        <span style="font-family:'JetBrains Mono',monospace;font-size:11px">${formatNum(numRows)}</span>
                    </td>
                    <td style="font-size:11px;color:var(--text-dim)">${esc(lastAnalyzed)}</td>
                </tr>`;
            }
            html += `</tbody></table></div>`;
        }

        if (schemas.length === 0 && staleTop20.length === 0) {
            html += `<div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--green)">
                <span style="font-size:16px">&#10003;</span>
                No stale statistics found — all tables have up-to-date optimizer statistics.
            </div>`;
        }

        return html;
    }

    async function loadStaleStatistics(btn) {
        const container = document.getElementById('stalestats-container');
        if (btn) {
            btn.disabled = true;
            btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Loading...';
        }
        if (container) {
            container.innerHTML = '<div style="font-size:13px;color:var(--text-dim)">Querying DBA_TAB_STATISTICS for stale tables...</div>';
        }
        try {
            const res = await fetch('/api/health-checks/' + reportId + '/stale-statistics', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                if (container) container.innerHTML = `<div style="font-size:13px;color:var(--red)">&#9888; ${esc(err.error || 'Failed to load stale statistics')}</div>`;
                if (btn) { btn.disabled = false; btn.textContent = 'Retry'; }
                return;
            }
            const data = await res.json();
            if (container) container.innerHTML = renderStaleStatsResult(data);
            if (btn) {
                btn.innerHTML = '&#10003; Loaded';
                btn.style.color = 'var(--green)';
                btn.style.borderColor = 'var(--green)';
            }
        } catch (err) {
            if (container) container.innerHTML = '<div style="font-size:13px;color:var(--red)">&#9888; Network error — try again</div>';
            if (btn) { btn.disabled = false; btn.textContent = 'Retry'; }
        }
    }

    // Only rendered when m.ebs_detected is true.

    // ============================================================
    function renderEbsOpsTab(data, m) {
        const ebs = m.ebs_operations;
        const dbName = esc(m.instance ? m.instance.db_name : 'Unknown');
        const appName = m.detected_apps && m.detected_apps.find(a => a.key === 'EBS') ? esc(m.detected_apps.find(a => a.key === 'EBS').label) : 'EBS';

        function statusDot(val, warnThresh, critThresh, invert) {
            // invert: lower is worse (e.g. running_processes)
            if (invert) {
                return val === 0 ? 'crit' : val < warnThresh ? 'warn' : 'ok';
            }
            return val >= critThresh ? 'crit' : val >= warnThresh ? 'warn' : 'ok';
        }
        function clsColor(cls) {
            return cls === 'crit' ? 'var(--red)' : cls === 'warn' ? 'var(--yellow)' : 'var(--green)';
        }
        function checkRow(label, value, cls, note) {
            return `<tr>
                <td><span class="status-dot dot-${cls}"></span>${label}</td>
                <td class="mono" style="color:${clsColor(cls)}">${value}</td>
                <td style="color:var(--text-dim);font-size:12px">${note || ''}</td>
            </tr>`;
        }

        let html = `<div style="background:rgba(96,165,250,0.06);border:1px solid rgba(96,165,250,0.2);border-radius:10px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:12px">
            <span style="font-size:20px">🏭</span>
            <div>
                <div style="font-size:14px;font-weight:600;color:#60a5fa">EBS Operations — ${appName} on ${dbName}</div>
                <div style="font-size:12px;color:var(--text-dim);margin-top:2px">APPS schema diagnostics · ${ebs ? 'Live data' : 'Not collected'}</div>
            </div>
        </div>`;

        if (!ebs) {
            html += `<div class="section"><div class="section-body"><p style="color:var(--text-dim);font-size:13px">EBS Operations data was not collected for this run. Re-run the health check to populate this section.</p></div></div>`;
            return html;
        }

        const cm = ebs.concurrent_managers || {};
        const wf = ebs.workflow || {};
        const sec = ebs.security || {};
        const fb = ebs.functional || {};
        const obs = ebs.observability || {};

        // ── CONCURRENT MANAGERS ──────────────────────────────────────────────
        html += `<div class="section">
            <div class="section-header" onclick="toggleSection(this)">
                <h3>Concurrent Managers
                    ${cm.cm02 && cm.cm02.pending_requests > 50 ? `<span class="tag tag-${cm.cm02.pending_requests > 200 ? 'critical' : 'warning'}">${cm.cm02.pending_requests} PENDING</span>` : ''}
                    ${cm.cm10 && cm.cm10.error_requests_24h > 5 ? `<span class="tag tag-warning">${cm.cm10.error_requests_24h} ERRORS</span>` : ''}
                </h3>
                <span class="section-toggle">&#9662;</span>
            </div>
            <div class="section-body">
                <table class="data-table">
                    <tr><th>Check</th><th>Value</th><th>Notes</th></tr>
                    ${cm.cm01 ? checkRow('Internal Manager',
                        cm.cm01.running_processes + '/' + cm.cm01.max_processes + ' processes',
                        cm.cm01.running_processes === 0 ? 'crit' : 'ok',
                        'Control: ' + (cm.cm01.control_code || 'A')
                    ) : ''}
                    ${cm.cm02 ? checkRow('Pending Requests (Standard Mgr)',
                        cm.cm02.pending_requests,
                        statusDot(cm.cm02.pending_requests, 50, 200, false),
                        'Requests queued but not running'
                    ) : ''}
                    ${cm.cm03 ? checkRow(cm.cm03.name || 'Output Post Processor (OPP)',
                        cm.cm03.running_processes + '/' + cm.cm03.max_processes + ' processes',
                        cm.cm03.running_processes === 0 ? 'crit' : 'ok',
                        cm.cm03.recommendation || (cm.cm03.running_processes === 0 ? 'OPP DOWN — PDF/output generation will fail' : 'OPP healthy')
                    ) : ''}
                    ${cm.cm05 ? checkRow('Avg Request Runtime (24h)',
                        (cm.cm05.avg_runtime_secs || 0) + 's',
                        statusDot(cm.cm05.avg_runtime_secs || 0, 600, 3600, false),
                        (cm.cm05.completed_24h || 0) + ' completed requests'
                    ) : ''}
                    ${cm.cm10 ? checkRow('Error Requests (24h)',
                        cm.cm10.error_requests_24h,
                        statusDot(cm.cm10.error_requests_24h || 0, 5, 20, false),
                        'Status IN (E, X, D)'
                    ) : ''}
                </table>
                ${cm.cm06 && cm.cm06.length ? `
                <div style="margin-top:16px">
                    <div style="font-size:12px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Manager Load</div>
                    <table class="data-table">
                        <tr><th>Manager</th><th>Running</th><th>Target</th><th>Max</th><th></th></tr>
                        ${cm.cm06.map(mgr => {
                            const loadCls = mgr.running_processes === 0 ? 'crit' : mgr.running_processes < mgr.target_processes ? 'warn' : 'ok';

                                <td><span class="status-dot dot-${loadCls}"></span>${esc(mgr.name)}</td>
                                <td class="mono">${mgr.running_processes}</td>
                                <td class="mono">${mgr.target_processes}</td>
                                <td class="mono">${mgr.max_processes}</td>
                                <td style="color:${clsColor(loadCls)};font-size:12px">${mgr.running_processes === 0 ? 'DOWN' : mgr.running_processes < mgr.target_processes ? 'Under capacity' : 'OK'}</td>
                            </tr>`;
                        }).join('')}
                    </table>
                </div>` : ''}
                ${cm.cm09 && cm.cm09.length ? `
                <div style="margin-top:16px">
                    <div style="font-size:12px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Top Long-Running Requests (Last 7 Days)</div>
                    <table class="data-table">
                        <tr><th>Program</th><th>Started</th><th>Runtime</th></tr>

                            return `<tr>
                                <td><span class="status-dot dot-${cls}"></span><span class="mono" style="font-size:12px">${esc(req.program)}</span></td>
                                <td class="mono" style="font-size:12px;color:var(--text-dim)">${esc(req.start_time)}</td>
                                <td class="mono" style="color:${clsColor(cls)}">${mins} min</td>
                            </tr>`;
                        }).join('')}
                    </table>
                </div>` : ''}
            </div>
        </div>`;

        // ── WORKFLOW ────────────────────────────────────────────────────────
        const wfErrCls = !wf.wf02 ? 'ok' : statusDot(wf.wf02.error_count || 0, 10, 50, false);
        const wfNotifCls = !wf.wf08 ? 'ok' : statusDot(wf.wf08.pending_over_8h || 0, 100, 100, false);
        // Detect mailer status from wf03.mailer_running or wf09 service list
        const mailerRunningWf03 = wf.wf03 ? !!wf.wf03.mailer_running : null;

        html += `<div class="section ${wfIsCritical ? '' : 'collapsed'}">
            <div class="section-header" onclick="toggleSection(this)">
                <h3>Workflow &amp; Notification Mailer
                    ${mailerDown ? '<span class="tag tag-critical">MAILER DOWN</span>' : ''}
                    ${wf.wf02 && wf.wf02.error_count > 10 ? `<span class="tag tag-${wf.wf02.error_count > 50 ? 'critical' : 'warning'}">${wf.wf02.error_count} WF ERRORS</span>` : ''}
                    ${wf.wf08 && wf.wf08.pending_over_2h > 100 ? `<span class="tag tag-warning">${wf.wf08.pending_over_2h} NOTIF BACKLOG</span>` : ''}
                </h3>
                <span class="section-toggle">&#9662;</span>
            </div>
            <div class="section-body">
                ${mailerDown ? `<div style="background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:8px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:flex-start;gap:10px">

                        <div style="font-size:12px;color:var(--text-dim)">Email notifications will not be sent. ${wf.wf08 && wf.wf08.pending_over_2h > 0 ? wf.wf08.pending_over_2h + ' notifications stuck in queue.' : ''} Enable via Workflow → Service Components admin page, or run <span class="mono">EXEC fnd_svc_component.start_component(component_id);</span></div>
                    </div>
                </div>` : ''}
                <table class="data-table">
                    <tr><th>Check</th><th>Value</th><th>Notes</th></tr>
                    ${wf.wf03 ? checkRow('Notification Mailer',
                        wf.wf03.mailer_running ? 'RUNNING' : 'DOWN',
                        wf.wf03.mailer_running ? 'ok' : 'crit',

                        mailerSvc.status,
                        mailerSvc.status === 'RUNNING' ? 'ok' : 'crit',
                        'Startup: ' + (mailerSvc.startup_mode || 'AUTOMATIC')
                    ) : '')}
                    ${wf.wf02 ? checkRow('Workflow Errors',
                        wf.wf02.error_count,
                        wfErrCls,
                        'Items with activity_status = ERROR'
                    ) : ''}
                    ${wf.wf03 ? checkRow('Deferred Queue (ready)',
                        wf.wf03.deferred_ready,
                        statusDot(wf.wf03.deferred_ready || 0, 100, 500, false),
                        'WF_DEFERRED state=0 (ready but not processed)'
                    ) : ''}
                    ${wf.wf08 ? checkRow('Notification Backlog >2h',
                        wf.wf08.pending_over_2h,
                        statusDot(wf.wf08.pending_over_2h || 0, 100, 500, false),

                    ${fb.fb03 ? checkRow('Notification Aging >7d',

                ${wf.wf01 && wf.wf01.length ? `

                ${wf.wf07 && wf.wf07.length ? `

                ${wf.wf09 && wf.wf09.length ? `

    async function loadOracleParameters(btn) {
        const container = document.getElementById('params-container');
        if (btn) {
            btn.disabled = true;
            btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite;margin-right:6px"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg> Loading...';
        }
        if (container) container.innerHTML = '<div style="font-size:13px;color:var(--text-dim)">Querying V$PARAMETER and hardware context...</div>';
        try {
            const res = await fetch('/api/health-checks/' + reportId + '/parameters', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                if (container) container.innerHTML = '<div style="font-size:13px;color:var(--red)">&#9888; ' + esc(err.error || 'Failed to load parameters') + '</div>';
                if (btn) { btn.disabled = false; btn.textContent = 'Retry'; }
                return;
            }
            const data = await res.json();
            if (container) container.innerHTML = renderParametersResult(data);
            if (btn) {
                btn.innerHTML = '&#10003; Parameters Loaded';
                btn.style.color = 'var(--green)';
                btn.style.borderColor = 'var(--green)';
            }
        } catch (err) {
            if (container) container.innerHTML = '<div style="font-size:13px;color:var(--red)">&#9888; Network error — try again</div>';
            if (btn) { btn.disabled = false; btn.textContent = 'Retry'; }
        }
    }

    function renderParametersResult(data) {
        if (!data || !data.parameters || data.parameters.length === 0) {
            return '<div style="font-size:13px;color:var(--text-dim)">No parameter data returned.</div>';

        const hw = data.hardware || {};
        const edition = data.edition || 'unknown';

        const redParams   = data.parameters.filter(p => p.status === 'red');

        // Summary bar
        let html = `
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px">
            <div style="background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.25);border-radius:8px;padding:10px 16px;min-width:110px">

            </div>
            <div style="background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.25);border-radius:8px;padding:10px 16px;min-width:110px">
                <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.7px;color:var(--text-dim);margin-bottom:4px">Suboptimal</div>
                <div style="font-size:20px;font-weight:700;color:var(--yellow)">${amberParams.length}</div>
            </div>
            <div style="background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.25);border-radius:8px;padding:10px 16px;min-width:110px">
                <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.7px;color:var(--text-dim);margin-bottom:4px">Critical</div>
                <div style="font-size:20px;font-weight:700;color:var(--red)">${redParams.length}</div>
            </div>
            <div style="background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;padding:10px 16px;min-width:130px">
                <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.7px;color:var(--text-dim);margin-bottom:4px">Hardware</div>
                <div style="font-size:13px;font-weight:600;color:var(--text);font-family:'JetBrains Mono',monospace">${hw.ram_gb ? hw.ram_gb + ' GB RAM' : 'N/A'} · ${hw.cpu_count || '?'} CPU</div>
            </div>
            <div style="background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;padding:10px 16px;min-width:110px">
                <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.7px;color:var(--text-dim);margin-bottom:4px">Edition</div>
                <div style="font-size:13px;font-weight:600;color:var(--blue);font-family:'JetBrains Mono',monospace">${esc(edition)}</div>
            </div>
            ${sessHW > 0 ? `<div style="background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;padding:10px 16px;min-width:120px">
                <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.7px;color:var(--text-dim);margin-bottom:4px">Sessions HW</div>
                <div style="font-size:13px;font-weight:600;color:var(--text);font-family:'JetBrains Mono',monospace">${sessHW}</div>
            </div>` : ''}
        </div>`;

        // Group by category
        const categories = {};
        data.parameters.forEach(p => {
            if (!categories[p.category]) categories[p.category] = [];
            categories[p.category].push(p);
        });

        const catOrder = ['Memory','Processes & Sessions','Undo & Recovery','Performance','Security & Audit','Storage & I/O','Misc'];
        const orderedCats = [...new Set([...catOrder, ...Object.keys(categories)])].filter(c => categories[c]);

        function statusDot(status) {
            if (status === 'red')    return '<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--red);box-shadow:0 0 5px rgba(248,113,113,0.6);flex-shrink:0"></span>';
            if (status === 'amber')  return '<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--yellow);box-shadow:0 0 5px rgba(251,191,36,0.5);flex-shrink:0"></span>';
            if (status === 'green')  return '<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 5px rgba(52,211,153,0.4);flex-shrink:0"></span>';
            return '<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--text-dim);flex-shrink:0"></span>';

        function paramBadge(status) {
            if (status === 'red')   return '<span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;background:rgba(248,113,113,0.15);color:var(--red);letter-spacing:0.3px">CRITICAL</span>';

            return '<span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;background:rgba(52,211,153,0.12);color:var(--green);letter-spacing:0.3px">OK</span>';
        }

        orderedCats.forEach(catName => {
            const params = categories[catName];
            const catRed   = params.filter(p => p.status === 'red').length;
            const catAmber = params.filter(p => p.status === 'amber').length;
            const catBadge = catRed > 0

                </div>

                    <table style="width:100%;border-collapse:collapse">

                                <th style="padding:7px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.7px;color:var(--text-dim);text-align:left;width:22%">Current Value</th>
                                <th style="padding:7px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.7px;color:var(--text-dim);text-align:left;width:25%">Recommended</th>
                                <th style="padding:7px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.7px;color:var(--text-dim);text-align:center;width:15%">Status</th>
                            </tr>
                        </thead>
                        <tbody>`;

            params.forEach(p => {
                const showFix = (p.status === 'red' || p.status === 'amber') && p.is_dynamic !== null;

                html += `

                                <td style="padding:8px 12px;vertical-align:top">
                                    <div style="display:flex;align-items:center;gap:8px">
                                        ${statusDot(p.status)}
                                        <code style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text)">${esc(p.name)}</code>
                                    </div>
                                    ${p.note ? `<div style="font-size:11px;color:var(--text-dim);margin-top:3px;margin-left:17px">${esc(p.note)}</div>` : ''}
                                    ${showFix ? `<div style="margin-top:5px;margin-left:17px">
                                        <code style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);background:rgba(240,168,48,0.08);padding:2px 7px;border-radius:3px;cursor:pointer" onclick="copyParamFix(this,'${esc(fixCmd)}')" title="Click to copy">${esc(fixCmd)} <span style="opacity:0.6">⧉</span></code>
                                        <span style="font-size:10px;color:var(--text-dim);margin-left:4px">${p.is_dynamic ? '(dynamic)' : '(restart)'}</span>
                                    </div>` : ''}
                                </td>

                                    <code style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim)">${esc(p.current_value)}</code>
                                </td>
                                <td style="padding:8px 12px;vertical-align:top">
                                    <span style="font-size:12px;color:var(--text)">${esc(p.recommended)}</span>
                                </td>
                                <td style="padding:8px 12px;vertical-align:middle;text-align:center">
                                    ${paramBadge(p.status)}
                                </td>
                            </tr>`;
            });

            html += `
                        </tbody>
                    </table>
                </div>
            </div>`;
        });

        return html;
    }

    function toggleParamsCategory(header) {
        const cat = header.closest('.params-category');
        if (!cat) return;
        cat.classList.toggle('params-cat-collapsed');
        const toggle = header.querySelector('.params-cat-toggle');
        if (toggle) toggle.style.transform = cat.classList.contains('params-cat-collapsed') ? 'rotate(-90deg)' : '';

    function copyParamFix(el, text) {
        navigator.clipboard.writeText(text).then(() => {
            const orig = el.innerHTML;
            el.innerHTML = '&#10003; Copied';
            el.style.color = 'var(--green)';
            setTimeout(() => { el.innerHTML = orig; el.style.color = ''; }, 1500);
        }).catch(() => {});
    }

    function renderSchedulerResult(data) {
        const failed = data.failed || [];
        const disabled = data.disabled || [];
        const legacy = data.broken_legacy || [];

        const dbUnique = data.db_unique_name || '';

            </div>` : ''}

                <div class="stat-label">DB Unique Name</div>
                <div class="mono stat-val">${esc(dbUnique)}</div>
            </div>` : ''}
        </div>`;

        if (!flashbackOn && dbRole === 'PRIMARY') {
            html += `<div style="padding:12px 16px;border-radius:8px;border:1px solid rgba(251,191,36,0.3);background:rgba(251,191,36,0.06);margin-bottom:16px;font-size:13px">

                <div style="margin-top:8px;font-size:12px;color:var(--text-dim)">Enable: <code style="font-family:'JetBrains Mono',monospace;font-size:11px;background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:3px">ALTER DATABASE FLASHBACK ON;</code> (requires archivelog mode + FRA configured)</div>
            </div>`;
        }

        if (standbys.length === 0) {
            html += `<div style="padding:12px 16px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.02);font-size:13px;color:var(--text-dim)">
                ℹ️ No Data Guard standby databases detected (V\$DATAGUARD_STATS returned no rows). This database is either running without Data Guard or this session lacks access to the view.

        } else {

                const applyLag = dg.APPLY_LAG || 'N/A';
                const transportLag = dg.TRANSPORT_LAG || 'N/A';
                const lagColor = applyLagMin !== null
                    ? (applyLagMin > 60 ? 'var(--red)' : applyLagMin > 10 ? 'var(--yellow)' : 'var(--green)')

                html += `<div style="border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:12px">

                    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px">

                        <div><div style="font-size:11px;color:var(--text-dim);margin-bottom:4px">Transport Lag</div>

                        </div>

                        </div>` : ''}
                    </div>
                </div>`;

                if (applyLagMin !== null && applyLagMin > 60) {
                    html += `<div style="padding:12px 16px;border-radius:8px;border:1px solid rgba(248,113,113,0.3);background:rgba(248,113,113,0.06);font-size:13px;margin-bottom:12px">
                        🔴 <strong>Apply lag of ${applyLagMin} minutes exceeds 1 hour.</strong> Standby is behind — RPO may be violated. Check redo apply status on the standby server.
                    </div>`;
                }
            }
        }

        return html;
    }

                    <div style="display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:18px">
                        <button class="longops-load-btn" id="recyclebin-load-btn" onclick="loadRecyclebin(this)">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
                            Load Recyclebin
                        </button>
                        <span style="font-size:12px;color:var(--text-dim)">Large recyclebin inflates DBA_SEGMENTS and slows space queries — purge with PURGE DBA_RECYCLEBIN</span>
                    </div>
                    <div id="recyclebin-container">
                        <div style="font-size:13px;color:var(--text-dim)">
                            Click to see recyclebin space consumption by owner and the largest dropped objects.
                        </div>
                    </div>
                </div>
            </div>
        </div>`;
    }

    function renderRecyclebinResult(data) {
        const totalObj = data.total_objects || 0;
        const totalMb = data.total_size_mb || 0;
        const byOwner = data.by_owner || [];
        const largest = data.largest_objects || [];
        const rbEnabled = data.recyclebin_enabled !== false;

        if (totalObj === 0) {
            return `<div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--green)">
                <span style="font-size:16px">&#10003;</span>
                Recyclebin is ${rbEnabled ? 'enabled and' : 'disabled —'} empty. No dropped objects consuming space.
            </div>`;
        }

        const severity = totalMb > 10240 ? 'red' : 'yellow';
        const bColor = severity === 'red' ? 'var(--red)' : 'var(--yellow)';
        const totalGb = (totalMb / 1024).toFixed(2);

        let html = `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:20px">
            <div class="stat-mini"><div class="stat-label">Total Objects</div>
                <div class="mono stat-val" style="color:${bColor}">${totalObj.toLocaleString()}</div></div>
            <div class="stat-mini"><div class="stat-label">Total Space</div>
                <div class="mono stat-val" style="color:${bColor}">${totalGb} GB</div></div>
            <div class="stat-mini"><div class="stat-label">Recyclebin Status</div>
                <div class="mono stat-val" style="color:${rbEnabled ? 'var(--text)' : 'var(--text-dim)'}">${rbEnabled ? 'ON' : 'OFF'}</div></div>
        </div>`;

        html += `<div style="padding:12px 16px;border-radius:8px;border:1px solid rgba(251,191,36,0.3);background:rgba(251,191,36,0.06);margin-bottom:18px;font-size:13px">
            🗑️ <strong>${totalObj.toLocaleString()} dropped objects</strong> consuming <strong>${totalGb} GB</strong> in the recyclebin.
            <div style="margin-top:8px;font-size:12px;color:var(--text-dim)">Purge all: <code style="font-family:'JetBrains Mono',monospace;font-size:11px;background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:3px">PURGE DBA_RECYCLEBIN;</code> &nbsp;|&nbsp; Per-user: <code style="font-family:'JetBrains Mono',monospace;font-size:11px;background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:3px">PURGE RECYCLEBIN;</code></div>
        </div>`;

        if (byOwner.length > 0) {
            html += `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-dim);margin-bottom:8px">Space by Owner</div>`;
            html += `<div style="overflow-x:auto;margin-bottom:20px"><table class="data-table" style="font-size:12px">
                <thead><tr><th>Owner</th><th style="text-align:right">Objects</th><th style="text-align:right">Size (MB)</th></tr></thead><tbody>`;
            for (const r of byOwner) {
                html += `<tr>
                    <td class="mono" style="font-size:11px">${esc(r.OWNER)}</td>
                    <td style="text-align:right;font-family:'JetBrains Mono',monospace;font-size:11px">${r.OBJECT_COUNT}</td>
                    <td style="text-align:right;font-family:'JetBrains Mono',monospace;font-size:11px;color:${r.SIZE_MB > 1024 ? 'var(--yellow)' : 'inherit'}">${r.SIZE_MB.toFixed(1)}</td>
                </tr>`;
            }
            html += `</tbody></table></div>`;
        }

        if (largest.length > 0) {
            html += `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-dim);margin-bottom:8px">Largest Dropped Objects</div>`;
            html += `<div style="overflow-x:auto"><table class="data-table" style="font-size:12px">
                <thead><tr><th>Owner</th><th>Original Name</th><th>Type</th><th style="text-align:right">Size (MB)</th><th>Dropped</th></tr></thead><tbody>`;
            for (const r of largest) {
                html += `<tr>
                    <td class="mono" style="font-size:11px">${esc(r.OWNER)}</td>
                    <td class="mono" style="font-size:11px">${esc(r.ORIGINAL_NAME)}</td>
                    <td style="font-size:11px;color:var(--text-dim)">${esc(r.TYPE)}</td>
                    <td style="text-align:right;font-family:'JetBrains Mono',monospace;font-size:11px;color:${r.SIZE_MB > 512 ? 'var(--yellow)' : 'inherit'}">${r.SIZE_MB.toFixed(1)}</td>
                    <td style="font-size:11px;color:var(--text-dim)">${esc(r.DROPTIME)}</td>
                </tr>`;
            }
            html += `</tbody></table></div>`;
        }

        return html;
    }

    async function loadRecyclebin(btn) {
        const container = document.getElementById('recyclebin-container');
        if (btn) { btn.disabled = true; btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Loading...'; }
        if (container) container.innerHTML = '<div style="font-size:13px;color:var(--text-dim)">Querying DBA_RECYCLEBIN...</div>';
        try {
            const res = await fetch('/api/health-checks/' + reportId + '/recyclebin', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                if (container) container.innerHTML = `<div style="font-size:13px;color:var(--red)">&#9888; ${esc(err.error || 'Failed to load recyclebin')}</div>`;
                if (btn) { btn.disabled = false; btn.textContent = 'Retry'; }
                return;
            }
            const data = await res.json();
            if (container) container.innerHTML = renderRecyclebinResult(data);
            if (btn) { btn.innerHTML = '&#10003; Loaded'; btn.style.color = 'var(--green)'; btn.style.borderColor = 'var(--green)'; }
        } catch (err) {
            if (container) container.innerHTML = '<div style="font-size:13px;color:var(--red)">&#9888; Network error — try again</div>';
            if (btn) { btn.disabled = false; btn.textContent = 'Retry'; }
        }
    }

    // ============================================================
    // TAB 22: DATABASE LINKS
    // ============================================================

    function renderDbLinksTab(data) {
        return `
        <div id="dblinks-tab-content">
            <div class="section">
                <div class="section-header" onclick="toggleSection(this)">
                    <h3>Database Link Health
                        <span style="font-size:11px;font-weight:400;color:var(--text-dim);margin-left:8px">
                            DBA_DB_LINKS — all editions — probes PUBLIC + owned links
                        </span>
                    </h3>
                    <span class="section-toggle">&#9662;</span>
                </div>
                <div class="section-body">
                    <div style="display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:18px">
                        <button class="blocking-load-btn" id="dblinks-load-btn" onclick="loadDbLinks(this)">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
                            Load DB Link Status
                        </button>
                        <span style="font-size:12px;color:var(--text-dim)">Broken DB links cause ORA-02019 / ORA-12541 errors in production queries and EBS integrations</span>
                    </div>
                    <div id="dblinks-container">
                        <div style="font-size:13px;color:var(--text-dim)">
                            Click to enumerate all database links and probe PUBLIC + owned links for connectivity.
                        </div>
                    </div>
                </div>
            </div>
        </div>`;
    }

    function renderDbLinksResult(data) {
        const links = data.links || [];
        const failedCount = data.failed_count || 0;
        const okCount = data.ok_count || 0;

        if (links.length === 0) {
            return `<div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-dim)">
                ℹ️ No database links found in DBA_DB_LINKS — or DBA_DB_LINKS not accessible with current privileges.
            </div>`;
        }

        let html = `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:20px">
            <div class="stat-mini"><div class="stat-label">Total Links</div><div class="mono stat-val">${links.length}</div></div>
            <div class="stat-mini"><div class="stat-label">Reachable</div><div class="mono stat-val" style="color:var(--green)">${okCount}</div></div>
            <div class="stat-mini"><div class="stat-label">Failed</div><div class="mono stat-val" style="color:${failedCount > 0 ? 'var(--red)' : 'var(--text-dim)'}">${failedCount}</div></div>
            <div class="stat-mini"><div class="stat-label">Untested</div><div class="mono stat-val" style="color:var(--text-dim)">${links.filter(l => l.STATUS === 'untested').length}</div></div>
        </div>`;

        if (failedCount > 0) {
            html += `<div style="padding:12px 16px;border-radius:8px;border:1px solid rgba(248,113,113,0.3);background:rgba(248,113,113,0.06);margin-bottom:16px;font-size:13px">
                🔴 <strong>${failedCount} database link${failedCount !== 1 ? 's' : ''} failed connectivity test.</strong> Queries using these links will fail with ORA errors.
            </div>`;
        }

        html += `<div style="overflow-x:auto"><table class="data-table" style="font-size:12px">
            <thead><tr><th>Owner</th><th>DB Link</th><th>Remote User</th><th>Host/Service</th><th>Created</th><th>Status</th></tr></thead><tbody>`;

        for (const link of links) {
            const statusColor = link.STATUS === 'ok' ? 'var(--green)' : link.STATUS === 'failed' ? 'var(--red)' : 'var(--text-dim)';
            const statusLabel = link.STATUS === 'ok' ? '✓ OK' : link.STATUS === 'failed' ? '✗ FAILED' : '— untested';
            html += `<tr>
                <td class="mono" style="font-size:11px">${esc(link.OWNER)}</td>
                <td class="mono" style="font-size:11px;font-weight:600">${esc(link.DB_LINK)}</td>
                <td class="mono" style="font-size:11px">${esc(link.USERNAME || '—')}</td>
                <td style="font-size:11px;color:var(--text-dim);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(link.HOST || '')}">${esc(link.HOST || '—')}</td>
                <td style="font-size:11px;color:var(--text-dim)">${esc(link.CREATED || '—')}</td>
                <td style="font-weight:600;color:${statusColor};font-size:12px">${statusLabel}</td>
            </tr>`;
            if (link.STATUS === 'failed' && link.ERROR) {
                html += `<tr><td colspan="6" style="padding:4px 12px 8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--red);background:rgba(248,113,113,0.04)">${esc(link.ERROR)}</td></tr>`;
            }
        }

        html += `</tbody></table></div>`;

        if (links.some(l => l.STATUS === 'untested')) {
            html += `<div style="font-size:12px;color:var(--text-dim);margin-top:12px">ℹ️ Links owned by schemas other than the connection user are listed but not probed (requires schema-level access). Manual test: <code style="font-family:'JetBrains Mono',monospace;font-size:11px;background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:3px">SELECT 1 FROM DUAL@link_name;</code></div>`;
        }

        return html;
    }

    async function loadDbLinks(btn) {
        const container = document.getElementById('dblinks-container');
        if (btn) { btn.disabled = true; btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Loading...'; }
        if (container) container.innerHTML = '<div style="font-size:13px;color:var(--text-dim)">Querying DBA_DB_LINKS and probing connectivity...</div>';
        try {
            const res = await fetch('/api/health-checks/' + reportId + '/db-links', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                if (container) container.innerHTML = `<div style="font-size:13px;color:var(--red)">&#9888; ${esc(err.error || 'Failed to load database link status')}</div>`;
                if (btn) { btn.disabled = false; btn.textContent = 'Retry'; }
                return;
            }
            const data = await res.json();
            if (container) container.innerHTML = renderDbLinksResult(data);
            if (btn) { btn.innerHTML = '&#10003; Loaded'; btn.style.color = 'var(--green)'; btn.style.borderColor = 'var(--green)'; }
        } catch (err) {
            if (container) container.innerHTML = '<div style="font-size:13px;color:var(--red)">&#9888; Network error — try again</div>';
            if (btn) { btn.disabled = false; btn.textContent = 'Retry'; }
        }
    }

    // ============================================================
    // BOOT
    // ============================================================
    loadReport();
    </script>

        window.tvNav.init('report');

                return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
            });
            localStorage.setItem('polsia_vid', vid);
        }
        new Image().src = 'https://polsia.com/api/beacon/pixel?s=' + encodeURIComponent(slug) + '&v=' + encodeURIComponent(vid);
