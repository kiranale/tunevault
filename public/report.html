<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Report — TuneVault</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="tv-build" content="2026-06-11-ebs-ops-v1">
    <link rel="canonical" href="https://tunevault.app/report">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0c;
            --surface: #111114;
            --surface-2: #1a1a1f;
            --border: #2a2a30;
            --text: #e8e8ed;
            --text-dim: #b8b8c8;
            --accent: #f0a830;
            --accent-dim: rgba(240, 168, 48, 0.12);
            --green: #34d399;
            --red: #f87171;
            --yellow: #fbbf24;
            --blue: #60a5fa;
            --purple: #a78bfa;
        }
        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .grain {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 999;
        }

        /* ============================================================
           NAV
        ============================================================ */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 48px; max-width: 1400px; margin: 0 auto;
        }
        /* ── Page toolbar: action buttons below nav ── */
        .page-toolbar {
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
            padding: 10px 48px;
            background: rgba(10,10,12,0.97);
            border-bottom: 1px solid var(--border);
        }
        .toolbar-link {
            font-size: 13px; color: var(--text); text-decoration: none;
            padding: 7px 14px; border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px; transition: all 0.2s; white-space: nowrap;
        }
        .toolbar-link:hover { border-color: var(--accent); color: var(--accent); }
        .toolbar-sep {
            width: 1px; height: 20px; background: rgba(255,255,255,0.12); flex-shrink: 0;
        }
        .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
        .logo-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; color: var(--bg); }
        .nav-actions { display: flex; gap: 12px; align-items: center; }
        .nav-btn { padding: 8px 16px; border-radius: 6px; font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; text-decoration: none; border: 1px solid var(--border); background: transparent; color: var(--text); transition: all 0.2s; }
        .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
        .download-btn, .tv-export-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 9px 18px; border-radius: 6px; font-family: 'Space Grotesk', sans-serif;
            font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none;
            background: var(--accent); color: var(--bg); border: 1.5px solid var(--accent);
            transition: all 0.2s; letter-spacing: 0.2px; flex-shrink: 0; line-height: 1;
        }
        .download-btn:hover, .tv-export-btn:hover { background: #d4921e; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(240,168,48,0.3); }
        .download-btn svg, .tv-export-btn svg { flex-shrink: 0; }

        /* ============================================================
           VITALS BAR (sticky, always visible after report loads)
        ============================================================ */
        #vitalsBar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(17, 17, 20, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: none; /* shown by JS once data loads */
        }
        .vitals-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 48px;
            display: flex;
            align-items: center;
            gap: 0;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .vitals-inner::-webkit-scrollbar { display: none; }
        .vital-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 11px 20px;
            border-right: 1px solid var(--border);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .vital-item:last-child { border-right: none; margin-left: auto; }
        .vital-label {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
        }
        .vital-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
        }
        .vital-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .vital-dot.ok { background: var(--green); box-shadow: 0 0 6px rgba(52,211,153,0.6); }
        .vital-dot.warn { background: var(--yellow); box-shadow: 0 0 6px rgba(251,191,36,0.6); }
        .vital-dot.crit { background: var(--red); box-shadow: 0 0 6px rgba(248,113,113,0.6); }
        .vital-dot.unknown { background: var(--text-dim); }
        .vital-timestamp {
            font-size: 11px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Mobile vitals collapse */
        @media (max-width: 768px) {
            .vitals-inner { padding: 0 16px; }
            .vital-label { display: none; }
            .vital-item { padding: 11px 12px; gap: 6px; }
        }

        /* ============================================================
           REPORT HEADER
        ============================================================ */
        .container { max-width: 1400px; margin: 0 auto; padding: 28px 48px 80px; }

        .report-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 28px; gap: 24px;
        }
        .report-title h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.8px; margin-bottom: 4px; }
        .report-meta { font-size: 13px; color: var(--text-dim); display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        .report-meta .dot { width: 4px; height: 4px; background: var(--border); border-radius: 50%; }

        /* Overall Score ring */
        .score-ring-wrapper { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .score-ring { width: 80px; height: 80px; position: relative; flex-shrink: 0; }
        .score-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .score-ring circle { fill: none; stroke-width: 6; }
        .score-ring .bg { stroke: var(--surface-2); }
        .score-ring .fg { stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
        .score-ring .score-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700;
        }
        .score-ring-label {
            font-size: 10px; color: var(--text-dim); white-space: nowrap; text-align: center;
        }

        /* Score cards */
        .scores-row {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 28px;
        }
        .score-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
            padding: 16px; text-align: center;
        }
        .score-card-value { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; margin-bottom: 4px; }
        .score-card-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        /* ============================================================
           8-TAB NAVIGATION
        ============================================================ */
        .tabs-nav {
            display: flex;
            gap: 2px;
            margin-bottom: 28px;
            background: var(--surface);
            padding: 4px;
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tabs-nav::-webkit-scrollbar { display: none; }
        .tab-btn {
            flex-shrink: 0;
            padding: 9px 16px;
            border-radius: 8px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--text-dim);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .tab-btn.active {
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .tab-btn:hover:not(.active) { color: var(--text); }
        .tab-badge {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 10px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }
        .tab-badge-crit { background: rgba(248,113,113,0.2); color: var(--red); }
        .tab-badge-warn { background: rgba(251,191,36,0.2); color: var(--yellow); }
        .tab-badge-ok { background: rgba(52,211,153,0.15); color: var(--green); }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ============================================================
           SHARED CARD / SECTION COMPONENTS
        ============================================================ */
        .section { margin-bottom: 20px; }
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px; background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px 10px 0 0; cursor: pointer; user-select: none;
        }
        .section-header h3 { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .section-header .tag {
            font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
        }
        .tag-critical { background: rgba(248, 113, 113, 0.15); color: var(--red); }
        .tag-warning { background: rgba(251, 191, 36, 0.15); color: var(--yellow); }
        .tag-ok { background: rgba(52, 211, 153, 0.15); color: var(--green); }
        .section-toggle { font-size: 18px; color: var(--text-dim); transition: transform 0.2s; }
        .section-body {
            background: var(--surface); border: 1px solid var(--border); border-top: none;
            border-radius: 0 0 10px 10px; padding: 20px; overflow: hidden;
        }
        .section.collapsed .section-body { display: none; }
        .section.collapsed .section-toggle { transform: rotate(-90deg); }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .card h3 {
            font-size: 15px; font-weight: 600; margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }

        /* ============================================================
           TABLES
        ============================================================ */
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .data-table th {
            text-align: left; padding: 9px 12px; color: var(--text-dim); font-weight: 500;
            text-transform: uppercase; letter-spacing: 1px; font-size: 11px;
            border-bottom: 1px solid var(--border);
        }
        .data-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table .mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; }
        .raw-table { width: 100%; border-collapse: collapse; font-size: 11px; font-family: 'JetBrains Mono', monospace; margin-top: 4px; }
        .raw-table th { text-align: left; padding: 5px 10px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 1px solid var(--border); font-size: 10px; }
        .raw-table td { padding: 5px 10px; border-bottom: 1px solid rgba(42,42,48,0.5); color: var(--text-dim); }
        .raw-table tr:last-child td { border-bottom: none; }

        .bar-cell { min-width: 100px; }
        .bar-track { width: 100%; height: 5px; background: var(--surface-2); border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
        .bar-fill.fill-ok { background: var(--green); }
        .bar-fill.fill-warn { background: var(--yellow); }
        .bar-fill.fill-crit { background: var(--red); }

        .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; }
        .dot-ok { background: var(--green); }
        .dot-warn { background: var(--yellow); }
        .dot-crit { background: var(--red); }
        .dot-dim { background: var(--text-dim); }

        /* ============================================================
           AI ANALYSIS
        ============================================================ */
        .ai-analysis {
            background: var(--surface); border: 1px solid rgba(240, 168, 48, 0.2);
            border-radius: 10px; padding: 28px; margin-bottom: 20px;
        }
        .ai-analysis-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
        .ai-analysis-header h3 { font-size: 17px; font-weight: 600; }
        .ai-pulse {
            width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
            animation: pulse 2s ease-in-out infinite; flex-shrink: 0;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .ai-content { line-height: 1.8; color: var(--text); }
        .ai-content h2 { font-size: 17px; margin: 20px 0 10px; color: var(--accent); }
        .ai-content h3 { font-size: 14px; margin: 14px 0 6px; }
        .ai-content p { margin-bottom: 10px; }
        .ai-content ul, .ai-content ol { margin: 6px 0 10px 20px; }
        .ai-content li { margin-bottom: 4px; }
        .ai-content code { font-family: 'JetBrains Mono', monospace; font-size: 12px; background: var(--surface-2); padding: 2px 6px; border-radius: 4px; }
        .ai-content pre { background: var(--surface-2); border-radius: 8px; padding: 14px; margin: 10px 0; overflow-x: auto; }
        .ai-content pre code { background: none; padding: 0; font-size: 12px; line-height: 1.7; color: var(--green); }
        .ai-content strong { color: var(--text); }
        .ai-content em { color: var(--accent); font-style: normal; }

        /* ============================================================
           STRUCTURED RECOMMENDATIONS — confidence badges + evidence
        ============================================================ */
        .rec-list { display: flex; flex-direction: column; gap: 12px; margin-top: 4px; }
        .rec-item {
            border: 1px solid var(--border); border-radius: 10px;
            overflow: hidden; background: var(--surface);
        }
        .rec-item.sev-critical { border-color: rgba(248,113,113,0.35); }
        .rec-item.sev-warning  { border-color: rgba(251,191,36,0.35); }
        .rec-item.sev-info     { border-color: rgba(99,179,237,0.25); }
        .rec-header {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 14px 16px; cursor: pointer; user-select: none;
        }
        .rec-header:hover { background: rgba(255,255,255,0.02); }
        .rec-badges { display: flex; align-items: center; gap: 6px; flex-shrink: 0; margin-top: 2px; }
        .confidence-badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 8px; border-radius: 5px; font-size: 11px; font-weight: 600;
            letter-spacing: .04em; white-space: nowrap;
        }
        .conf-high   { background: rgba(52,211,153,0.12); color: #34d399; border: 1px solid rgba(52,211,153,0.25); }
        .conf-medium { background: rgba(251,191,36,0.12); color: #fbbf24; border: 1px solid rgba(251,191,36,0.25); }
        .conf-low    { background: rgba(251,146,60,0.12); color: #fb923c; border: 1px solid rgba(251,146,60,0.25); }
        .sev-mini-badge {
            display: inline-flex; align-items: center; padding: 2px 7px;
            border-radius: 4px; font-size: 11px; font-weight: 600; letter-spacing: .03em;
        }
        .sev-mini-crit { background: rgba(248,113,113,0.12); color: #f87171; }
        .sev-mini-warn { background: rgba(251,191,36,0.12); color: #fbbf24; }
        .sev-mini-info { background: rgba(99,179,237,0.12); color: #63b3ed; }
        .rec-title { font-size: 14px; font-weight: 500; color: var(--text); flex: 1; line-height: 1.4; }
        .rec-toggle { color: var(--text-dim); font-size: 13px; flex-shrink: 0; margin-top: 3px; transition: transform .2s; }
        .rec-item.open .rec-toggle { transform: rotate(180deg); }
        .rec-body { border-top: 1px solid var(--border); padding: 14px 16px; display: none; }
        .rec-item.open .rec-body { display: block; }
        .evidence-block {
            background: var(--surface-2); border-radius: 7px; padding: 10px 14px;
            margin-bottom: 12px; font-size: 12.5px; color: var(--text-dim); line-height: 1.6;
        }
        .evidence-label {
            font-size: 10.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
            color: var(--text-dim); margin-bottom: 4px; opacity: .7;
        }
        .rec-fix-block {
            background: rgba(10,10,20,0.5); border-radius: 7px;
            padding: 12px 14px; margin-top: 8px; border: 1px solid rgba(240,168,48,0.15);
        }
        .rec-fix-remediate { border-color: rgba(52,211,153,0.2); }
        .rec-fix-diagnostic { border-color: rgba(99,179,237,0.2); }
        .rec-fix-label-row {
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
        }
        .rec-fix-label {
            font-size: 10.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
            color: var(--accent); opacity: .9;
        }
        .rec-fix-label-diag { color: #63b3ed; }
        .rec-fix-code {
            font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 12px; color: #a5f3b4;
            white-space: pre-wrap; word-break: break-word; line-height: 1.6;
        }
        .rec-fix-code-diag { color: #93c5fd; }
        .rec-copy-btn {
            background: rgba(240,168,48,0.12); border: 1px solid rgba(240,168,48,0.3);
            color: var(--accent); font-size: 11px; padding: 3px 10px; border-radius: 5px;
            cursor: pointer; font-weight: 600; white-space: nowrap; flex-shrink: 0;
        }
        .rec-copy-btn:hover { background: rgba(240,168,48,0.22); }
        .rec-copy-btn-diag { background: rgba(99,179,237,0.1); border-color: rgba(99,179,237,0.3); color: #63b3ed; }
        .rec-copy-btn-diag:hover { background: rgba(99,179,237,0.2); }
        .evidence-text { font-size: 12.5px; color: var(--text-dim); line-height: 1.6; }
        .rec-tab-link { font-size: 12px; color: var(--text-dim); margin-top: 8px; display: flex; align-items: center; gap: 5px; }
        .conf-icon-high   { content: '🟢'; }
        .conf-icon-medium { content: '🟡'; }
        .conf-icon-low    { content: '🟠'; }
        .rec-header-main { flex: 1; min-width: 0; }
        .rec-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; flex-wrap: wrap; }

        /* ============================================================
           FINDINGS (AI SUMMARY TAB)
        ============================================================ */
        .findings-header {
            display: flex; align-items: center; gap: 16px; margin-bottom: 20px;
        }
        .findings-counter {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 500;
        }
        .counter-crit { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
        .counter-warn { background: rgba(251,191,36,0.1); color: var(--yellow); border: 1px solid rgba(251,191,36,0.2); }
        .counter-ok { background: rgba(52,211,153,0.1); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }

        .finding-item {
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 10px;
            overflow: hidden;
        }
        .finding-item.sev-critical { border-left: 3px solid var(--red); }
        .finding-item.sev-warning { border-left: 3px solid var(--yellow); }
        .finding-item.sev-ok { border-left: 3px solid var(--green); }

        .finding-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 16px; cursor: pointer; background: var(--surface);
            user-select: none;
        }
        .finding-header:hover { background: var(--surface-2); }
        .finding-header-left { display: flex; align-items: center; gap: 12px; }
        .sev-badge {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .sev-critical { background: rgba(248,113,113,0.15); color: var(--red); }
        .sev-warning { background: rgba(251,191,36,0.15); color: var(--yellow); }
        .sev-ok { background: rgba(52,211,153,0.15); color: var(--green); }

        .finding-metric { font-size: 14px; font-weight: 500; }
        .finding-value { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); }
        .finding-toggle { font-size: 16px; color: var(--text-dim); transition: transform 0.2s; }
        .finding-item.collapsed .finding-toggle { transform: rotate(-90deg); }

        .finding-body {
            padding: 16px; background: var(--surface-2);
            border-top: 1px solid var(--border);
        }
        .finding-item.collapsed .finding-body { display: none; }
        .finding-rec { font-size: 13px; color: var(--text-dim); margin-bottom: 12px; line-height: 1.6; }
        .fix-command {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--green);
            line-height: 1.7;
            overflow-x: auto;
            position: relative;
        }
        .copy-btn {
            position: absolute; right: 8px; top: 8px;
            background: var(--surface-2); border: 1px solid var(--border);
            color: var(--text-dim); font-size: 11px; padding: 3px 8px;
            border-radius: 4px; cursor: pointer; font-family: 'Space Grotesk', sans-serif;
            transition: all 0.2s;
        }
        .copy-btn:hover { color: var(--text); border-color: var(--accent); }

        /* ============================================================
           INSTANCE GRID
        ============================================================ */
        .instance-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
        }
        .instance-item {
            background: var(--surface-2); border-radius: 6px; padding: 12px 14px;
        }
        .instance-item .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .instance-item .value { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; }

        /* ============================================================
           SQL BLOCK
        ============================================================ */
        .sql-block {
            background: var(--surface-2); border-radius: 6px; padding: 12px 16px;
            font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.8;
            color: var(--text-dim); overflow-x: auto; margin: 8px 0;
        }

        /* ============================================================
           WORKFLOW MAILER RUNBOOK PANEL
        ============================================================ */
        .runbook-panel {
            border: 1px solid var(--accent);
            background: var(--accent-dim);
            border-radius: 10px;
            margin-top: 16px;
            overflow: hidden;
        }
        .runbook-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 18px; cursor: pointer; user-select: none;
        }
        .runbook-header:hover { background: rgba(240,168,48,0.08); }
        .runbook-title {
            font-size: 13px; font-weight: 600; color: var(--accent);
            display: flex; align-items: center; gap: 8px;
        }
        .runbook-toggle { font-size: 14px; color: var(--accent); transition: transform 0.2s; }
        .runbook-panel.collapsed .runbook-toggle { transform: rotate(-90deg); }
        .runbook-body { padding: 0 18px 18px; display: block; }
        .runbook-panel.collapsed .runbook-body { display: none; }
        .runbook-note {
            font-size: 11px; color: var(--accent); background: rgba(240,168,48,0.1);
            border-radius: 5px; padding: 6px 12px; margin-bottom: 14px;
        }
        .runbook-step { margin-bottom: 14px; }
        .runbook-step-heading {
            font-size: 12px; font-weight: 600; color: var(--text);
            margin-bottom: 6px; letter-spacing: 0.3px;
        }
        .runbook-step-note {
            font-size: 11px; color: var(--text-dim); margin-top: 4px;
        }
        .runbook-code {
            background: var(--bg); border: 1px solid rgba(240,168,48,0.25);
            border-radius: 6px; padding: 10px 14px;
            font-family: 'JetBrains Mono', monospace; font-size: 12px;
            color: var(--green); line-height: 1.8; overflow-x: auto;
            position: relative; white-space: pre;
        }
        .runbook-code.shell-block { color: #93c5fd; }

        /* ============================================================
           SQL TUNING RECOMMENDATIONS PANEL
        ============================================================ */
        .tuning-panel {
            border: 1px solid rgba(240,168,48,0.4);
            background: rgba(240,168,48,0.04);
            border-radius: 8px;
            margin-top: 12px;
            overflow: hidden;
        }
        .tuning-panel-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 16px; cursor: pointer; user-select: none;
        }
        .tuning-panel-header:hover { background: rgba(240,168,48,0.07); }
        .tuning-panel-title {
            font-size: 12px; font-weight: 600; color: var(--accent);
            display: flex; align-items: center; gap: 8px;
        }
        .tuning-panel-toggle { font-size: 13px; color: var(--accent); transition: transform 0.2s; }
        .tuning-panel.collapsed .tuning-panel-toggle { transform: rotate(-90deg); }
        .tuning-panel-body { padding: 0 16px 16px; }
        .tuning-panel.collapsed .tuning-panel-body { display: none; }
        .tuning-load-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 14px; border-radius: 6px; font-family: 'Space Grotesk', sans-serif;
            font-size: 12px; font-weight: 500; cursor: pointer;
            background: transparent; color: var(--accent);
            border: 1px solid rgba(240,168,48,0.4);
            transition: all 0.2s;
        }
        .tuning-load-btn:hover { background: rgba(240,168,48,0.1); border-color: var(--accent); }
        .tuning-load-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .tuning-redflag {
            display: flex; align-items: flex-start; gap: 8px;
            font-size: 12px; margin-bottom: 6px; line-height: 1.5;
        }
        .tuning-redflag-icon { flex-shrink: 0; margin-top: 1px; }
        .tuning-section-label {
            font-size: 11px; font-weight: 600; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 1px;
            margin: 12px 0 6px;
        }
        .tuning-code-wrap {
            background: var(--bg); border: 1px solid rgba(240,168,48,0.2);
            border-radius: 6px; padding: 10px 14px;
            font-family: 'JetBrains Mono', monospace; font-size: 11px;
            color: var(--green); line-height: 1.7; overflow-x: auto;
            position: relative; white-space: pre;
        }
        .tuning-copy-btn {
            position: absolute; right: 8px; top: 8px;
            background: var(--surface-2); border: 1px solid var(--border);
            color: var(--text-dim); font-size: 10px; padding: 3px 8px;
            border-radius: 4px; cursor: pointer; font-family: 'Space Grotesk', sans-serif;
            transition: all 0.2s;
        }
        .tuning-copy-btn:hover { color: var(--text); border-color: var(--accent); }
        .tuning-unlicensed-note {
            font-size: 12px; color: var(--text-dim);
            background: rgba(255,255,255,0.03); border-radius: 5px;
            padding: 8px 12px; border-left: 3px solid var(--border);
            margin-top: 8px;
        }

        /* ============================================================
           PLACEHOLDER TABS
        ============================================================ */
        .placeholder-card {
            background: var(--surface);
            border: 1px dashed var(--border);
            border-radius: 12px;
            padding: 48px 32px;
            text-align: center;
            margin-bottom: 20px;
        }
        .placeholder-icon { font-size: 36px; margin-bottom: 16px; opacity: 0.5; }
        .placeholder-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        .placeholder-desc { font-size: 14px; color: var(--text-dim); max-width: 480px; margin: 0 auto; line-height: 1.7; }
        .wave-badge {
            display: inline-block; margin-top: 16px;
            background: rgba(96,165,250,0.1); border: 1px solid rgba(96,165,250,0.2);
            color: var(--blue); font-size: 12px; font-weight: 500;
            padding: 4px 12px; border-radius: 100px;
        }

        .coming-soon-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 24px;
        }
        .coming-soon-item {
            background: var(--surface-2); border-radius: 8px; padding: 16px;
            text-align: left;
        }
        .coming-soon-item .cs-label { font-size: 12px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
        .coming-soon-item .cs-desc { font-size: 12px; color: var(--text-dim); line-height: 1.5; }

        /* ============================================================
           CONFIG & SIZING TABLE
        ============================================================ */
        .config-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .config-table th {
            text-align: left; padding: 9px 12px; color: var(--text-dim); font-weight: 500;
            text-transform: uppercase; letter-spacing: 1px; font-size: 11px;
            border-bottom: 1px solid var(--border); background: var(--surface-2);
        }
        .config-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
        .config-table tr:last-child td { border-bottom: none; }
        .config-table .mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; }
        .sized-ok { color: var(--green); font-size: 11px; font-weight: 600; }
        .sized-warn { color: var(--yellow); font-size: 11px; font-weight: 600; }
        .sized-crit { color: var(--red); font-size: 11px; font-weight: 600; }

        /* Stat mini cards (used in Undo/Temp/Config) */
        .stat-mini { background: var(--surface-2, #1a1a1e); border-radius: 8px; padding: 12px 14px; min-width: 0; }
        .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
        .stat-val { font-size: 15px; font-weight: 600; color: var(--text); }

        /* ============================================================
           LOADING / ERROR / CANCEL STATES
        ============================================================ */
        .analyzing-state { text-align: center; padding: 80px 20px; }
        .analyzing-spinner {
            width: 48px; height: 48px; border: 3px solid var(--border);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .analyzing-text { color: var(--text-dim); font-size: 15px; }
        .cancel-btn {
            display: inline-block; margin-top: 20px; padding: 10px 24px;
            background: transparent; border: 1px solid rgba(248,113,113,0.4);
            color: var(--red, #f87171); border-radius: 8px; cursor: pointer;
            font-size: 13px; font-weight: 500; transition: all 0.2s;
        }
        .cancel-btn:hover { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.7); }

        /* ============================================================
           EXECUTIVE SUMMARY CARD
           Gold accent border, sparkle icon — first thing a DBA sees.
        ============================================================ */
        .exec-summary-card {
            background: var(--surface);
            border: 1.5px solid rgba(240,168,48,0.45);
            border-radius: 14px;
            padding: 22px 26px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }
        .exec-summary-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, #f0a830 0%, rgba(240,168,48,0.15) 100%);
        }
        .exec-summary-header {
            display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
        }
        .exec-summary-sparkle {
            font-size: 18px; line-height: 1;
        }
        .exec-summary-label {
            font-size: 11px; font-weight: 600; color: var(--accent);
            text-transform: uppercase; letter-spacing: 1.2px;
        }
        .exec-summary-text {
            font-size: 14.5px; line-height: 1.7; color: var(--text);
            margin-bottom: 16px;
        }
        .exec-summary-text p { margin-bottom: 8px; }
        .exec-summary-text ul, .exec-summary-text ol { margin: 4px 0 8px 20px; }
        .exec-summary-text li { margin-bottom: 3px; }
        .exec-summary-text strong { color: var(--text); }
        .exec-summary-text h2 { font-size: 14px; margin: 12px 0 6px; color: var(--accent); }
        .exec-summary-text h3 { font-size: 13px; margin: 10px 0 4px; }
        .exec-summary-action {
            display: flex; align-items: flex-start; gap: 12px;
            background: rgba(240,168,48,0.06);
            border: 1px solid rgba(240,168,48,0.18);
            border-radius: 8px;
            padding: 12px 16px;
        }
        .exec-summary-action-icon {
            font-size: 16px; margin-top: 1px; flex-shrink: 0;
        }
        .exec-summary-action-body {
            flex: 1; min-width: 0;
        }
        .exec-summary-action-label {
            font-size: 10px; font-weight: 600; color: var(--accent);
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;
        }
        .exec-summary-action-text {
            font-size: 13.5px; color: var(--text); line-height: 1.55;
        }
        .exec-summary-generating {
            display: flex; align-items: center; gap: 10px;
            font-size: 13px; color: var(--text-dim);
        }
        .exec-summary-generating-dot {
            width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
            animation: execPulse 1.4s ease-in-out infinite;
        }
        @keyframes execPulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* EBS variant of exec-summary-card — blue accent instead of gold */
        .exec-summary-card-ebs {
            border-color: rgba(96,165,250,0.45);
        }
        .exec-summary-card-ebs::before {
            background: linear-gradient(90deg, #60a5fa 0%, rgba(96,165,250,0.15) 100%);
        }
        .exec-summary-card-ebs .exec-summary-label {
            color: #60a5fa;
        }
        .exec-summary-card-ebs .exec-summary-action {
            background: rgba(96,165,250,0.06);
            border-color: rgba(96,165,250,0.18);
        }
        .exec-summary-card-ebs .exec-summary-action-label {
            color: #60a5fa;
        }
        .exec-summary-ebs-link {
            margin-left: auto;
            font-size: 11px;
            color: #60a5fa;
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 0.02em;
        }
        .exec-summary-ebs-link:hover { text-decoration: underline; }

        /* Detected Applications chip section */
        .detected-apps-section {
            margin-bottom: 24px;
            padding: 16px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        .detected-apps-header {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 12px;
        }
        .detected-apps-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .detected-app-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: rgba(96,165,250,0.08);
            border: 1px solid rgba(96,165,250,0.3);
            border-radius: 8px;
            font-size: 13px;
            color: #60a5fa;
        }
        .detected-app-chip-icon { font-size: 14px; }
        .detected-app-chip-label { font-weight: 500; }
        .detected-app-chip-link {
            font-size: 12px;
            font-weight: 600;
            color: #60a5fa;
            text-decoration: none;
            padding: 2px 8px;
            background: rgba(96,165,250,0.12);
            border-radius: 4px;
        }
        .detected-app-chip-link:hover { background: rgba(96,165,250,0.22); }

        /* Findings subsection headers (DB Critical / EBS Critical) */
        .findings-subsection-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }
        .findings-subsection-icon { font-size: 14px; }
        .findings-subsection-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
        }
        .findings-subsection-count {
            font-size: 11px;
            color: var(--text-dim);
            background: var(--surface-2);
            padding: 2px 8px;
            border-radius: 10px;
        }

        /* ============================================================
           MAINTENANCE WINDOWS PANEL
        ============================================================ */
        .maint-load-btn {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 8px 16px; border-radius: 6px; font-family: 'Space Grotesk', sans-serif;
            font-size: 13px; font-weight: 500; cursor: pointer;
            background: transparent; color: var(--text-dim);
            border: 1px solid var(--border); transition: all 0.2s;
        }
        .maint-load-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
        .maint-load-btn:disabled { opacity: 0.55; cursor: not-allowed; }

        .maint-client-row {
            display: flex; align-items: center; gap: 14px;
            padding: 12px 0; border-bottom: 1px solid var(--border); flex-wrap: wrap;
        }
        .maint-client-row:last-child { border-bottom: none; }
        .maint-traffic-dot {
            width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
        }
        .maint-traffic-dot.green  { background: var(--green);  box-shadow: 0 0 6px rgba(52,211,153,0.6); }
        .maint-traffic-dot.amber  { background: var(--yellow); box-shadow: 0 0 6px rgba(251,191,36,0.5); }
        .maint-traffic-dot.red    { background: var(--red);    box-shadow: 0 0 6px rgba(248,113,113,0.6); }
        .maint-traffic-dot.unknown{ background: var(--text-dim); }
        .maint-client-name { font-size: 13px; font-weight: 500; flex: 1; min-width: 160px; text-transform: capitalize; }
        .maint-client-meta { font-size: 12px; color: var(--text-dim); display: flex; gap: 14px; flex-wrap: wrap; }
        .maint-client-meta span { white-space: nowrap; }
        .maint-tag { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.3px; }
        .maint-tag-enabled   { background: rgba(52,211,153,0.15);  color: var(--green);  }
        .maint-tag-disabled  { background: rgba(248,113,113,0.15); color: var(--red);    }
        .maint-tag-amber     { background: rgba(251,191,36,0.15);  color: var(--yellow); }
        .maint-tag-unknown   { background: rgba(136,136,160,0.15); color: var(--text-dim);}

        .maint-window-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px; margin-top: 12px;
        }
        .maint-window-card {
            border: 1px solid var(--border); border-radius: 8px;
            padding: 12px 14px; font-size: 12px;
        }
        .maint-window-card.disabled { border-color: rgba(248,113,113,0.4); background: rgba(248,113,113,0.04); }
        .maint-window-name { font-weight: 600; font-size: 12px; margin-bottom: 6px; color: var(--text); }
        .maint-window-detail { color: var(--text-dim); margin-bottom: 3px; }

        .maint-stale-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        .maint-stale-table th {
            text-align: left; padding: 6px 10px;
            font-size: 10px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.7px; color: var(--text-dim);
            border-bottom: 1px solid var(--border);
        }
        .maint-stale-table td {
            padding: 7px 10px; border-bottom: 1px solid rgba(42,42,48,0.7);
            font-family: 'JetBrains Mono', monospace; vertical-align: middle;
        }
        .maint-stale-table tr:last-child td { border-bottom: none; }
        .maint-stale-table tr:hover td { background: rgba(255,255,255,0.02); }

        .maint-enable-block {
            background: rgba(10,10,12,0.7);
            border: 1px solid var(--border); border-radius: 8px;
            padding: 14px 18px; margin-top: 16px; position: relative;
        }
        .maint-enable-block-label {
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.7px; color: var(--text-dim); margin-bottom: 8px;
        }
        .maint-enable-code {
            font-family: 'JetBrains Mono', monospace; font-size: 12px;
            color: var(--text); white-space: pre; overflow-x: auto;
        }
        .maint-enable-copy {
            position: absolute; top: 12px; right: 14px;
            font-family: 'Space Grotesk', sans-serif; font-size: 11px;
            font-weight: 500; cursor: pointer; padding: 3px 10px;
            border-radius: 4px; border: 1px solid var(--border);
            background: transparent; color: var(--text-dim); transition: all 0.2s;
        }
        .maint-enable-copy:hover { border-color: var(--accent); color: var(--accent); }

        /* ============================================================
           ORACLE PARAMETERS PANEL
        ============================================================ */
        .params-cat-collapsed .params-cat-body { display: none; }
        .params-row-red td { background: rgba(248,113,113,0.03); }
        .params-row-amber td { background: rgba(251,191,36,0.03); }
        .params-row:hover td { background: rgba(255,255,255,0.02) !important; }

        /* ============================================================
           ADDM FINDINGS PANEL
        ============================================================ */
        .addm-not-licensed {
            background: rgba(99,102,241,0.06);
            border: 1px solid rgba(99,102,241,0.25);
            border-radius: 10px;
            padding: 20px 24px;
            display: flex; align-items: flex-start; gap: 16px;
        }
        .addm-not-licensed-icon {
            font-size: 24px; flex-shrink: 0; line-height: 1;
        }
        .addm-not-licensed-title {
            font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 6px;
        }
        .addm-not-licensed-body {
            font-size: 13px; color: var(--text-dim); line-height: 1.6;
        }
        .addm-finding-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 14px;
            overflow: hidden;
        }
        .addm-finding-card.sev-critical { border-color: rgba(239,68,68,0.45); }
        .addm-finding-card.sev-warning  { border-color: rgba(234,179,8,0.45); }
        .addm-finding-header {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; cursor: pointer; user-select: none;
            background: rgba(255,255,255,0.02);
        }
        .addm-finding-header:hover { background: rgba(255,255,255,0.04); }
        .addm-finding-card.sev-critical .addm-finding-header { background: rgba(239,68,68,0.06); }
        .addm-finding-card.sev-warning  .addm-finding-header { background: rgba(234,179,8,0.05); }
        .addm-impact-badge {
            font-size: 11px; font-weight: 700; padding: 2px 7px;
            border-radius: 4px; flex-shrink: 0; letter-spacing: 0.3px;
        }
        .addm-impact-crit { background: rgba(239,68,68,0.18); color: var(--red); }
        .addm-impact-warn { background: rgba(234,179,8,0.18); color: var(--yellow); }
        .addm-impact-info { background: rgba(99,102,241,0.15); color: #a5b4fc; }
        .addm-finding-name {
            flex: 1; font-size: 13px; font-weight: 600; color: var(--text); min-width: 0;
        }
        .addm-finding-type-tag {
            font-size: 10px; padding: 2px 6px; border-radius: 3px;
            background: rgba(255,255,255,0.07); color: var(--text-dim);
            flex-shrink: 0; letter-spacing: 0.4px;
        }
        .addm-finding-toggle { font-size: 12px; color: var(--text-dim); flex-shrink: 0; transition: transform 0.2s; }
        .addm-finding-card.collapsed .addm-finding-toggle { transform: rotate(-90deg); }
        .addm-finding-body { padding: 14px 16px; border-top: 1px solid var(--border); }
        .addm-finding-card.collapsed .addm-finding-body { display: none; }

<body>
    <div class="grain"></div>

    <nav id="nav-root"></nav>

    <!-- ── Page toolbar: context-sensitive action buttons ── -->
    <div class="page-toolbar" id="page-toolbar">
      <a href="/connections" class="toolbar-link">New Check</a>
      <a href="/reports" class="toolbar-link">All Reports</a>
      <span class="toolbar-sep" id="toolbar-sep" style="display:none"></span>
      <span id="toolbar-export-slot" style="display:inline-flex;align-items:center;gap:8px;"></span>
    </div>

    <!-- ============================================================
         STICKY VITALS BAR
    ============================================================ -->
    <div id="vitalsBar">
        <div class="vitals-inner" id="vitalsInner">
            <!-- populated by JS -->
        </div>
    </div>

    <!-- ============================================================
         MAIN CONTENT
    ============================================================ -->
    <div class="container" id="reportContent">
        <div class="analyzing-state" id="loadingState">
            <div class="analyzing-spinner"></div>
            <p class="analyzing-text">Loading report...</p>
        </div>
    </div>

    <script>
    console.log('[TuneVault] report.html build: 2026-06-11-ebs-ops-v1');
    const reportId = window.location.pathname.split('/').pop();
    let pollTimer = null;
    let reportLoadedAt = null;
    let summaryPollTimer = null;
    let summaryPollCount = 0;
    let reportPollCount = 0;
    const SUMMARY_POLL_MAX = 30; // max attempts (2s interval = 60s total — covers 55s OpenAI timeout + DB write)
    const REPORT_POLL_MAX = 60; // max attempts (2s interval = 120s total — covers collection phase + 55s AI timeout + DB write)

    // Absolute 120s safety net — if spinner is still visible after 120s from page load,
    // force-replace it with a fallback message so the user is never stuck indefinitely.
    // Old value was 60s, which fired prematurely because collection (20-30s) + analysis (55s)
    // + network overhead could easily exceed 60s from page load.
    const PAGE_LOAD_TIME = Date.now();
    setTimeout(function absoluteSpinnerFallback() {
        // Only fire if the report hasn't finished loading
        if (reportLoadedAt) return;
        // Final check: do one last poll before showing fallback — the analysis may have
        // completed between the last poll and this timer firing.
        fetch('/api/health-checks/' + reportId).then(r => r.json()).then(data => {
            if (data.status === 'completed' || data.status === 'error') {
                // Analysis actually finished — render it instead of showing timeout
                try { renderReport(data); } catch(e) { console.error('Late render failed:', e); }
                stopElapsedTicker();
                reportLoadedAt = new Date();
                return;
            }
            // Genuinely timed out — show fallback
            reportLoadedAt = new Date();
            if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
            stopElapsedTicker();

            // Handle collecting/connecting stuck state — spinner lives in #reportContent directly
            if (data.status === 'connecting' || data.status === 'collecting') {
                var phase = data.status === 'connecting' ? 'connect to' : 'collect metrics from';
                document.getElementById('reportContent').innerHTML =
                    '<div class="analyzing-state">' +
                    '<p class="analyzing-text" style="color:var(--red)">Connection timed out</p>' +
                    '<p style="color:var(--text-dim);font-size:13px;margin-top:8px;max-width:420px;line-height:1.5">' +
                    'Could not ' + phase + ' the Oracle database within 2 minutes. ' +
                    'Verify the agent is running and the Oracle SID/service name exists on the target server.</p>' +
                    '<div style="margin-top:16px;display:flex;gap:10px;justify-content:center">' +
                    '<a href="/dashboard" class="nav-btn">Back to Dashboard</a>' +
                    '<button onclick="location.reload()" style="padding:8px 20px;background:var(--accent);color:#000;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px">\u21bb Retry</button>' +
                    '</div></div>';
                return;
            }

            var aiSpinner = document.querySelector('.ai-analysis .analyzing-state');
            if (aiSpinner) {
                aiSpinner.closest('.ai-analysis').innerHTML =
                    '<div class="ai-analysis-header"><div class="ai-pulse"></div><h3>AI Analysis</h3></div>' +
                    '<div class="ai-content"><p>AI analysis timed out. The health check data is available in the tabs above.</p>' +
                    '<button onclick="location.reload()" style="margin-top:12px;padding:8px 20px;background:var(--accent);color:#000;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px">\u21bb Refresh to check again</button></div>';
            }
            var summaryGen = document.querySelector('.exec-summary-generating');
            if (summaryGen) {
                var summaryCard = summaryGen.closest('.exec-summary-card');
                if (summaryCard) {
                    summaryCard.innerHTML = '<div class="exec-summary-header"><span class="exec-summary-sparkle">\u2726</span><span class="exec-summary-label">TuneVault AI Summary</span></div><div class="exec-summary-text" style="color:var(--text-dim)">Summary generation timed out. Review the findings below for details.</div>';
                }
            }
            var mainLoader = document.getElementById('loadingState');
            if (mainLoader) {
                mainLoader.innerHTML = '<p class="analyzing-text">Loading timed out.</p><button onclick="location.reload()" style="margin-top:12px;padding:8px 20px;background:var(--accent);color:#000;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px">\u21bb Retry</button><p style="margin-top:12px;font-size:12px;color:#9898a8">Still stuck? <a href="mailto:support@tunevault.app" style="color:#f0a830;text-decoration:none;">support@tunevault.app</a></p>';
            }
        }).catch(function() {
            // Network error on final poll — show fallback
            reportLoadedAt = new Date();
            if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
            stopElapsedTicker();
            // Best-effort: replace whatever spinner is visible
            var rc = document.getElementById('reportContent');
            var collectSpinner = rc && rc.querySelector('.analyzing-state');
            if (collectSpinner && !document.querySelector('.ai-analysis')) {
                // Still in connecting/collecting phase — replace entire content
                rc.innerHTML =
                    '<div class="analyzing-state">' +
                    '<p class="analyzing-text" style="color:var(--red)">Connection timed out</p>' +
                    '<p style="color:var(--text-dim);font-size:13px;margin-top:8px;max-width:420px;line-height:1.5">' +
                    'Could not reach the Oracle database within 2 minutes. Verify the agent is running.</p>' +
                    '<div style="margin-top:16px;display:flex;gap:10px;justify-content:center">' +
                    '<a href="/dashboard" class="nav-btn">Back to Dashboard</a>' +
                    '<button onclick="location.reload()" style="padding:8px 20px;background:var(--accent);color:#000;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px">\u21bb Retry</button>' +
                    '</div></div>';
            } else {
                var aiSpinner = document.querySelector('.ai-analysis .analyzing-state');
                if (aiSpinner) {
                    aiSpinner.closest('.ai-analysis').innerHTML =
                        '<div class="ai-analysis-header"><div class="ai-pulse"></div><h3>AI Analysis</h3></div>' +
                        '<div class="ai-content"><p>AI analysis timed out. The health check data is available in the tabs above.</p>' +
                        '<button onclick="location.reload()" style="margin-top:12px;padding:8px 20px;background:var(--accent);color:#000;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px">\u21bb Refresh to check again</button></div>';
                }
            }
        });
    }, 120000);

    // EBS spinner safety net — fires even after report loads, specifically targets
    // the EBS summary card's generating spinner. This catches the case where the
    // report rendered with status='completed' but ebs_summary was still null.
    setTimeout(function ebsSpinnerSafetyNet() {
        var ebsCard = document.getElementById('ebs-summary-card');
        if (ebsCard && ebsCard.querySelector('.exec-summary-generating')) {
            ebsCard.innerHTML = '<div class="exec-summary-header"><span class="exec-summary-sparkle">✦</span><span class="exec-summary-label">EBS Application Status</span><a href="/ebs-deep" class="exec-summary-ebs-link">Open EBS Monitor &rarr;</a></div><div class="exec-summary-text" style="color:var(--text-dim)">EBS summary timed out. Check the EBS sections below for operational details.</div><button onclick="location.reload()" style="margin-top:8px;padding:6px 16px;background:transparent;color:var(--accent);border:1px solid var(--accent);border-radius:6px;cursor:pointer;font-weight:600;font-size:12px">↻ Retry</button>';
            // Stop any lingering summary poll
            if (summaryPollTimer) { clearTimeout(summaryPollTimer); summaryPollTimer = null; }
        }
    }, 30000); // 30s — acceptance criteria says show error if exceeds 30s

    // Live elapsed ticker — increments #aiAnalyzingText every second between polls
    // so the counter doesn't feel frozen. Uses monotonic tracking: only advances the
    // base when the server reports a HIGHER value to prevent jump-backs caused by
    // stale heartbeat values arriving on consecutive polls.
    let elapsedTickerInterval = null;
    let elapsedTickerBase = 0; // highest server-reported elapsed seen so far
    let elapsedTickerRenderTime = 0; // Date.now() when base was last updated
    let elapsedTickerHighWater = 0; // highest displayed seconds — never go backwards
    // Track when we first entered 'analyzing' status for client-side elapsed fallback
    let analysisStartedAt = 0;
    function startElapsedTicker(serverElapsedMs) {
        // Record when analysis phase was first detected
        if (!analysisStartedAt) analysisStartedAt = Date.now();
        const serverMs = serverElapsedMs || 0;
        // Only update base if server reports a higher value (prevents jump-backs
        // from stale heartbeat values arriving between 5s server heartbeat intervals)
        if (serverMs > elapsedTickerBase || !elapsedTickerInterval) {
            elapsedTickerBase = serverMs;
            elapsedTickerRenderTime = Date.now();
        }
        if (elapsedTickerInterval) return; // already ticking — don't restart
        elapsedTickerInterval = setInterval(() => {
            const el = document.getElementById('aiAnalyzingText');
            if (!el) { clearInterval(elapsedTickerInterval); elapsedTickerInterval = null; return; }
            const nowMs = elapsedTickerBase + (Date.now() - elapsedTickerRenderTime);
            const sec = Math.round(nowMs / 1000);
            // Never display a lower number than previously shown
            if (sec < elapsedTickerHighWater) return;
            elapsedTickerHighWater = sec;
            const stageMatch = el.textContent.match(/^([^—]+)/);
            const stageLabel = stageMatch ? stageMatch[1].trim() : 'Analyzing';
            el.innerHTML = `${stageLabel} &mdash; ${sec}s elapsed`;
        }, 1000);
    }
    function stopElapsedTicker() {
        if (elapsedTickerInterval) { clearInterval(elapsedTickerInterval); elapsedTickerInterval = null; }
    }

    // ============================================================
    // CANCEL
    // ============================================================
    async function cancelHealthCheck() {
        if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
        try {
            await fetch('/api/health-checks/' + reportId + '/cancel', { method: 'POST' });
            loadReport();
        } catch (err) {
            alert('Failed to cancel health check.');
        }
    }

    // ============================================================
    // LOAD + POLL
    // ============================================================
    async function loadReport() {
        // Prevent double-rendering if report is already loaded
        if (reportLoadedAt) return;

        try {
            const res = await fetch('/api/health-checks/' + reportId);
            if (!res.ok) {
                document.getElementById('reportContent').innerHTML = '<div class="analyzing-state"><p class="analyzing-text">Report not found.</p><a href="/dashboard" class="nav-btn" style="margin-top:16px;display:inline-block">Back to Dashboard</a></div>';
                reportLoadedAt = new Date(); // stop polling
                return;
            }
            const data = await res.json();

            // Wrap renderReport in try-catch -- render errors must NOT leave spinner visible
            let renderOk = false;
            try {
                renderReport(data);
                renderOk = true;
            } catch (renderErr) {
                console.error('Report render failed:', renderErr);
                document.getElementById('reportContent').innerHTML = '<div class="analyzing-state"><p class="analyzing-text">Report data could not be displayed.</p><p style="color:var(--text-dim);font-size:13px;margin-top:8px">If the report was run with a limited-privilege user, some data sections may be unavailable.</p><a href="/dashboard" class="nav-btn" style="margin-top:16px;display:inline-block">Back to Dashboard</a></div>';
                reportLoadedAt = new Date(); // stop polling on render failure
                return;
            }

            if (!renderOk) {
                reportLoadedAt = new Date();
                return;
            }

            if (data.status !== 'completed' && data.status !== 'error') {
                reportPollCount++;

                // Stale analysis detection — if the server reports >90s of GPT elapsed time,
                // the 55s timeout should have already fired. Show fallback immediately
                // instead of polling further (handles page refresh after stuck state).
                // Note: analysis_elapsed_ms now only counts GPT time (not collection), so
                // 90s genuinely means the GPT call has been running 90s past its 55s limit.
                const serverElapsed = data.analysis_elapsed_ms || 0;
                const isStale = data.status === 'analyzing' && serverElapsed > 90000;

                // Start/refresh live elapsed ticker (only if not stale)
                if (data.status === 'analyzing' && !isStale) {
                    startElapsedTicker(data.analysis_elapsed_ms || 0);
                }
                if (isStale || reportPollCount >= REPORT_POLL_MAX) {
                    // Safety net: health check took too long — show fallback with retry
                    const displayElapsed = elapsedTickerHighWater || Math.round(serverElapsed/1000) || Math.round(reportPollCount * 2);
                    console.warn('Health check timeout: status=' + data.status + ' ' + (isStale ? 'stale server state (' + Math.round(serverElapsed/1000) + 's elapsed)' : 'poll limit reached (' + (reportPollCount * 2) + 's)'));
                    stopElapsedTicker();
                    reportLoadedAt = new Date();

                    // Handle collecting/connecting stuck state — spinner lives in #reportContent directly
                    if (data.status === 'connecting' || data.status === 'collecting') {
                        var phase = data.status === 'connecting' ? 'connect to' : 'collect metrics from';
                        document.getElementById('reportContent').innerHTML =
                            '<div class="analyzing-state">' +
                            '<p class="analyzing-text" style="color:var(--red)">Connection timed out</p>' +
                            '<p style="color:var(--text-dim);font-size:13px;margin-top:8px;max-width:420px;line-height:1.5">' +
                            'Could not ' + phase + ' the Oracle database within ' + displayElapsed + 's. ' +
                            'Verify the agent is running and the Oracle SID/service name exists on the target server.</p>' +
                            '<div style="margin-top:16px;display:flex;gap:10px;justify-content:center">' +
                            '<a href="/dashboard" class="nav-btn">Back to Dashboard</a>' +
                            '<button onclick="location.reload()" style="padding:8px 20px;background:var(--accent);color:#000;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px">↻ Retry</button>' +
                            '</div></div>';
                        return;
                    }

                    // Handle analyzing stuck state — spinner lives in .ai-analysis
                    var aiSpinner = document.querySelector('.ai-analysis .analyzing-state');
                    if (aiSpinner) {
                        aiSpinner.closest('.ai-analysis').innerHTML = '<div class="ai-analysis-header"><div class="ai-pulse"></div><h3>AI Analysis</h3></div>' +
                            '<div class="ai-content">' +
                            '<p>AI analysis timed out after ' + displayElapsed + 's. The health check data is available in the tabs above.</p>' +
                            '<button onclick="location.reload()" style="margin-top:12px;padding:8px 20px;background:var(--accent);color:#000;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px">\u21bb Refresh to check again</button>' +
                            '</div>';
                    }
                    // Also fix the exec summary card if still showing spinner
                    var summaryCard = document.querySelector('.exec-summary-generating');
                    if (summaryCard) {
                        var card = summaryCard.closest('.exec-summary-card');
                        if (card) {
                            card.innerHTML = '<div class="exec-summary-header"><span class="exec-summary-sparkle">\u2726</span><span class="exec-summary-label">TuneVault AI Summary</span></div><div class="exec-summary-text" style="color:var(--text-dim)">Summary generation timed out. Review the findings below for details.</div>';
                        }
                    }
                } else {
                    pollTimer = setTimeout(loadReport, 2000);
                }
            } else {
                stopElapsedTicker();
                reportLoadedAt = new Date();
                // Fallback: ensure export buttons are present when polling settles on
                // 'completed'. injectExportButtons() is idempotent — no-ops if buttons
                // were already injected during the 'analyzing' phase for app-tier reports.
                injectExportButtons();
                // If report is completed but AI summary or EBS summary hasn't arrived yet,
                // start a lightweight poller that only updates the summary cards.
                // EBS case: ebs_summary may still be null if the fire-and-forget
                // generateExecutiveSummary() hasn't finished yet (race condition fix).
                const hasEbsData = data.metrics && data.metrics.ebs_detected;
                if (data.status === 'completed' && (!data.summary_text || (hasEbsData && !data.ebs_summary))) {
                    startSummaryPoll();
                }
            }
        } catch (err) {
            console.error('Failed to load report:', err);
            document.getElementById('reportContent').innerHTML = '<div class="analyzing-state"><p class="analyzing-text">Failed to load report.</p><p style="color:var(--text-dim);font-size:13px;margin-top:8px">' + (err.message || 'Unknown error') + '</p><a href="/dashboard" class="nav-btn" style="margin-top:16px;display:inline-block">Back to Dashboard</a></div>';
            reportLoadedAt = new Date(); // stop polling on fetch error
        }
    }

    // ============================================================
    // SUMMARY POLL — lightweight poller for AI executive summary
    // Runs after report is rendered but summary_text is still null.
    // Only updates the exec-summary card DOM, no full re-render.
    // ============================================================
    function startSummaryPoll() {
        summaryPollCount = 0;
        if (summaryPollTimer) clearTimeout(summaryPollTimer);
        summaryPollTimer = setTimeout(pollForSummary, 2000);
    }

    async function pollForSummary() {
        summaryPollCount++;
        if (summaryPollCount > SUMMARY_POLL_MAX) {
            // Give up — replace spinners with fallback messages so user isn't stuck
            summaryPollTimer = null;
            // Handle main summary card timeout
            const card = document.querySelector('.exec-summary-card:not(.exec-summary-card-ebs)');
            if (card && card.querySelector('.exec-summary-generating')) {
                card.innerHTML = `<div class="exec-summary-header">
                    <span class="exec-summary-sparkle">✦</span>
                    <span class="exec-summary-label">TuneVault AI Summary</span>
                </div>
                <div class="exec-summary-text" style="color:var(--text-dim)">Executive summary could not be generated at this time.</div>
                <button onclick="location.reload()" style="margin-top:8px;padding:6px 16px;background:transparent;color:var(--accent);border:1px solid var(--accent);border-radius:6px;cursor:pointer;font-weight:600;font-size:12px">↻ Retry</button>`;
            }
            // Handle EBS summary card timeout — the main fix for the infinite spinner bug
            const ebsCard = document.getElementById('ebs-summary-card');
            if (ebsCard && ebsCard.querySelector('.exec-summary-generating')) {
                ebsCard.innerHTML = `<div class="exec-summary-header">
                    <span class="exec-summary-sparkle">✦</span>
                    <span class="exec-summary-label">EBS Application Status</span>
                    <a href="/ebs-deep" class="exec-summary-ebs-link">Open EBS Monitor &rarr;</a>
                </div>
                <div class="exec-summary-text" style="color:var(--text-dim)">EBS summary could not be generated. Check the EBS sections below for details.</div>
                <button onclick="location.reload()" style="margin-top:8px;padding:6px 16px;background:transparent;color:var(--accent);border:1px solid var(--accent);border-radius:6px;cursor:pointer;font-weight:600;font-size:12px">↻ Retry</button>`;
            }
            return;
        }
        try {
            const res = await fetch('/api/health-checks/' + reportId);
            if (!res.ok) { summaryPollTimer = null; return; }
            const data = await res.json();

            // Update core DB summary card if ready
            if (data.summary_text) {
                const card = document.getElementById('exec-summary-card');
                if (card) {
                    let html = `<div class="exec-summary-header">
                        <span class="exec-summary-sparkle">✦</span>
                        <span class="exec-summary-label">TuneVault AI Summary</span>
                    </div>
                    <div class="exec-summary-text">${markdownToHtml(data.summary_text)}</div>`;
                    if (data.top_action) {
                        html += `<div class="exec-summary-action">
                            <span class="exec-summary-action-icon">⚡</span>
                            <div class="exec-summary-action-body">
                                <div class="exec-summary-action-label">Top Action Now</div>
                                <div class="exec-summary-action-text">${esc(data.top_action)}</div>
                            </div>
                        </div>`;
                    }
                    card.innerHTML = html;
                }
            }

            // Update EBS summary card if ready
            const ebsCard = document.getElementById('ebs-summary-card');
            if (ebsCard && data.ebs_summary) {
                let ebsHtml = `<div class="exec-summary-header">
                    <span class="exec-summary-sparkle">✦</span>
                    <span class="exec-summary-label">EBS Application Status</span>
                    <a href="/ebs-deep" class="exec-summary-ebs-link">Open EBS Monitor &rarr;</a>
                </div>
                <div class="exec-summary-text">${markdownToHtml(data.ebs_summary)}</div>`;
                if (data.ebs_action) {
                    ebsHtml += `<div class="exec-summary-action">
                        <span class="exec-summary-action-icon">⚡</span>
                        <div class="exec-summary-action-body">
                            <div class="exec-summary-action-label">EBS Action Now</div>
                            <div class="exec-summary-action-text">${esc(data.ebs_action)}</div>
                        </div>
                    </div>`;
                }
                ebsCard.innerHTML = ebsHtml;
            }

            // Check if everything we need is present — stop polling only when both
            // core DB summary AND EBS summary (if EBS detected) have arrived
            const hasEbsMetrics = data.metrics && data.metrics.ebs_detected;
            const allReady = data.summary_text && (!hasEbsMetrics || data.ebs_summary);
            if (allReady) {
                summaryPollTimer = null;
                return;
            }

            // Not all summaries ready yet — keep polling
            summaryPollTimer = setTimeout(pollForSummary, 2000);
        } catch (err) {
            // Network error — retry once more
            summaryPollTimer = setTimeout(pollForSummary, 3000);
        }
    }

    function renderVitalsBarAppTier(data) {
        const bar   = document.getElementById('vitalsBar');
        const inner = document.getElementById('vitalsInner');
        if (!data || !data.metrics) { bar.style.display = 'none'; return; }
        const m = data.metrics;
        const score = data.overall_score || 0;
        const critCount = (m.findings || []).filter(f => f.severity === 'critical').length;
        const warnCount = (m.findings || []).filter(f => f.severity === 'warning').length;
        const scoreClass = score >= 85 ? 'ok' : score >= 70 ? 'warn' : 'crit';
        const checkedAt = new Date(data.created_at);
        const minutesAgo = Math.floor((Date.now() - checkedAt.getTime()) / 60000);
        const timeAgo = minutesAgo < 1 ? 'just now' : minutesAgo < 60 ? minutesAgo + 'm ago' : Math.floor(minutesAgo/60) + 'h ago';

            <div class="vital-item">
                <div class="vital-dot ${scoreClass}"></div>

                <div class="vital-dot crit"></div>
                <span class="vital-label">Critical</span>
                <span class="vital-value">${critCount}</span>

            ${warnCount > 0 ? `<div class="vital-item">
                <div class="vital-dot warn"></div>

                <span class="vital-value">${warnCount}</span>

            <div class="vital-item">
