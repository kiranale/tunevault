    // ============================================================
    // TAB SWITCHING
    // ============================================================
    function switchTab(name, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        const panel = document.getElementById('tab-' + name);
        if (panel) panel.classList.add('active');
    }

    function navigateToCheck(checkId, tabName) {
        var tabMap = {
            'EBS Checks': 'appchecks',
            'Performance': 'performance',
            'Storage': 'storage',
            'Backup & Recovery': 'backup',
            'Config & Sizing': 'config',
            'Indexes': 'indexes',
            'OS Stats': 'os',
            'Housekeeping': 'housekeeping',
            'Blocking': 'blocking'
        };
        var tabId = tabMap[tabName];
        if (!tabId) return;
        var panel = document.getElementById('tab-' + tabId);
        if (!panel) return;
        document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
        panel.classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(function(b) {
            b.classList.remove('active');
            var oc = b.getAttribute('onclick') || '';
            if (oc.indexOf("'" + tabId + "'") > -1) b.classList.add('active');
        });
        if (checkId) {
            setTimeout(function() {
                var el = document.getElementById('check-' + checkId)
                      || document.querySelector('[id*="' + checkId + '"]');
                if (el) {
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    el.style.outline = '2px solid var(--accent)';
                    setTimeout(function() { el.style.outline = ''; }, 2000);
                }
            }, 200);
        }
    }

    // ============================================================
    // BUILD FINDINGS (aggregated from metrics)
    // ============================================================
    function buildFindings(data) {
        const findings = [];
        const m = data.metrics;
        const s = data.scores;

        // Tablespace findings
        if (m.tablespaces) {
            m.tablespaces.forEach(t => {
                if (t.pct_used > 90) {
                    findings.push({
                        severity: 'critical',
                        category: 'Storage',
                        metric: t.name + ' Tablespace',
                        value: t.pct_used + '% used (' + t.used_gb + ' GB / ' + t.total_gb + ' GB)',
                        recommendation: 'Tablespace is ' + t.pct_used + '% full. Add datafiles or enable AUTOEXTEND immediately.',
                        fix: t.autoextend
                            ? `-- Add a datafile to ${t.name}\nALTER TABLESPACE ${t.name} ADD DATAFILE SIZE 2G AUTOEXTEND ON MAXSIZE UNLIMITED;`
                            : `-- Enable AUTOEXTEND on existing datafile\nALTER DATABASE DATAFILE '/path/to/datafile.dbf' AUTOEXTEND ON NEXT 512M MAXSIZE UNLIMITED;\n-- Or add new datafile\nALTER TABLESPACE ${t.name} ADD DATAFILE SIZE 2G AUTOEXTEND ON MAXSIZE UNLIMITED;`
                    });
                } else if (t.pct_used > 80) {
                    findings.push({
                        severity: 'warning',
                        category: 'Storage',
                        metric: t.name + ' Tablespace',
                        value: t.pct_used + '% used — approaching limit',
                        recommendation: 'Tablespace is above 80%. Monitor closely and plan expansion.',
                        fix: `ALTER TABLESPACE ${t.name} ADD DATAFILE SIZE 1G AUTOEXTEND ON MAXSIZE UNLIMITED;`
                    });
                }
            });
        }

        // Wait event findings
        if (m.wait_events) {
            m.wait_events.filter(w => w.pct_db_time > 10).forEach(w => {
                findings.push({
                    severity: 'critical',
                    category: 'Performance',
                    metric: 'Wait Event: ' + w.event,
                    value: w.pct_db_time + '% DB time — ' + w.wait_class,
                    recommendation: w.wait_class === 'Application'
                        ? 'Application lock contention detected. Review locking patterns and long-running transactions.'
                        : w.event.toLowerCase().includes('log')
                            ? 'Redo log write contention. Consider increasing redo log size or adding log groups.'
                            : 'High wait time on ' + w.event + '. Investigate sessions waiting on this event.',
                    fix: w.event.toLowerCase().includes('log')
                        ? `-- Check redo log size\nSELECT GROUP#, BYTES/1024/1024 MB FROM V$LOG;\n-- Add larger redo logs\nALTER DATABASE ADD LOGFILE SIZE 500M;\nALTER DATABASE DROP LOGFILE GROUP <old_group>;`
                        : `-- Find sessions waiting on this event\nSELECT SID, SERIAL#, USERNAME, SQL_ID, SECONDS_IN_WAIT\nFROM V$SESSION\nWHERE EVENT = '${w.event}' AND WAIT_CLASS <> 'Idle'\nORDER BY SECONDS_IN_WAIT DESC;`
                });
            });

            m.wait_events.filter(w => w.pct_db_time > 5 && w.pct_db_time <= 10).forEach(w => {
                findings.push({
                    severity: 'warning',
                    category: 'Performance',
                    metric: 'Wait Event: ' + w.event,
                    value: w.pct_db_time + '% DB time',
                    recommendation: 'Notable wait time. Monitor trend.',
                    fix: `SELECT SID, SERIAL#, USERNAME, SQL_ID, SECONDS_IN_WAIT\nFROM V$SESSION WHERE EVENT = '${w.event}'\nORDER BY SECONDS_IN_WAIT DESC;`
                });
            });
        }

        // SQL performance findings
        if (m.top_sql) {
            m.top_sql.filter(sq => sq.elapsed_per_exec_ms > 5).forEach(sq => {
                findings.push({
                    severity: 'critical',
                    category: 'SQL',
                    metric: 'Slow SQL: ' + sq.sql_id,
                    value: sq.elapsed_per_exec_ms + 'ms/exec × ' + formatNum(sq.executions) + ' executions',
                    recommendation: sq.issue || 'High elapsed time per execution. Review execution plan, consider index or rewrite.',
                    fix: `-- Get execution plan\nSELECT * FROM TABLE(DBMS_XPLAN.DISPLAY_CURSOR('${sq.sql_id}', NULL, 'ALLSTATS LAST'));\n-- Force hard parse to refresh plan\nEXECUTE DBMS_SHARED_POOL.PURGE('${sq.sql_id}', 'C');`
                });
            });
        }

        // Index findings
        if (m.index_analysis) {
            m.index_analysis.filter(i => i.pct_deleted > 50).forEach(i => {
                findings.push({
                    severity: 'critical',
                    category: 'Indexes',
                    metric: 'Fragmented Index: ' + i.index_name,
                    value: i.pct_deleted + '% deleted entries — rebuild needed',
                    recommendation: 'Index has excessive deleted entries, degrading query performance.',
                    fix: `ALTER INDEX ${i.index_name} REBUILD ONLINE;`
                });
            });
            m.index_analysis.filter(i => i.pct_deleted > 30 && i.pct_deleted <= 50).forEach(i => {
                findings.push({
                    severity: 'warning',
                    category: 'Indexes',
                    metric: 'Index: ' + i.index_name,
                    value: i.pct_deleted + '% deleted entries',
                    recommendation: 'Consider rebuilding this index during a maintenance window.',
                    fix: `ALTER INDEX ${i.index_name} REBUILD ONLINE;`
                });
            });
        }

        // Memory findings
        if (m.sga_stats) {
            if (m.sga_stats.buffer_cache_hit_ratio < 90) {
                findings.push({
                    severity: 'critical',
                    category: 'Memory',
                    metric: 'Buffer Cache Hit Ratio',
                    value: m.sga_stats.buffer_cache_hit_ratio + '% (threshold: 90%)',
                    recommendation: 'Buffer cache hit ratio is low — too much physical I/O. Increase SGA_TARGET or DB_CACHE_SIZE.',
                    fix: `-- Increase buffer cache (adjust to available RAM)\nALTER SYSTEM SET DB_CACHE_SIZE = 4G SCOPE=BOTH;\n-- Or increase SGA_TARGET\nALTER SYSTEM SET SGA_TARGET = 8G SCOPE=BOTH;`
                });
            }
            if (m.sga_stats.shared_pool_free_pct < 5) {
                findings.push({
                    severity: 'warning',
                    category: 'Memory',
                    metric: 'Shared Pool Free Memory',
                    value: m.sga_stats.shared_pool_free_pct + '% free — very low',
                    recommendation: 'Shared pool is nearly exhausted. Increase SHARED_POOL_SIZE.',
                    fix: `ALTER SYSTEM SET SHARED_POOL_SIZE = 2G SCOPE=BOTH;`
                });
            }
            if (m.pga_stats && m.pga_stats.multipass_executions_pct > 5) {
                findings.push({
                    severity: 'warning',
                    category: 'Memory',
                    metric: 'PGA Multi-pass Executions',
                    value: m.pga_stats.multipass_executions_pct + '% — disk spill detected',
                    recommendation: 'Sort operations are spilling to disk. Increase PGA_AGGREGATE_TARGET.',
                    fix: `ALTER SYSTEM SET PGA_AGGREGATE_TARGET = 4G SCOPE=BOTH;`
                });
            }
        }

        // Undo findings
        if (m.undo_stats && m.undo_stats.current) {
            const u = m.undo_stats.current;
            const hist = m.undo_stats.historical || {};
            const ora01555Risk = hist.peak_query_length_s && u.tuned_undo_retention_s && hist.peak_query_length_s > u.tuned_undo_retention_s;
            if (ora01555Risk) {
                findings.push({
                    severity: 'critical',
                    category: 'Storage',
                    metric: 'ORA-01555 Risk (Undo Retention)',
                    value: 'Longest query ' + hist.peak_query_length_s + 's exceeds UNDO_RETENTION ' + u.tuned_undo_retention_s + 's',
                    recommendation: 'Queries are running longer than UNDO_RETENTION allows. Risk of "snapshot too old" errors.',
                    fix: `ALTER SYSTEM SET UNDO_RETENTION=${Math.ceil((hist.peak_query_length_s||1800)*1.5)} SCOPE=BOTH;\n-- Also consider expanding undo tablespace if pct_used is high`
                });
            } else if (u.pct_used > 90) {
                findings.push({
                    severity: 'critical',
                    category: 'Storage',
                    metric: 'Undo Tablespace Critical',
                    value: u.pct_used + '% used — ' + u.tablespace_name,
                    recommendation: 'Undo tablespace is critically full. Add a datafile immediately.',
                    fix: `ALTER TABLESPACE ${u.tablespace_name} ADD DATAFILE SIZE 5G AUTOEXTEND ON MAXSIZE UNLIMITED;`
                });
            } else if (u.pct_used > 80) {
                findings.push({
                    severity: 'warning',
                    category: 'Storage',
                    metric: 'Undo Tablespace High',
                    value: u.pct_used + '% used — monitor closely',
                    recommendation: 'Undo tablespace is above 80%. Plan to add a datafile.',
                    fix: `ALTER TABLESPACE ${u.tablespace_name} ADD DATAFILE SIZE 5G AUTOEXTEND ON MAXSIZE UNLIMITED;`
                });
            }
        }

        // Temp findings
        if (m.temp_stats && m.temp_stats.current) {
            const t = m.temp_stats.current;
            const hist = m.temp_stats.historical || {};
            if ((hist.peak_pct || 0) > 90 || t.pct_used > 80) {
                findings.push({
                    severity: (hist.peak_pct || 0) > 90 || t.pct_used > 90 ? 'critical' : 'warning',
                    category: 'Storage',
                    metric: 'Temp Tablespace Pressure',
                    value: 'Current: ' + t.pct_used + '%, 30d peak: ' + ((hist.peak_pct) ? hist.peak_pct + '%' : 'N/A'),
                    recommendation: 'Temp tablespace has been at risk of exhaustion. Add temp datafiles and investigate large sort consumers.',
                    fix: `ALTER TABLESPACE ${t.tablespace_name} ADD TEMPFILE SIZE 8G AUTOEXTEND ON MAXSIZE UNLIMITED;`
                });
            }
        }

        // Alert log findings
        if (m.alert_log && m.alert_log.summary) {
            const al = m.alert_log;
            al.entries && al.entries.filter(e => e.severity === 'critical').forEach(e => {
                findings.push({
                    severity: 'critical',
                    category: 'Alert Log',
                    metric: 'Alert Log Critical',
                    value: e.ts + ': ' + e.message.substring(0, 100),
                    recommendation: 'Critical alert log entry requires immediate investigation.',
                    fix: e.message.includes('ORA-01555') ? `ALTER SYSTEM SET UNDO_RETENTION=3600 SCOPE=BOTH;` : ''
                });
            });
            if (al.summary.warning > 2) {
                findings.push({
                    severity: 'warning',
                    category: 'Alert Log',
                    metric: 'Alert Log Warnings',
                    value: al.summary.warning + ' warning entries in last 24h',
                    recommendation: 'Multiple alert log warnings detected. Check for checkpoint incomplete and redo log issues.',
                    fix: `-- Check checkpoint frequency\nSELECT NAME, VALUE FROM V$PARAMETER WHERE NAME IN ('log_checkpoints_to_alert','fast_start_mttr_target');\n-- Add redo log groups if switching too fast\nALTER DATABASE ADD LOGFILE SIZE 500M;`
                });
            }
        }

        // Resource limit findings
        if (m.resource_limits && m.resource_limits.current) {
            m.resource_limits.current.filter(r => r.status === 'critical').forEach(r => {
                findings.push({
                    severity: 'critical',
                    category: 'Config',
                    metric: 'Resource Limit Critical: ' + r.resource,
                    value: 'Peak at ' + r.max_utilization + ' of ' + r.limit_display + ' limit (' + r.pct_max_used + '%)',
                    recommendation: r.resource + ' has been at ' + r.pct_max_used + '% of limit. Increase before next peak.',
                    fix: `ALTER SYSTEM SET ${r.resource.toUpperCase()}=${Math.ceil((r.limit_value||100)*1.5)} SCOPE=SPFILE;\n-- Restart required for PROCESSES`
                });
            });
            m.resource_limits.current.filter(r => r.status === 'warning').forEach(r => {
                findings.push({
                    severity: 'warning',
                    category: 'Config',
                    metric: 'Resource Limit Warning: ' + r.resource,
                    value: 'Peak at ' + r.pct_max_used + '% of limit (' + r.limit_display + ')',
                    recommendation: 'Monitor ' + r.resource + ' — approaching limit.',
                    fix: `ALTER SYSTEM SET ${r.resource.toUpperCase()}=${Math.ceil((r.limit_value||100)*1.5)} SCOPE=SPFILE;`
                });
            });
        }

        // PGA history finding
        if (m.sga_pga_history && m.sga_pga_history.pga_history) {
            const pgaHist = m.sga_pga_history.pga_history;
            const pgaTarget = m.sga_pga_history.current && m.sga_pga_history.current.pga_target_gb;
            if (pgaHist.peak_allocated_gb && pgaTarget && pgaHist.peak_allocated_gb > pgaTarget * 1.2) {
                findings.push({
                    severity: 'warning',
                    category: 'Memory',
                    metric: 'PGA Undersized (Historical)',
                    value: 'Peak ' + pgaHist.peak_allocated_gb + 'GB exceeds target ' + pgaTarget + 'GB by ' + Math.round((pgaHist.peak_allocated_gb/pgaTarget-1)*100) + '%',
                    recommendation: 'PGA_AGGREGATE_TARGET is insufficient — multipass sorts occurring. Increase to cover historical peak.',
                    fix: `ALTER SYSTEM SET PGA_AGGREGATE_TARGET=${Math.ceil(pgaHist.peak_allocated_gb*1.5)}G SCOPE=BOTH;`
                });
            }
        }

        // Add OK findings for healthy areas
        if (s.tablespace >= 75 && findings.filter(f => f.category === 'Storage').length === 0) {
            findings.push({ severity: 'ok', category: 'Storage', metric: 'All Tablespaces', value: 'All below 80% capacity', recommendation: '', fix: '' });
        }
        if (s.memory >= 75 && findings.filter(f => f.category === 'Memory').length === 0) {
            findings.push({ severity: 'ok', category: 'Memory', metric: 'SGA / PGA', value: 'Memory sizing is healthy', recommendation: '', fix: '' });
        }
        if (s.index_health >= 75 && findings.filter(f => f.category === 'Indexes').length === 0) {
            findings.push({ severity: 'ok', category: 'Indexes', metric: 'All Indexes', value: 'No fragmentation detected', recommendation: '', fix: '' });
        }

        // Sort: critical → warning → ok
        const sevOrder = { critical: 0, warning: 1, ok: 2 };
        findings.sort((a, b) => sevOrder[a.severity] - sevOrder[b.severity]);
        return findings;
    }

    // ============================================================
    // TAB 1: AI SUMMARY
    // ============================================================

    // Render a single finding card (shared between DB Critical and EBS Critical sections)
    function toggleRec(el) {
        el.classList.toggle('open');
    }

    function renderConfidenceBadge(confidence) {
        const map = {
            high:   { icon: '🟢', label: 'High Confidence',   cls: 'conf-high' },
            medium: { icon: '🟡', label: 'Medium Confidence',  cls: 'conf-medium' },
            low:    { icon: '🟠', label: 'Low — Verify First', cls: 'conf-low' }
        };
        const c = map[confidence] || map.low;
        return `<span class="confidence-badge ${c.cls}">${c.icon} ${c.label}</span>`;
    }

    function formatFindingText(rawText) {
        if (!rawText) return '';
        let t = esc(rawText);
        // Inline code: `...` → styled <code>
        t = t.replace(/`([^`\n]{1,120})`/g,
            '<code style="font-family:monospace;background:var(--surface-2);padding:1px 4px;border-radius:3px">$1</code>');
        // Option labels: insert line break before each "Option N —" and bold it
        t = t.replace(/(Option\s+\d+\s+[—–-]+)/g, '<br><strong>$1</strong>');
        // Remaining literal \n → <br>
        t = t.replace(/\n/g, '<br>');
        // Code blocks: consecutive <br>-separated lines that begin with SQL/shell keywords
        const CODE_KW = /^[ \t]*(SELECT|INSERT|UPDATE|DELETE|DECLARE|BEGIN\b|END\b|COMMIT\b|ROLLBACK\b|fnd_|sqlplus|adop|@\?|\/)/i;
        const parts = t.split('<br>');
        const out = [];
        let buf = [];
        for (const part of parts) {
            if (CODE_KW.test(part)) {
                buf.push(part);
            } else {
                if (buf.length) {
                    out.push('<pre style="background:var(--surface-2);padding:8px 12px;border-radius:6px;font-size:11px;overflow-x:auto;white-space:pre-wrap;margin:6px 0">' + buf.join('\n') + '</pre>');
                    buf = [];
                }
                out.push(part);
            }
        }
        if (buf.length) {
            out.push('<pre style="background:var(--surface-2);padding:8px 12px;border-radius:6px;font-size:11px;overflow-x:auto;white-space:pre-wrap;margin:6px 0">' + buf.join('\n') + '</pre>');
        }
        return out.join('<br>');
    }

    function renderStructuredRecommendations(recs, rawAnalysis, opts) {
        opts = opts || {};
        // Defensive: ensure recs is a valid array of objects
        if (!Array.isArray(recs)) {
            try { recs = typeof recs === 'string' ? JSON.parse(recs) : null; } catch(e) { recs = null; }
        }
        if (!recs || recs.length === 0) {
            return `<div class="ai-content">${markdownToHtml(rawAnalysis || '')}</div>`;
        }
        // Filter to only valid rec objects with required fields
        recs = recs.filter(r => r && typeof r === 'object' && r.title && r.severity);
        if (recs.length === 0) {
            return `<div class="ai-content">${markdownToHtml(rawAnalysis || '')}</div>`;
        }

        const critRecs  = recs.filter(r => r.severity === 'critical');
        const warnRecs  = recs.filter(r => r.severity === 'warning');
        const infoRecs  = recs.filter(r => r.severity === 'info');

        const sevLabel = { critical: '🔴 CRITICAL', warning: '🟡 WARNING', info: '🔵 INFO' };
        const sevCls   = { critical: 'sev-mini-crit', warning: 'sev-mini-warn', info: 'sev-mini-info' };

        function recCard(r, expanded) {
            const bodyVisible = expanded ? ' open' : '';
            // Build the action block — fix_sql if available, else diagnostic_sql
            let actionBlock = '';
            if (r.fix_sql) {
                const connParam = exportConnectionId ? '&connection=' + encodeURIComponent(exportConnectionId) : '';
                const fixHref = '/sql-console?sql=' + encodeURIComponent(r.fix_sql) + connParam;
                actionBlock = `<div class="rec-fix-block rec-fix-remediate">
                    <div class="rec-fix-label-row">
                        <span class="rec-fix-label">⚡ Exact Remediation</span>
                        <a href="${fixHref}" target="_blank" class="open-console-btn" onclick="event.stopPropagation()">Open in SQL Console →</a>
                        <button class="rec-copy-btn" onclick="event.stopPropagation(); copyRecSql(this, ${JSON.stringify(r.fix_sql)})">📋 Copy</button>
                    </div>
                    <div class="rec-fix-code">${esc(r.fix_sql)}</div>
                </div>`;
            } else if (r.diagnostic_sql) {
                const connParam = exportConnectionId ? '&connection=' + encodeURIComponent(exportConnectionId) : '';
                const diagHref = '/sql-console?sql=' + encodeURIComponent(r.diagnostic_sql) + connParam;
                actionBlock = `<div class="rec-fix-block rec-fix-diagnostic">
                    <div class="rec-fix-label-row">
                        <span class="rec-fix-label rec-fix-label-diag">🔍 Diagnostic SQL — Run This Next</span>
                        <a href="${diagHref}" target="_blank" class="open-console-btn" onclick="event.stopPropagation()">Investigate →</a>
                        <button class="rec-copy-btn rec-copy-btn-diag" onclick="event.stopPropagation(); copyRecSql(this, ${JSON.stringify(r.diagnostic_sql)})">📋 Copy</button>
                    </div>
                    <div class="rec-fix-code rec-fix-code-diag">${esc(r.diagnostic_sql)}</div>
                </div>`;
            }
            const evidenceTrimmed = (r.evidence || '').trim();
            const titleTrimmed   = (r.title   || '').trim();
            const showEvidence   = evidenceTrimmed &&
                evidenceTrimmed !== titleTrimmed &&
                !titleTrimmed.includes(evidenceTrimmed) &&
                !evidenceTrimmed.includes(titleTrimmed);
            return `<div class="rec-item sev-${r.severity}${bodyVisible}" onclick="toggleRec(this)">
                <div class="rec-header">
                    <div class="rec-header-main">
                        <div class="rec-meta">
                            <span class="sev-mini-badge ${sevCls[r.severity] || 'sev-mini-info'}">${sevLabel[r.severity] || r.severity.toUpperCase()}</span>
                            ${renderConfidenceBadge(r.confidence)}
                        </div>
                        <div class="rec-title">${formatFindingText(r.title)}</div>
                    </div>
                    <span class="rec-toggle">&#9660;</span>
                </div>
                <div class="rec-body">
                    ${showEvidence ? `<div class="evidence-block">
                        <div class="evidence-label">Evidence</div>
                        <div class="evidence-text">${formatFindingText(r.evidence)}</div>
                    </div>` : ''}
                    ${actionBlock}
                    ${r.check_tab ? `<div class="rec-tab-link">📋 See full data in: <a href="javascript:void(0)" style="color:var(--accent);text-decoration:none" onclick="event.stopPropagation();navigateToCheck(${JSON.stringify(r.check_id||'')},${JSON.stringify(r.check_tab||'')})"><strong>${esc(r.check_tab)}</strong> tab →</a></div>` : ''}
                </div>
            </div>`;
        }

        let html = `<div class="rec-list">`;

        // Critical recommendations expanded by default
        critRecs.forEach((r, i) => { html += recCard(r, true); });
        warnRecs.forEach((r, i) => { html += recCard(r, i === 0 && critRecs.length === 0); });
        infoRecs.forEach((r)     => { html += recCard(r, false); });

        html += `</div>`;

        // Collapsible raw analysis for DBAs who want the full text (open by default for EBS app-tier)
        html += `<details${opts.expandAnalysis ? ' open' : ''} style="margin-top:16px">
            <summary style="cursor:pointer;font-size:12px;color:var(--text-dim);font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:8px 0">
                📄 Full AI Analysis Text
            </summary>
            <div class="ai-content" style="margin-top:12px">${markdownToHtml(rawAnalysis)}</div>
        </details>`;

        return html;
    }

    // ── Action button helpers ─────────────────────────────────────────────────
    // Determine if a fix string is a shell command or SQL.
    // Shell markers: starts with common shell patterns or EBS script invocations.
    function _isShellFix(fix) {
        if (!fix) return false;
        const t = fix.trim();
        return /^(sh |bash |lsnrctl|adcmctl|ps |tail |cat |grep |ls |rm |find |cp |mv |echo |sudo |service |systemctl|export |source |cd |tar |gzip|srvctl|asmcmd|\$|\.\/|\/|fndlibr|sqlplus |rman |emctl|dmctl|adstrtal|adstpall|adstpdb)/i.test(t);
    }

    // Build action button(s) for a finding. Returns HTML string.
    // Uses exportConnectionId (global, set in renderReport).
    function buildActionButton(f) {
        if (!f.fix && !f.recommendation) return '';
        // Only show for non-ok severities
        if (f.severity === 'ok') return '';

        const connId = exportConnectionId;
        const sqlIcon = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>';
        const termIcon = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>';
        const arrowIcon = ' →';

        let btns = '';

        if (f.fix) {
            const isShell = _isShellFix(f.fix) || (f.category && f.category.startsWith('EBS'));
            const encoded = encodeURIComponent(f.fix);

            if (isShell) {
                // Shell fix → Terminal
                const connParam = connId ? '&connection=' + encodeURIComponent(connId) : '';
                const href = '/terminal?cmd=' + encoded + connParam;
                btns += `<a href="${href}" target="_blank" class="action-btn action-btn-terminal" title="Run in Terminal">
                    ${termIcon} Fix: Terminal${arrowIcon}
                </a>`;
            } else {
                // SQL fix → SQL Console
                const connParam = connId ? '&connection=' + encodeURIComponent(connId) : '';
                const href = '/sql-console?sql=' + encoded + connParam;
                btns += `<a href="${href}" target="_blank" class="action-btn action-btn-fix" title="Run in SQL Console">
                    ${sqlIcon} Fix This${arrowIcon}
                </a>`;
            }
        } else if (f.recommendation) {
            // No fix command — generate a diagnostic query based on the metric/category
            const diagSql = buildDiagnosticSql(f);
            if (diagSql) {
                const encoded = encodeURIComponent(diagSql);
                const connParam = connId ? '&connection=' + encodeURIComponent(connId) : '';
                const href = '/sql-console?sql=' + encoded + connParam;
                btns += `<a href="${href}" target="_blank" class="action-btn action-btn-investigate" title="Diagnostic query in SQL Console">
                    ${sqlIcon} Investigate${arrowIcon}
                </a>`;
            }
        }

        if (!btns) return '';
        return `<div class="finding-actions">${btns}</div>`;
    }

    // Generate a diagnostic SQL query based on the finding category/metric.
    // Returns a SQL string or null if no known diagnostic exists.
    function buildDiagnosticSql(f) {
        const metric = (f.metric || '').toLowerCase();
        const cat    = (f.category || '').toLowerCase();
        const val    = (f.value || '').toLowerCase();

        if (cat.includes('tablespace') || metric.includes('tablespace')) {
            return `-- Tablespace detail with autoextend & free space\nSELECT df.tablespace_name, df.file_name,\n       ROUND(df.bytes/1048576,1) AS allocated_mb,\n       ROUND(NVL(fs.bytes,0)/1048576,1) AS free_mb,\n       df.autoextensible,\n       df.maxbytes/1048576 AS max_mb\nFROM dba_data_files df\nLEFT JOIN (SELECT file_id, SUM(bytes) bytes FROM dba_free_space GROUP BY file_id) fs\n  ON fs.file_id = df.file_id\nORDER BY tablespace_name, df.file_name`;
        }
        if (cat.includes('wait') || metric.includes('wait')) {
            return `-- Top wait events (last hour)\nSELECT event, wait_class, total_waits,\n       ROUND(time_waited/100,2) AS time_waited_s,\n       ROUND(average_wait/100,4) AS avg_wait_s\nFROM v$system_event\nWHERE wait_class != 'Idle'\nORDER BY time_waited DESC\nFETCH FIRST 20 ROWS ONLY`;
        }
        if (cat.includes('sql') || metric.includes('sql') || metric.includes('top sql')) {
            return `-- Top SQL by elapsed time\nSELECT sql_id, plan_hash_value,\n       ROUND(elapsed_time/1e6,2) AS elapsed_s,\n       executions,\n       ROUND(elapsed_time/NULLIF(executions,0)/1e6,4) AS elapsed_per_exec_s,\n       SUBSTR(sql_text, 1, 120) AS sql_text\nFROM v$sql\nWHERE executions > 0\nORDER BY elapsed_time DESC\nFETCH FIRST 20 ROWS ONLY`;
        }
        if (cat.includes('session') || metric.includes('session') || metric.includes('active session')) {
            return `-- Active sessions\nSELECT sid, serial#, status, username, osuser, machine,\n       program, sql_id, event, seconds_in_wait, state\nFROM v$session\nWHERE status = 'ACTIVE' AND username IS NOT NULL\nORDER BY seconds_in_wait DESC NULLS LAST\nFETCH FIRST 30 ROWS ONLY`;
        }
        if (cat.includes('memory') || metric.includes('memory') || metric.includes('sga') || metric.includes('pga')) {
            return `-- Memory overview\nSELECT name, ROUND(value/1048576,1) AS value_mb, display_value\nFROM v$parameter\nWHERE name IN ('sga_target','sga_max_size','pga_aggregate_target','memory_target','db_cache_size')`;
        }
        if (cat.includes('backup') || metric.includes('backup') || metric.includes('rman')) {
            return `-- Recent RMAN backup status\nSELECT session_key, status,\n       TO_CHAR(start_time,'YYYY-MM-DD HH24:MI') AS start_time,\n       TO_CHAR(end_time,'YYYY-MM-DD HH24:MI') AS end_time,\n       ROUND((end_time-start_time)*1440,1) AS duration_mins\nFROM v$rman_backup_job_details\nORDER BY start_time DESC\nFETCH FIRST 10 ROWS ONLY`;
        }
        if (cat.includes('index') || metric.includes('index') || metric.includes('fragmented')) {
            return `-- Fragmented indexes (>30% deleted leaves)\nSELECT owner, index_name, table_name,\n       pct_unused, status, leaf_blocks, distinct_keys\nFROM dba_indexes\nWHERE status != 'VALID' OR pct_unused > 30\nORDER BY owner, index_name\nFETCH FIRST 50 ROWS ONLY`;
        }
        if (metric.includes('redo') || metric.includes('log switch')) {
            return `-- Log switch frequency (last 24h)\nSELECT TO_CHAR(first_time,'YYYY-MM-DD HH24') AS hour,\n       COUNT(*) AS switches\nFROM v$log_history\nWHERE first_time > SYSDATE - 1\nGROUP BY TO_CHAR(first_time,'YYYY-MM-DD HH24')\nORDER BY hour`;
        }
        if (metric.includes('undo') || cat.includes('undo')) {
            return `-- Undo usage\nSELECT tablespace_name, status, SUM(bytes)/1048576 AS mb\nFROM dba_undo_extents\nGROUP BY tablespace_name, status\nORDER BY tablespace_name, status`;
        }
        if (metric.includes('temp') || cat.includes('temp')) {
            return `-- Temp usage by session\nSELECT s.sid, s.serial#, s.username, s.osuser,\n       ROUND(tu.blocks*8192/1048576,1) AS temp_mb, tu.sqladdr\nFROM v$tempseg_usage tu\nJOIN v$session s ON s.saddr = tu.session_addr\nORDER BY tu.blocks DESC\nFETCH FIRST 20 ROWS ONLY`;
        }
        if (metric.includes('lock') || metric.includes('latch')) {
            return `-- Blocked sessions\nSELECT DISTINCT s.blocking_session AS blocker_sid,\n       s.sid AS blocked_sid, s.username, s.status,\n       s.event, s.seconds_in_wait\nFROM v$session s\nWHERE s.blocking_session IS NOT NULL\nORDER BY s.seconds_in_wait DESC`;
        }
        // Generic fallback for DB metrics
        if (!cat.startsWith('ebs')) {
            return `-- V$SESSION for current activity\nSELECT sid, serial#, status, username, event, seconds_in_wait, state, sql_id\nFROM v$session\nWHERE status != 'INACTIVE' AND username IS NOT NULL\nORDER BY seconds_in_wait DESC NULLS LAST\nFETCH FIRST 30 ROWS ONLY`;
        }
        return null;
    }

    // Maps a finding to a related blog article. Returns {url, title} or null.
    // One link max per finding — most specific match wins.
    function getBlogDeepDive(f) {
        const cat = (f.category || '').toLowerCase();
        const metric = (f.metric || '').toLowerCase();
        const val = (f.value || '').toLowerCase();
        if (cat === 'ebs-cm')
            return { url: 'https://linuxappsdba.blogspot.com/2024/04/oracle-database-performance-crisis.html', title: 'Oracle Database Performance Crisis: Analysis & Recommendations' };
        if (cat === 'ebs-wf')
            return { url: '/resources/runbooks/workflow-mailer-smtp-recovery', title: 'Runbook: Workflow Mailer SMTP Recovery' };
        if (cat === 'sql' || cat === 'performance' || cat === 'indexes' || cat === 'memory')
            return { url: 'https://linuxappsdba.blogspot.com/2024/04/oracle-database-performance-crisis.html', title: 'Oracle Database Performance Crisis: Analysis & Recommendations' };
        if (cat === 'storage') {
            // Tablespace >85% usage: link to tablespace recovery runbook
            const pctMatch = val.match(/(\d+\.?\d*)%/);
            const pct = pctMatch ? parseFloat(pctMatch[1]) : 0;
            if (pct >= 85 || metric.includes('tablespace') || metric.includes('tbs'))
                return { url: '/resources/runbooks/tablespace-full-recovery', title: 'Runbook: Tablespace Full Recovery' };
            return { url: 'https://linuxappsdba.blogspot.com/2017/08/ebs-122-cloning-procedure.html', title: 'EBS 12.2 Cloning Procedure — Complete Steps' };
        }
        if (cat === 'alert log' && metric.includes('01555'))
            return { url: 'https://linuxappsdba.blogspot.com/2025/05/oracle-zdm-zero-downtime-migration.html', title: 'Oracle ZDM — Zero Downtime Migration' };
        if (cat === 'alert log' && (metric.includes('archiv') || metric.includes('19809') || metric.includes('00257')))
            return { url: '/resources/runbooks/archive-log-destination-full', title: 'Runbook: Archive Log Destination Full' };
        if (cat === 'rman' || cat === 'backup')
            return { url: '/resources/runbooks/rman-backup-failure-triage', title: 'Runbook: RMAN Backup Failure Triage' };
        if (cat === 'ebs-opp')
            return { url: '/resources/runbooks/opp-tuning-ebs', title: 'Runbook: OPP Tuning for EBS' };
        // Upgrade-related findings — DB upgrade runbook
        if (cat === 'upgrade' || cat === 'version' ||
            metric.includes('upgrade') || metric.includes('invalid object') ||
            metric.includes('ora-39700') || metric.includes('catupgrd') ||
            metric.includes('preupgrade') || metric.includes('compatible'))
            return { url: '/resources/runbooks/oracle-db-upgrade-triage', title: 'Runbook: Oracle Database Upgrade Triage' };
        // ADOP cutover or rollback failures — specific cutover runbook
        if (cat === 'ebs-adop-cutover' ||
            metric.includes('cutover') || metric.includes('rollback') ||
            (metric.includes('adop') && (val.includes('failed') || val.includes('error') || val.includes('stall'))))
            return { url: '/resources/runbooks/adop-cutover-rollback', title: 'Runbook: ADOP Cutover Rollback' };
        // EBS patching / ADOP findings — EBS upgrade runbook
        if (cat === 'ebs-adop' || cat === 'ebs-patching' ||
            metric.includes('adop') || metric.includes('adpatch') ||
            metric.includes('autoconfig') || metric.includes('fnd_install') ||
            metric.includes('ad_bugs') || metric.includes('patch level'))
            return { url: '/resources/runbooks/ebs-upgrade-triage', title: 'Runbook: EBS Upgrade Triage' };
        // Agent tunnel / proxy connectivity failures
        if (cat === 'connectivity' || cat === 'tunnel' ||
            metric.includes('tunnel') || metric.includes('tunnel-agent') ||
            metric.includes('proxy') || (metric.includes('agent') && val.includes('unreachable')))
            return { url: '/resources/runbooks/agent-tunnel-error-1016', title: 'Runbook: TuneVault Agent Tunnel Error 1016' };
        return null;
    }

    function renderFindingCard(f, i) {
        const sevClass = f.severity === 'critical' ? 'sev-critical' :
                         f.severity === 'warning' ? 'sev-warning' : 'sev-ok';
        const emoji = f.severity === 'critical' ? '🔴' : f.severity === 'warning' ? '🟡' : '🟢';
        const expanded = f.severity === 'critical' || (i < 3);
        const deepDive = f.severity !== 'ok' ? getBlogDeepDive(f) : null;
        const deepDiveHtml = deepDive
            ? `<div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.06);">
                <a href="${deepDive.url}" target="_blank" rel="author external noopener"
                   style="display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:#9898a8;text-decoration:none;transition:color 0.15s;"
                   onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='#9898a8'">
                    📚 Related deep-dive: ${esc(deepDive.title)}
                    <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2.5 9.5L9.5 2.5M9.5 2.5H5M9.5 2.5V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </a>
               </div>`
            : '';
        return `<div class="finding-item sev-${f.severity} ${expanded ? '' : 'collapsed'}">
            <div class="finding-header" onclick="toggleFinding(this.parentElement)">
                <div class="finding-header-left">
                    <span class="sev-badge ${sevClass}">${emoji} ${f.severity.toUpperCase()}</span>
                    <div>
                        <div class="finding-metric">${esc(f.metric || f.title)}</div>
                        <div class="finding-value">${esc(f.value || f.details)}</div>
                    </div>
                </div>
                <span class="finding-toggle">&#9662;</span>
            </div>
            ${f.severity !== 'ok' ? `<div class="finding-body">
                <p class="finding-rec">${esc(f.recommendation || f.details)}</p>
                ${f.fix ? `<div style="position:relative">
                    <div class="fix-command">${esc(f.fix)}<button class="copy-btn" onclick="copyFix(this, ${JSON.stringify(f.fix)})">Copy</button></div>
                </div>` : ''}
                ${buildActionButton(f)}
                ${deepDiveHtml}
            </div>` : ''}
        </div>`;
    }

    function renderAISummaryTab(data, findings, critCount, warnCount, okCount) {
        let html = '';
        const isAppTier = !!(data.metrics && data.metrics.server_type === 'apps');
        const hasEbs = !!(data.is_ebs || (data.metrics && data.metrics.ebs_detected));
        const detectedApps = (data.metrics && data.metrics.detected_apps && data.metrics.detected_apps.length > 0)
            ? data.metrics.detected_apps : [];

        // ── TuneVault AI Executive Summary card ─────────────────
        // Core Oracle DB summary only. Never contains EBS terminology.
        // Shows at the very top if summary_text is available.
        if (data.summary_text) {
            html += `<div class="exec-summary-card" id="exec-summary-card">
                <div class="exec-summary-header">
                    <span class="exec-summary-sparkle">✦</span>
                    <span class="exec-summary-label">TuneVault AI Summary</span>
                </div>
                <div class="exec-summary-text">${markdownToHtml(data.summary_text)}</div>
                ${data.top_action ? `<div class="exec-summary-action">
                    <span class="exec-summary-action-icon">⚡</span>
                    <div class="exec-summary-action-body">
                        <div class="exec-summary-action-label">Top Action Now</div>
                        <div class="exec-summary-action-text">${esc(data.top_action)}</div>
                    </div>
                </div>` : ''}
            </div>`;
        } else if (data.status === 'completed') {
            // Completed but summary_text is null — generate a rule-based fallback immediately
            // instead of showing a "Generating..." spinner that may hang indefinitely.
            const s = data.scores || {};
            const fbCrit = findings.filter(f => f.severity === 'critical').length;
            const fbWarn = findings.filter(f => f.severity === 'warning').length;
            let fallbackSummary;
            if (isAppTier) {
                fallbackSummary = fbCrit > 0
                    ? `EBS app tier has ${fbCrit} critical finding${fbCrit !== 1 ? 's' : ''}${fbWarn > 0 ? ' and ' + fbWarn + ' warning' + (fbWarn !== 1 ? 's' : '') : ''}. Review the EBS Checks tab for details.`
                    : fbWarn > 0
                        ? `EBS app tier has ${fbWarn} warning${fbWarn !== 1 ? 's' : ''} to review. See the EBS Checks tab for details.`
                        : 'EBS app tier is healthy — all checks passed.';
            } else {
                if (s.overall != null && s.overall < 50) {
                    fallbackSummary = 'This database is in critical condition and requires immediate DBA intervention.';
                } else if (s.overall != null && s.overall < 75) {
                    fallbackSummary = 'This database is in a degraded state with several issues that need prompt attention.';
                } else {
                    fallbackSummary = 'This database is in acceptable health with minor items to monitor.';
                }
                if (fbCrit > 0) {
                    fallbackSummary += ' ' + fbCrit + ' critical issue(s) detected — review the findings below for details.';
                } else if (fbWarn > 0) {
                    fallbackSummary += ' ' + fbWarn + ' item(s) should be reviewed within the next maintenance window.';
                }
            }
            html += `<div class="exec-summary-card" id="exec-summary-card">
                <div class="exec-summary-header">
                    <span class="exec-summary-sparkle">✦</span>
                    <span class="exec-summary-label">TuneVault AI Summary</span>
                </div>
                <div class="exec-summary-text">${esc(fallbackSummary)}</div>
            </div>`;
        }

        // ── Detected Applications chip section ───────────────────
        // Renders below AI Summary card, above Health Overview.
        // Hidden when no applications detected. Supports multiple apps (EBS, SAP, PeopleSoft, etc.)
        // Each detected app is an array entry: { key, label, deepLinkRoute }
        const appChips = detectedApps.map(app => {
            const deepLink = app.key === 'EBS' ? '/ebs-deep' : (app.deepLinkRoute || null);
            return `<div class="detected-app-chip">
                <span class="detected-app-chip-icon">✦</span>
                <span class="detected-app-chip-label">${esc(app.label)} detected</span>
                ${deepLink ? `<a href="${deepLink}" class="detected-app-chip-link">Open ${esc(app.key)} Monitor &rarr;</a>` : ''}
            </div>`;
        }).join('');

        if (appChips) {
            html += `<div class="detected-apps-section" id="detected-apps-section">
                <div class="detected-apps-header">Detected Applications</div>
                <div class="detected-apps-chips">${appChips}</div>
            </div>`;
        }

        // ── EBS Application Summary card (only when EBS detected) ─
        // Separate from core DB summary — covers CM/WF/Mailer status only.
        if (hasEbs && data.ebs_summary) {
            html += `<div class="exec-summary-card exec-summary-card-ebs" id="ebs-summary-card">
                <div class="exec-summary-header">
                    <span class="exec-summary-sparkle">✦</span>
                    <span class="exec-summary-label">EBS Application Status</span>
                    <a href="/ebs-deep" class="exec-summary-ebs-link">Open EBS Monitor &rarr;</a>
                </div>
                <div class="exec-summary-text">${markdownToHtml(data.ebs_summary)}</div>
                ${data.ebs_action ? `<div class="exec-summary-action">
                    <span class="exec-summary-action-icon">⚡</span>
                    <div class="exec-summary-action-body">
                        <div class="exec-summary-action-label">EBS Action Now</div>
                        <div class="exec-summary-action-text">${esc(data.ebs_action)}</div>
                    </div>
                </div>` : ''}
            </div>`;
        } else if (hasEbs && data.status === 'completed') {
            // EBS detected but EBS summary not yet ready — show fallback instead of spinner
            html += `<div class="exec-summary-card exec-summary-card-ebs" id="ebs-summary-card">
                <div class="exec-summary-header">
                    <span class="exec-summary-sparkle">✦</span>
                    <span class="exec-summary-label">EBS Application Status</span>
                    <a href="/ebs-deep" class="exec-summary-ebs-link">Open EBS Monitor &rarr;</a>
                </div>
                <div class="exec-summary-text" style="color:var(--text-dim)">Oracle E-Business Suite detected. Check the EBS Operations tab below for detailed application-layer findings.</div>
            </div>`;
        }

        // AI analysis section
        if (data.status === 'analyzing') {
            const elapsedSec = data.analysis_elapsed_ms ? Math.round(data.analysis_elapsed_ms / 1000) : 0;
            // Stale detection: if server reports >90s elapsed, the 55s timeout should have
            // already fired. Show timeout message immediately instead of an infinite spinner.
            if (elapsedSec > 90) {
                html += `<div class="ai-analysis">
                    <div class="ai-analysis-header">
                        <div class="ai-pulse"></div>
                        <h3>AI Analysis</h3>
                    </div>
                    <div class="ai-content">
                        <p>AI analysis timed out after ${elapsedSec}s. The health check data is available in the tabs above.</p>
                        <button onclick="location.reload()" style="margin-top:12px;padding:8px 20px;background:var(--accent);color:#000;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px">↻ Refresh to check again</button>
                    </div>
                </div>`;
            } else {
                const stageLabel = data.analysis_stage === 'gpt_running' ? 'Analyzing 200+ checks'
                                 : data.analysis_stage === 'prompt_ready' ? 'Building analysis prompt'
                                 : data.analysis_stage === 'ai_pending'   ? 'Preparing analysis'
                                 : 'Collecting metrics';
                html += `<div class="ai-analysis">
                    <div class="ai-analysis-header">
                        <div class="ai-pulse"></div>
                        <h3>AI Analysis in Progress</h3>
                    </div>
                    <div class="analyzing-state" style="padding:30px 0">
                        <div class="analyzing-spinner"></div>
                        <p class="analyzing-text" id="aiAnalyzingText">${stageLabel}${elapsedSec > 0 ? ` &mdash; ${elapsedSec}s elapsed` : '...'}</p>
                        <button class="cancel-btn" onclick="cancelHealthCheck()">Cancel</button>
                    </div>
                </div>`;
            }
        } else if (data.ai_analysis || data.status === 'completed') {
            // Safely parse ai_recommendations — may be a JSON string from JSONB column
            let parsedRecs = data.ai_recommendations;
            if (typeof parsedRecs === 'string') {
                try { parsedRecs = JSON.parse(parsedRecs); } catch(e) { parsedRecs = null; }
            }
            if (!Array.isArray(parsedRecs)) parsedRecs = null;

            // If no server-side recommendations, build client-side ones from findings.
            // DB-tier findings have {metric, value, category}; EBS app-tier findings have {title, details, check_id}.
            if ((!parsedRecs || parsedRecs.length === 0) && findings && findings.length > 0) {
                parsedRecs = findings.filter(f => f.severity === 'critical' || f.severity === 'warning').slice(0, 12).map((f, i) => ({
                    id: 'rec_' + String(i + 1).padStart(3, '0'),
                    title: f.metric || f.title || 'Finding',
                    severity: f.severity,
                    confidence: 'high',
                    evidence: f.recommendation || f.details || f.value || '',
                    fix_sql: f.fix || null,
                    diagnostic_sql: null,
                    check_id: f.check_id || (f.category || 'general').toLowerCase(),
                    check_tab: isAppTier ? 'EBS Checks' : (f.category || 'Summary')
                }));
            }

            const analysisText = data.ai_analysis || '## Health Check Complete\n\nThe health check data is available in the tabs above. Review the findings below for actionable recommendations.';
            html += `<div class="ai-analysis">
                <div class="ai-analysis-header">
                    <div class="ai-pulse"></div>
                    <h3>AI Analysis</h3>
                </div>
                ${parsedRecs && parsedRecs.length > 0
                    ? renderStructuredRecommendations(parsedRecs, analysisText, { expandAnalysis: isAppTier })
                    : `<div class="ai-content">${markdownToHtml(analysisText)}</div>`
                }
            </div>`;
            // Admin debug panel — hidden from non-admins (server sets is_admin; analysis_run only populated for admins)
            if (data.is_admin && data.analysis_run) {
                const r = data.analysis_run;
                const fmt = ms => ms != null ? `${ms.toLocaleString()}ms` : '—';
                const fmtS = ms => ms != null ? `${(ms/1000).toFixed(1)}s` : '—';
                const stageRows = [
                    ['t0 → t1', 'Oracle collection', fmt(r.dur_collect_ms)],
                    ['t1 → t2', 'Prompt assembly', fmt(r.dur_prompt_ms)],
                    ['t2 → t3', 'GPT call (queued)', fmt(r.t3_gpt_call_start && r.t2_prompt_assembled ? r.t3_gpt_call_start - r.t2_prompt_assembled : null)],
                    ['t3 → t4', 'GPT inference', fmt(r.dur_gpt_ms)],
                    ['t4 → t5', 'Response parse', fmt(r.dur_parse_ms)],
                    ['t5 → t6', 'DB persist', fmt(r.dur_persist_ms)],
                    ['t0 → t6', 'Total pipeline', fmt(r.dur_total_ms)],
                ].map(([span, label, dur]) =>
                    `<tr><td style="color:var(--text-dim);font-family:monospace;font-size:12px;padding:3px 8px 3px 0">${span}</td><td style="padding:3px 8px 3px 0;font-size:12px">${label}</td><td style="font-family:monospace;font-size:12px;font-weight:600;color:${dur.includes('ms') && parseInt(dur) > 10000 ? '#f87171' : 'var(--text)'}">${dur}</td></tr>`
                ).join('');
                html += `<details style="margin-top:16px;border:1px solid var(--border);border-radius:8px;padding:12px 16px;background:var(--surface-2)">
                    <summary style="cursor:pointer;font-size:12px;color:var(--text-dim);font-weight:600;letter-spacing:.05em;text-transform:uppercase">🔧 Admin Debug — Analysis Run #${r.id}</summary>
                    <div style="margin-top:12px">
                        <table style="border-collapse:collapse;width:100%">${stageRows}</table>
                        <div style="margin-top:10px;display:flex;gap:16px;flex-wrap:wrap;font-size:12px">
                            <span>Model: <code style="font-size:12px">${r.model || '—'}</code></span>
                            <span>Tokens: <code style="font-size:12px">${r.prompt_tokens || 0} in / ${r.completion_tokens || 0} out / ${r.total_tokens || 0} total</code></span>
                            <span>Finish: <code style="font-size:12px">${r.finish_reason || '—'}</code></span>
                            <span>Outcome: <code style="font-size:12px">${r.outcome || '—'}</code></span>
                        </div>
                        ${r.error_message ? `<div style="margin-top:8px;font-size:12px;color:#f87171">Error: ${esc(r.error_message)}</div>` : ''}
                        ${r.retry_log && r.retry_log.length > 0 ? `<div style="margin-top:8px;font-size:12px;color:var(--text-dim)">Retries: ${JSON.stringify(r.retry_log)}</div>` : ''}
                    </div>
                </details>`;
            }
        }

        // Split findings: DB findings (all current findings are DB-only) vs EBS app-critical.
        // EBS application findings (CM down, WF stuck, etc.) are shown in a separate subsection.
        // This ensures non-EBS users see clean Oracle-only critical issues.
        const ebsAppFindings = hasEbs ? buildEbsFindings(data) : [];
        const dbCritCount = findings.filter(f => f.severity === 'critical').length;
        const ebsCritCount = ebsAppFindings.filter(f => f.severity === 'critical').length;

        // App tier: Evidence cards above already show all findings — skip the duplicate Critical Issues block.
        if (!isAppTier) {
            const totalCrit = critCount + ebsCritCount;
            html += `<div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border)">
                <h3 style="margin:0 0 12px;font-size:16px;font-weight:700;color:var(--text)">
                    ${totalCrit > 0 ? '🚨 Critical Issues' : '✅ Health Check Findings'}
                </h3>
            </div>`;

            html += `<div class="findings-header">
                ${totalCrit ? `<div class="findings-counter counter-crit">🔴 ${totalCrit} Critical</div>` : ''}
                ${warnCount ? `<div class="findings-counter counter-warn">🟡 ${warnCount} Warning</div>` : ''}
                ${okCount ? `<div class="findings-counter counter-ok">🟢 ${okCount} OK</div>` : ''}
            </div>`;

            if (dbCritCount > 0) {
                html += `<div class="findings-subsection-header">
                    <span class="findings-subsection-icon">🗄️</span>
                    <span class="findings-subsection-title">Database Critical</span>
                    <span class="findings-subsection-count">${dbCritCount} issue${dbCritCount > 1 ? 's' : ''}</span>
                </div>`;
            } else if (critCount === 0 && !hasEbs) {
                html += `<div style="padding:16px;border-radius:8px;background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.2);margin-bottom:12px">
                    <span style="font-size:14px;color:var(--green);font-weight:600">No critical issues detected.</span>
                    <span style="font-size:13px;color:var(--text-dim);margin-left:8px">All monitored dimensions are within healthy thresholds.</span>
                </div>`;
            }

            findings.forEach((f, i) => { html += renderFindingCard(f, i); });

            // ── Application Critical (EBS) subsection ──────────────────
            if (hasEbs && ebsAppFindings.length > 0) {
                const ebsApp = data.metrics && data.metrics.detected_apps && data.metrics.detected_apps.find(a => a.key === 'EBS');
                const ebsLabel = ebsApp ? esc(ebsApp.label) : 'EBS';
                html += `<div class="findings-subsection-header findings-subsection-header-ebs" style="margin-top:24px">
                    <span class="findings-subsection-icon">📋</span>
                    <span class="findings-subsection-title">Application Critical (${ebsLabel})</span>
                    <span class="findings-subsection-count">${ebsCritCount} critical</span>
                    <a href="/ebs-deep" style="margin-left:auto;font-size:12px;color:var(--accent);text-decoration:none;font-weight:600">Open EBS Monitor &rarr;</a>
                </div>`;
                ebsAppFindings.forEach((f, i) => { html += renderFindingCard(f, i); });
            }
        }

        return html;
    }

    // Build EBS application-layer findings from ebs_operations metrics.
    // These cover CM/WF/Mailer status — not Oracle DB metrics.
    // Returns array of findings in same format as buildFindings() DB array.
    function buildEbsFindings(data) {
        const findings = [];
        const ebsOps = data.metrics && data.metrics.ebs_operations;
        if (!ebsOps) return findings;

        const cm = ebsOps.concurrent_managers || {};
        const wf = ebsOps.workflow || {};

        // Concurrent Manager status
        if (cm.cm01) {
            const status = (cm.cm01.status || '').toLowerCase();
            if (status && status !== 'normal' && status !== 'running') {
                findings.push({
                    severity: 'critical',
                    category: 'EBS-CM',
                    metric: 'Concurrent Manager',
                    value: `Status: ${cm.cm01.status || 'UNKNOWN'}`,
                    recommendation: 'Concurrent Manager is not running normally. Use the EBS Monitor to restart it.',
                    fix: null
                });
            }
        }
        if (cm.cm02 && cm.cm02.pending_requests > 100) {
            findings.push({
                severity: 'critical',
                category: 'EBS-CM',
                metric: 'CM Pending Requests',
                value: `${cm.cm02.pending_requests} requests queued`,
                recommendation: 'Concurrent Manager queue is backed up. Check for stuck managers in the EBS Monitor.',
                fix: null
            });
        } else if (cm.cm02 && cm.cm02.pending_requests > 30) {
            findings.push({
                severity: 'warning',
                category: 'EBS-CM',
                metric: 'CM Pending Requests',
                value: `${cm.cm02.pending_requests} requests queued`,
                recommendation: 'CM queue is elevated. Monitor for worsening in the EBS Monitor.',
                fix: null
            });
        }

        // Workflow errors
        if (wf.wf02 && wf.wf02.error_count > 0) {
            findings.push({
                severity: wf.wf02.error_count > 50 ? 'critical' : 'warning',
                category: 'EBS-WF',
                metric: 'Workflow Errors',
                value: `${wf.wf02.error_count} error items in WF queue`,
                recommendation: 'Workflow error queue has items. Review in EBS Monitor Workflow section.',
                fix: null
            });
        }

        // Workflow Mailer errors
        if (wf.wf03 && wf.wf03.error_count > 0) {
            findings.push({
                severity: wf.wf03.error_count > 10 ? 'critical' : 'warning',
                category: 'EBS-WF',
                metric: 'Workflow Mailer Errors',
                value: `${wf.wf03.error_count} Mailer error notifications`,
                recommendation: 'Workflow Mailer has error notifications. Check Mailer status in EBS Monitor.',
                fix: null
            });
        }

        // Notification backlog
        if (wf.wf08 && wf.wf08.pending_over_2h > 0) {
            findings.push({
                severity: wf.wf08.pending_over_2h > 50 ? 'critical' : 'warning',
                category: 'EBS-WF',
                metric: 'Workflow Notification Backlog',
                value: `${wf.wf08.pending_over_2h} notifications stuck >2h`,
                recommendation: 'Workflow notifications are stalled. May indicate Mailer is down.',
                fix: null
            });
        }

        const sevOrder = { critical: 0, warning: 1, ok: 2 };
        findings.sort((a, b) => (sevOrder[a.severity] ?? 2) - (sevOrder[b.severity] ?? 2));
        return findings;
    }
