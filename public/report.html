    function renderAppTierReport(data) {
        const m         = data.metrics;
        const findings  = m.findings  || [];
        const checksOk  = m.checks_ok || [];
        const score     = data.overall_score || 0;
        const critCount = findings.filter(f => f.severity === 'critical').length;
        const warnCount = findings.filter(f => f.severity === 'warning').length;

        const scoreColor = score >= 85 ? 'var(--green)' : score >= 70 ? 'var(--yellow)' : 'var(--red)';
        const circumference = 2 * Math.PI * 38;
        const offset = circumference - (score / 100) * circumference;

        // Ordered check sequence for the main panel
        const MAIN_ORDER   = ['apache_status','opmn_status','admin_server','managed_servers','node_manager','apps_listener','cm_status','wf_mailer','adop_status','opp_status'];
        const SYSRES_ORDER = ['disk_usage','memory_usage','cpu_load','io_wait'];
        const EBSDB_ORDER  = ['invalid_objects','ts_usage'];
        // Checks whose raw output contains === server_name === blocks
        const MULTI_SERVER = new Set(['managed_servers']);
        // Checks whose raw output is pipe-delimited table (rendered as <table> instead of <pre>)
        const TABLE_CHECKS = new Set(['cm_status','wf_mailer','invalid_objects','ts_usage','disk_usage','memory_usage','cpu_load','io_wait']);

        // Build unified map: check_id → {isOk, title, details, severity?, raw_output?}
        const checkMap = {};
        for (const f of findings) checkMap[f.check_id] = { ...f, isOk: false };
        for (const c of checksOk)  checkMap[c.check_id] = { ...c, isOk: true  };

        function sevColor(sev) { return sev === 'critical' ? 'var(--red)' : sev === 'warning' ? 'var(--yellow)' : 'var(--green)'; }
        function sevBg(sev)    { return sev === 'critical' ? '248,113,113' : '251,191,36'; }
        function sevIcon(sev)  { return sev === 'critical' ? '✕' : '▲'; }

        // Parse "=== server_name ===" blocks from raw output
        function parseServerBlocks(raw) {
            if (!raw) return [];
            const blocks = [];
            let cur = null;
            for (const line of raw.split('\n')) {
                const bm = line.match(/^===\s+(.+?)\s+===\s*$/);
                if (bm) {
                    if (cur) blocks.push(cur);
                    cur = { name: bm[1], lines: [] };
                } else if (cur) {
                    cur.lines.push(line);
                }
            }
            if (cur) blocks.push(cur);
            return blocks;
        }

        function serverStatus(lines) {
            // Prefer the structured "Status: XXX" line injected by the proxy
            for (const l of lines) {
                const m = l.match(/^Status:\s*(\S+)/i);
                if (m) return m[1].toUpperCase();
            }
            // Fallback: pattern-match raw text
            const txt = lines.join(' ');
            if (/running|alive|started/i.test(txt))          return 'RUNNING';
            if (/stopped|failed|down|not running/i.test(txt)) return 'DOWN';
            return 'UNKNOWN';
        }

        function renderServerSubRows(raw) {
            const blocks = parseServerBlocks(raw);
            if (!blocks.length) return '';
            return `<div style="margin-top:8px;display:flex;flex-direction:column;gap:3px">` +
                blocks.map(b => {
                    const state = serverStatus(b.lines);
                    const col = state === 'RUNNING'      ? 'var(--green)'
                              : state === 'DOWN'         ? 'var(--red)'
                              : state === 'TIMEOUT'      ? 'var(--red)'
                              : state === 'NOT_DEPLOYED' ? 'var(--text-dim)'
                              : 'var(--yellow)';
                    const lbl = state === 'RUNNING'      ? 'running'
                              : state === 'DOWN'         ? 'stopped'
                              : state === 'NOT_DEPLOYED' ? 'not deployed'
                              : state === 'TIMEOUT'      ? 'timeout'
                              : 'unknown';
                    return `<div style="display:flex;gap:8px;align-items:center;font-size:12px;color:var(--text-dim)">` +
                        `<span style="color:${col}">●</span>` +
                        `<span>${esc(b.name)}: <span style="color:${col};font-weight:500">${lbl}</span></span>` +
                        `</div>`;
                }).join('') +
                `</div>`;
        }

        function renderRaw(raw) {
            if (!raw || !raw.trim()) return '';
            return `<details style="margin-top:8px">` +
                `<summary style="font-size:11px;color:var(--text-dim);cursor:pointer;user-select:none;list-style:none">` +
                `<span style="text-decoration:underline;text-underline-offset:2px">Raw output</span></summary>` +
                `<pre style="margin-top:6px;padding:8px 12px;background:rgba(0,0,0,0.3);border-radius:6px;` +
                `font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text-dim);` +
                `white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto">${esc(raw)}</pre>` +
                `</details>`;
        }

        function renderRawAsTable(raw) {
            if (!raw || !raw.trim()) return '';
            const lines = raw.trim().split('\n').filter(l => l.includes('|'));
            if (lines.length < 2) return renderRaw(raw);
            const [header, ...rows] = lines;
            const cols = header.split('|').map(c => c.trim());
            const tableHtml = '<table class="raw-table"><thead><tr>' +
                cols.map(c => '<th>' + esc(c) + '</th>').join('') +
                '</tr></thead><tbody>' +
                rows.map(r => '<tr>' + r.split('|').map(c => '<td>' + esc(c.trim()) + '</td>').join('') + '</tr>').join('') +
                '</tbody></table>';
            return `<details style="margin-top:8px">` +
                `<summary style="font-size:11px;color:var(--text-dim);cursor:pointer;user-select:none;list-style:none">` +
                `<span style="text-decoration:underline;text-underline-offset:2px">View table</span></summary>` +
                `<div style="margin-top:6px;overflow-x:auto">${tableHtml}</div>` +
                `</details>`;
        }

        function renderRow(ch) {
            if (!ch) return '';
            const raw     = ch.raw_output || '';
            const subRows = MULTI_SERVER.has(ch.check_id) ? renderServerSubRows(raw) : '';
            const rawHtml = TABLE_CHECKS.has(ch.check_id) ? renderRawAsTable(raw) : renderRaw(raw);

            if (ch.isOk) {
                return `<div id="check-${ch.check_id || ''}" style="display:flex;align-items:flex-start;gap:14px;padding:13px 18px;` +
                    `border-bottom:1px solid rgba(42,42,48,0.5)">` +
                    `<div style="color:var(--green);font-weight:700;font-size:14px;flex-shrink:0;margin-top:1px;width:18px;text-align:center">✓</div>` +
                    `<div style="flex:1;min-width:0">` +
                    `<div style="font-size:13px;font-weight:500;color:var(--text)">${esc(ch.title)}</div>` +
                    `<div style="font-size:12px;color:var(--text-dim);margin-top:2px">${esc(ch.details)}</div>` +
                    subRows + rawHtml +
                    `</div></div>`;
            }
            const sev = ch.severity || 'warning';
            return `<div id="check-${ch.check_id || ''}" style="display:flex;align-items:flex-start;gap:14px;padding:13px 18px;` +
                `background:rgba(${sevBg(sev)},0.05);` +
                `border-bottom:1px solid rgba(42,42,48,0.5);` +
                `border-left:3px solid ${sevColor(sev)}">` +
                `<div style="font-size:14px;font-weight:700;color:${sevColor(sev)};flex-shrink:0;margin-top:1px;width:18px;text-align:center">${sevIcon(sev)}</div>` +
                `<div style="flex:1;min-width:0">` +
                `<div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px">${esc(ch.title)}</div>` +
                `<div style="font-size:12px;color:var(--text-dim);line-height:1.5">${esc(ch.details)}</div>` +
                subRows + rawHtml +
                `</div></div>`;
        }

        function renderPanel(label, ids) {
            const rows = ids.map(id => renderRow(checkMap[id])).filter(Boolean);
            if (!rows.length) return '';
            return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px">` +
                `<div style="padding:11px 18px;border-bottom:1px solid var(--border)">` +
                `<span style="font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.12em">${label}</span>` +
                `</div>` + rows.join('') + `</div>`;
        }

        const metricCards = [
            { label: 'Critical Findings', value: critCount, color: critCount > 0 ? 'var(--red)'    : 'var(--green)' },
            { label: 'Warnings',          value: warnCount, color: warnCount > 0 ? 'var(--yellow)' : 'var(--text-dim)' },
            { label: 'Checks Passed',     value: checksOk.length + ' / ' + (m.checks_total || findings.length + checksOk.length), color: 'var(--green)' },
        ].map(c => `
            <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px">
                <div style="font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-dim);margin-bottom:8px;font-family:'JetBrains Mono',monospace">${c.label}</div>
                <div style="font-size:28px;font-weight:700;letter-spacing:-1px;line-height:1;color:${c.color}">${c.value}</div>
            </div>`).join('');

        const summaryBadge = critCount > 0
            ? `<span class="tab-badge tab-badge-crit">${critCount}</span>`
            : warnCount > 0 ? `<span class="tab-badge tab-badge-warn">${warnCount}</span>`
            : `<span class="tab-badge tab-badge-ok">✓</span>`;

        // Compute AI summary HTML before the template literal so any throw doesn't
        // prevent the Checks tab from rendering.
        let appAiSummaryHtml = '';
        try {
            appAiSummaryHtml = renderAISummaryTab(data, findings, critCount, warnCount, checksOk.length);
        } catch (aiErr) {
            console.error('[renderAppTierReport] renderAISummaryTab error:', aiErr);
            appAiSummaryHtml = `<div style="padding:24px;color:var(--text-dim)">AI Summary unavailable — see the EBS Checks tab for findings.</div>`;
        }

        // Compute checks panels before the template literal for the same reason.
        const appChecksHtml = (() => {
            try {
                return renderPanel('EBS App Tier Checks', MAIN_ORDER)
                     + renderPanel('EBS DB Health', EBSDB_ORDER)
                     + renderPanel('System Resources', SYSRES_ORDER)
                     + (findings.length === 0 && checksOk.length === 0
                         ? `<div style="text-align:center;padding:60px 20px;color:var(--text-dim)"><div style="font-size:32px;margin-bottom:12px;color:var(--green)">✓</div><div style="font-size:14px">All app tier checks passed.</div></div>`
                         : '');
            } catch (panelErr) {
                console.error('[renderAppTierReport] renderPanel error:', panelErr);
                return `<div style="padding:24px;color:var(--text-dim)">Panel rendering error — ${esc(panelErr.message)}</div>`;
            }
        })();

        document.getElementById('reportContent').innerHTML = `
            <div class="report-header">
                <div class="report-title">
                    <h1>${esc(data.connection_name)}</h1>
                    <div class="report-meta">
                        <span style="background:rgba(167,139,250,0.12);color:#a78bfa;border:1px solid rgba(167,139,250,0.22);border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;letter-spacing:0.04em">EBS APP TIER</span>
                        <span class="dot"></span>
                        <span>${new Date(data.created_at).toLocaleString()}</span>
                        ${m.ran_at ? `<span class="dot"></span><span style="color:var(--text-dim)">Checked ${esc(m.ran_at)}</span>` : ''}
                    </div>
                </div>
                <div class="score-section">
                    <svg width="92" height="92" viewBox="0 0 92 92">
                        <circle cx="46" cy="46" r="38" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="8"/>
                        <circle cx="46" cy="46" r="38" fill="none" stroke="${scoreColor}" stroke-width="8"
                            stroke-dasharray="${circumference.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"
                            stroke-linecap="round" transform="rotate(-90 46 46)"/>
                        <text x="46" y="46" text-anchor="middle" dy="0.35em" fill="${scoreColor}"
                              font-size="18" font-weight="700" font-family="'JetBrains Mono',monospace">${score}</text>
                    </svg>
                    <div style="font-size:11px;color:var(--text-dim);text-align:center;margin-top:4px;text-transform:uppercase;letter-spacing:0.08em">Health Score</div>
                </div>
            </div>

            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px">
                ${metricCards}
            </div>

            <!-- TAB NAV -->
            <div class="tabs-nav" id="tabsNav">
                <button class="tab-btn active" onclick="switchTab('appsummary',this)">🧠 AI Summary ${summaryBadge}</button>
                <button class="tab-btn" onclick="switchTab('appchecks',this)">🏭 EBS Checks</button>
            </div>

            <!-- TAB: AI SUMMARY -->
            <div class="tab-panel active" id="tab-appsummary">
                ${appAiSummaryHtml}
            </div>

            <!-- TAB: EBS CHECKS -->
            <div class="tab-panel" id="tab-appchecks">
                ${appChecksHtml}
            </div>
        `;
    }

    function renderVitalsBar(data) {
        const bar = document.getElementById('vitalsBar');
        const inner = document.getElementById('vitalsInner');
        if (!data || !data.metrics) { bar.style.display = 'none'; return; }

        const m = data.metrics;
        const s = data.scores || {};

        // DB status — 'analyzing' means Oracle checks succeeded (AI still running)
        const dbOk = data.status === 'completed' || data.status === 'analyzing';
        const dbClass = dbOk ? 'ok' : 'crit';

        // Uptime display: "3h 22m" if < 24h, else "14d 6h"
        function formatUptime(uptimeHours) {
            if (!uptimeHours || uptimeHours <= 0) return null;
            if (uptimeHours < 24) {
                const h = Math.floor(uptimeHours);
                const m = Math.round((uptimeHours - h) * 60);
                return h > 0 ? `${h}h ${m}m` : `${m}m`;
            }
            const d = Math.floor(uptimeHours / 24);
            const h = Math.floor(uptimeHours % 24);
            return `${d}d ${h}h`;
        }
        const uptimeStr = m.instance ? formatUptime(m.instance.uptime_hours) : null;

        // Tablespace worst
        const maxTs = m.tablespaces ? Math.max(...m.tablespaces.map(t => t.pct_used)) : 0;
        const tsClass = maxTs > 90 ? 'crit' : maxTs > 80 ? 'warn' : 'ok';

        // Overall score color
        const scoreClass = data.overall_score >= 75 ? 'ok' : data.overall_score >= 50 ? 'warn' : 'crit';

        // CPU
        const cpu = m.os_stats ? m.os_stats.avg_cpu_utilization_pct : null;
        const cpuClass = cpu > 80 ? 'crit' : cpu > 60 ? 'warn' : 'ok';

        // Memory
        const freeMemPct = m.os_stats && m.os_stats.physical_memory_gb > 0
            ? Math.round((m.os_stats.free_memory_gb / m.os_stats.physical_memory_gb) * 100) : null;
        const memClass = freeMemPct !== null ? (freeMemPct < 10 ? 'crit' : freeMemPct < 20 ? 'warn' : 'ok') : 'unknown';

        // Wait events score
        const waitClass = s.wait_events >= 75 ? 'ok' : s.wait_events >= 50 ? 'warn' : 'crit';

        // Time ago
        const checkedAt = new Date(data.created_at);
        const minutesAgo = Math.floor((Date.now() - checkedAt.getTime()) / 60000);
        const timeAgo = minutesAgo < 1 ? 'just now' : minutesAgo < 60 ? minutesAgo + ' min ago' : Math.floor(minutesAgo/60) + 'h ago';

        inner.innerHTML = `
            <div class="vital-item">
                <div class="vital-dot ${dbClass}"></div>
                <span class="vital-label">DB</span>
                <span class="vital-value">${dbOk ? 'Online' : 'Error'}${uptimeStr ? `<span style="color:var(--text-dim);font-weight:400"> · ${uptimeStr}</span>` : ''}</span>
            </div>
            <div class="vital-item">
                <div class="vital-dot ${scoreClass}"></div>
                <span class="vital-label">Score</span>
                <span class="vital-value">${data.overall_score || '—'}<span style="font-size:11px;color:var(--text-dim)">/100</span></span>
            </div>
            <div class="vital-item">
                <div class="vital-dot ${tsClass}"></div>
                <span class="vital-label">Storage</span>
                <span class="vital-value">${maxTs}<span style="font-size:11px;color:var(--text-dim)">% max</span></span>
            </div>
            <div class="vital-item">
                <div class="vital-dot ${waitClass}"></div>
                <span class="vital-label">Waits</span>
                <span class="vital-value">${s.wait_events || '—'}<span style="font-size:11px;color:var(--text-dim)">/100</span></span>
            </div>
            ${cpu !== null ? `<div class="vital-item">
                <div class="vital-dot ${cpuClass}"></div>
                <span class="vital-label">CPU</span>
                <span class="vital-value">${cpu}<span style="font-size:11px;color:var(--text-dim)">%</span></span>
            </div>` : ''}
            ${freeMemPct !== null ? `<div class="vital-item">
                <div class="vital-dot ${memClass}"></div>
                <span class="vital-label">Free RAM</span>
                <span class="vital-value">${m.os_stats.free_memory_gb}<span style="font-size:11px;color:var(--text-dim)"> GB</span></span>
            </div>` : ''}
            <div class="vital-item">
                <div class="vital-timestamp">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    Last checked: ${timeAgo}
                </div>
            </div>
        `;
        bar.style.display = 'block';
    }

    // ============================================================
    // Semver comparison — split on '.', compare each segment as integers
    // ============================================================
    function semverLt(a, b) { const pa = a.split('.').map(Number), pb = b.split('.').map(Number); for (let i = 0; i < 3; i++) { if ((pa[i]||0) < (pb[i]||0)) return true; if ((pa[i]||0) > (pb[i]||0)) return false; } return false; }

    // ============================================================
    // MAIN RENDER
    // ============================================================
    function renderReport(data) {
        // Connecting / Collecting states
        if (data.status === 'connecting' || data.status === 'collecting') {
            document.getElementById('reportContent').innerHTML = `
                <div class="analyzing-state">
                    <div class="analyzing-spinner"></div>
                    <p class="analyzing-text">${data.status === 'connecting' ? 'Connecting to Oracle database...' : 'Collecting metrics from Oracle...'}</p>
                    <p style="color:var(--text-dim);font-size:13px;margin-top:8px">${esc(data.connection_name || '')}</p>
                    <button class="cancel-btn" onclick="cancelHealthCheck()">Cancel</button>
                </div>`;
            return;
        }

        // Error state
        if (data.status === 'error') {
            // Parse DBA diagnosis embedded as JSON comment at top of ai_analysis
            let diagnosis = null;
            let analysisBody = data.ai_analysis || '';
            if (analysisBody.startsWith('<!-- DBA_DIAGNOSIS:')) {
                const end = analysisBody.indexOf(' -->');
                if (end !== -1) {
                    try {
                        diagnosis = JSON.parse(analysisBody.slice('<!-- DBA_DIAGNOSIS:'.length, end));
                        analysisBody = analysisBody.slice(end + 4).replace(/^\n+/, '');
                    } catch (e) { /* malformed JSON — show raw */ }
                }
            }

            // Connection identity line shown at top so DBA knows which connection failed
            const connUser = data.username ? esc(data.username) + ' @ ' : '';
            const connHost = data.host ? esc(data.host) : '';
            const connSvc  = data.service_name ? '/' + esc(data.service_name) : '';
            const connIdentity = connUser || connHost ? `${connUser}${connHost}${connSvc}` : '';

            let html = `
                <div class="report-header">
                    <div class="report-title">
                        <h1>${esc(data.connection_name)}</h1>
                        <div class="report-meta">
                            <span style="color:var(--red)">Connection Error</span>
                            <span class="dot"></span>
                            <span>${new Date(data.created_at).toLocaleString()}</span>
                            ${connIdentity ? `<span class="dot"></span><span style="color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:12px">${connIdentity}</span>` : ''}
                        </div>
                    </div>
                </div>`;

            // Primary DBA diagnosis banner — Oracle-specific cause + fix command
            if (diagnosis) {
                const fixBlock = diagnosis.fixCommand
                    ? `<div style="margin-top:14px"><div style="font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">Suggested fix</div><pre style="margin:0;padding:10px 14px;background:rgba(0,0,0,0.4);border:1px solid rgba(248,113,113,0.15);border-radius:6px;font-size:13px;color:#fca5a5;font-family:'JetBrains Mono',monospace;white-space:pre-wrap;word-break:break-all">${esc(diagnosis.fixCommand)}</pre></div>`
                    : '';
                html += `<div style="margin-bottom:20px;padding:20px 24px;background:rgba(248,113,113,0.07);border:1px solid rgba(248,113,113,0.25);border-radius:10px;border-left:4px solid var(--red)">
                    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                        <strong style="font-size:17px;color:var(--red);font-family:'Space Grotesk',sans-serif">${esc(diagnosis.heading)}</strong>
                    </div>
                    <div style="color:var(--text-dim);font-size:14px;line-height:1.6">${esc(diagnosis.subtext)}</div>
                    ${fixBlock}
                </div>`;
            }

            // Existing troubleshooting section — always shown below the diagnosis
            if (analysisBody) {
                html += `<div class="ai-analysis" style="border-color:rgba(248,113,113,0.2)">
                    <div class="ai-analysis-header"><h3 style="color:var(--red)">Proxy Troubleshooting</h3></div>
                    <div class="ai-content">${markdownToHtml(analysisBody)}</div>
                </div>`;
            }
            document.getElementById('reportContent').innerHTML = html;
            return;
        }

        const m = data.metrics;
