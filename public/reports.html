<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Check History — TuneVault</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0c;
      --surface: #111114;
      --surface-2: #1a1a1f;
      --border: #2a2a30;
      --text: #e8e8ed;
      --text-dim: #b8b8c8;
      --accent: #f0a830;
      --accent-dim: rgba(240, 168, 48, 0.12);
      --green: #34d399;
      --red: #f87171;
      --yellow: #fbbf24;
    }
    body {
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .grain {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999;
    }
    .nav-wrapper {
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,12,0.95);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 9999;
    }
    #nav-root {
      max-width: 1400px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 48px; gap: 16px;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 48px 80px;
    }
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      gap: 16px;
    }
    .page-header h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .page-header p {
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 4px;
    }
    .run-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      background: var(--accent);
      color: #0a0a0c;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .run-btn:hover { background: #d4921e; transform: translateY(-1px); }

    .checks-table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      text-align: left;
      padding: 11px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.03); }
    tbody tr.is-link { cursor: pointer; }
    tbody td {
      padding: 12px 16px;
      vertical-align: middle;
    }
    td a {
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
    }
    td a:hover { color: var(--accent); }

    .score-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 24px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
    }
    .score-green { background: rgba(52,211,153,0.15); color: var(--green); }
    .score-yellow { background: rgba(251,191,36,0.15); color: var(--yellow); }
    .score-red { background: rgba(248,113,113,0.15); color: var(--red); }
    .score-dim { background: rgba(255,255,255,0.06); color: var(--text-dim); }

    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .status-completed { background: rgba(52,211,153,0.12); color: var(--green); }
    .status-error { background: rgba(248,113,113,0.12); color: var(--red); }
    .status-running { background: rgba(251,191,36,0.12); color: var(--yellow); }
    .status-other { background: rgba(255,255,255,0.06); color: var(--text-dim); }

    .demo-tag {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      background: rgba(96,165,250,0.12);
      color: #60a5fa;
      margin-left: 6px;
      vertical-align: middle;
    }

    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-dim);
    }
    .empty-state h3 { font-size: 17px; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 13px; margin-bottom: 20px; }
    .empty-state a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      background: var(--accent);
      color: #0a0a0c;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
    }

    .spinner {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
      color: var(--text-dim);
      gap: 10px;
      font-size: 13px;
    }
    .spinner-ring {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .container { padding: 24px 16px 60px; }
      #nav-root { padding: 14px 16px; }
      .page-header { flex-direction: column; align-items: flex-start; }
      thead th:nth-child(3), tbody td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>
<div class="grain"></div>

<div class="nav-wrapper">
  <nav id="nav-root"></nav>
</div>

<div class="container">
  <div class="page-header">
    <div>
      <h1>Health Check History</h1>
      <p>All health check runs across your connections</p>
    </div>
    <a href="/connections" class="run-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Check
    </a>
  </div>

  <div class="checks-table-wrap">
    <div id="tableBody">
      <div class="spinner"><div class="spinner-ring"></div> Loading…</div>
    </div>
  </div>
</div>

<script src="/nav-component.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  window.tvNav.init('fleet');
});
</script>
<script>
(async function() {
  const wrap = document.getElementById('tableBody');

  function scoreClass(s) {
    if (s === null || s === undefined) return 'score-dim';
    if (s >= 85) return 'score-green';
    if (s >= 70) return 'score-yellow';
    return 'score-red';
  }

  function statusBadge(status) {
    var cls = status === 'completed' ? 'status-completed'
            : status === 'error'     ? 'status-error'
            : (status === 'analyzing' || status === 'collecting' || status === 'connecting') ? 'status-running'
            : 'status-other';
    var label = status === 'analyzing'  ? 'Running'
              : status === 'collecting' ? 'Collecting'
              : status === 'connecting' ? 'Connecting'
              : status || '—';
    return '<span class="status-badge ' + cls + '">' + label + '</span>';
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function reltime(dateStr) {
    if (!dateStr) return '—';
    var d = new Date(dateStr);
    var mins = Math.floor((Date.now() - d.getTime()) / 60000);
    if (mins < 1)  return 'just now';
    if (mins < 60) return mins + 'm ago';
    var hrs = Math.floor(mins / 60);
    if (hrs < 24)  return hrs + 'h ago';
    var days = Math.floor(hrs / 24);
    if (days < 7)  return days + 'd ago';
    return d.toLocaleDateString();
  }

  function abstime(dateStr) {
    if (!dateStr) return '';
    return new Date(dateStr).toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  try {
    var res = await fetch('/api/health-checks', { credentials: 'include' });
    if (res.status === 401) {
      window.location.href = '/signin?redirect=/reports';
      return;
    }
    var rows = await res.json();

    if (!rows.length) {
      wrap.innerHTML = '<div class="empty-state"><h3>No health checks yet</h3><p>Run your first check to see results here.</p><a href="/connections">Go to Connections</a></div>';
      return;
    }

    var html = '<table><thead><tr>' +
      '<th>Server</th>' +
      '<th>Score</th>' +
      '<th>Status</th>' +
      '<th>Date</th>' +
      '<th></th>' +
    '</tr></thead><tbody>';

    rows.forEach(function(r) {
      var score = r.overall_score;
      var scoreHtml = score !== null && score !== undefined
        ? '<span class="score-pill ' + scoreClass(score) + '">' + score + '</span>'
        : '<span class="score-pill score-dim">—</span>';
      var demoTag = r.is_demo ? '<span class="demo-tag">DEMO</span>' : '';
      var href = '/report/' + r.id;
      var linkCell = r.status === 'completed' || r.status === 'error'
        ? '<a href="' + href + '" style="font-size:12px;color:var(--accent);text-decoration:none;">View →</a>'
        : '<span style="font-size:12px;color:var(--text-dim);">—</span>';

      html += '<tr>' +
        '<td><a href="' + href + '">' + esc(r.connection_name) + demoTag + '</a></td>' +
        '<td>' + scoreHtml + '</td>' +
        '<td>' + statusBadge(r.status) + '</td>' +
        '<td title="' + esc(abstime(r.created_at)) + '" style="color:var(--text-dim);font-size:13px;">' + reltime(r.created_at) + '</td>' +
        '<td>' + linkCell + '</td>' +
      '</tr>';
    });

    html += '</tbody></table>';
    wrap.innerHTML = html;

  } catch (err) {
    wrap.innerHTML = '<div class="empty-state"><h3>Could not load history</h3><p>' + esc(err.message) + '</p></div>';
  }
})();
</script>
</body>
</html>
