<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EBS Ops — TuneVault</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://tunevault.app/ebs-ops">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0c; --surface: #111114; --surface-2: #1a1a1f; --border: #2a2a30;
      --text: #e8e8ed; --text-dim: #b8b8c8;
      --accent: #f0a830; --accent-dim: rgba(240,168,48,0.12);
      --green: #34d399; --green-dim: rgba(52,211,153,0.12);
      --red: #f87171; --red-dim: rgba(248,113,113,0.12);
      --yellow: #fbbf24; --yellow-dim: rgba(251,191,36,0.12);
      --blue: #60a5fa; --blue-dim: rgba(96,165,250,0.12);
      --purple: #a78bfa; --purple-dim: rgba(167,139,250,0.12);
    }
    body { font-family: 'Space Grotesk', -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; overflow-x: hidden; }
    .grain { position: fixed; top:0; left:0; right:0; bottom:0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events: none; z-index: 999; }
    nav { background: rgba(10,10,12,0.95); border-bottom: 1px solid var(--border); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 9999; }
    .page-wrap { max-width: 1200px; margin: 0 auto; padding: 32px 24px 80px; }

    /* ── Breadcrumb ── */
    .breadcrumb-bar { font-size: 12px; color: var(--text-dim); max-width: 1200px; margin: 0 auto; padding: 10px 24px; display: flex; align-items: center; gap: 6px; }
    .breadcrumb-bar a { color: var(--accent); text-decoration: none; }
    .breadcrumb-bar a:hover { text-decoration: underline; }
    .bc-sep { color: var(--border); }

    /* ── Toolbar ── */
    .toolbar { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }
    .toolbar h1 { font-size: 21px; font-weight: 700; flex: 1; min-width: 0; }
    .conn-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .conn-select { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: inherit; font-size: 13px; padding: 8px 12px; border-radius: 8px; min-width: 240px; cursor: pointer; }
    .conn-select:focus { outline: none; border-color: var(--accent); }

    /* ── Status dot ── */
    .status-dot-wrap { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-dim); }
    .status-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--border); flex-shrink: 0; transition: background 0.3s; }
    .status-dot.online  { background: var(--green); box-shadow: 0 0 6px rgba(52,211,153,0.45); }
    .status-dot.offline { background: var(--red); }
    .status-dot.checking { background: var(--yellow); animation: pulse-dot 1s ease-in-out infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.35} }

    /* ── No-conn banner ── */
    .no-conn-banner { display: none; align-items: flex-start; gap: 14px; background: var(--surface); border: 1px solid rgba(96,165,250,0.3); border-radius: 10px; padding: 16px 20px; margin-bottom: 28px; }
    .no-conn-banner.visible { display: flex; }
    .no-conn-banner .banner-icon { font-size: 20px; flex-shrink: 0; }
    .no-conn-banner .banner-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .no-conn-banner .banner-msg { font-size: 13px; color: var(--text-dim); }
    .no-conn-banner a { color: var(--blue); text-decoration: none; }
    .no-conn-banner a:hover { text-decoration: underline; }

    /* ── Tab bar ── */
    .tab-bar { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 28px; overflow-x: auto; scrollbar-width: none; }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab { padding: 9px 16px; font-size: 13px; font-weight: 600; white-space: nowrap; color: var(--text-dim); cursor: pointer; border: none; background: none; font-family: inherit; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s; border-radius: 6px 6px 0 0; display: flex; align-items: center; gap: 6px; }
    .tab:hover { color: var(--text); background: rgba(255,255,255,0.025); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Op cards grid ── */
    .ops-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px,1fr)); gap: 14px; margin-bottom: 8px; }

    /* ── Op card ── */
    .op-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; transition: border-color 0.15s; }
    .op-card:hover { border-color: rgba(240,168,48,0.3); }
    .op-card-header { display: flex; align-items: flex-start; gap: 11px; margin-bottom: 10px; }
    .op-icon { width: 34px; height: 34px; border-radius: 8px; background: var(--surface-2); display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
    .op-title { font-size: 14px; font-weight: 600; }
    .op-meta { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
    .op-preview { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); background: #0d0d10; border: 1px solid var(--border); border-radius: 6px; padding: 9px 11px; margin: 10px 0; white-space: pre-wrap; word-break: break-all; max-height: 72px; overflow: hidden; }
    .op-actions { display: flex; gap: 7px; flex-wrap: wrap; }
    .btn { padding: 6px 13px; border-radius: 7px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; transition: all 0.15s; font-family: inherit; display: inline-flex; align-items: center; gap: 5px; }
    .btn-run { background: var(--accent); color: #0a0a0c; }
    .btn-run:hover { background: #e09820; }
    .btn-run:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-outline { background: none; border: 1px solid var(--border); color: var(--text-dim); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Result panel ── */
    .result-panel { margin-top: 12px; display: none; border-top: 1px solid var(--border); padding-top: 4px; }
    .result-panel.visible { display: block; }
    .result-panel-hdr { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; cursor: pointer; user-select: none; }
    .result-panel-hdr:hover .result-hdr-summary { opacity: 0.85; }
    .result-hdr-summary { font-size: 11px; font-weight: 700; letter-spacing: .02em; }
    .result-hdr-summary.ok  { color: var(--green); }
    .result-hdr-summary.err { color: var(--red); }
    .result-hdr-right { display: flex; align-items: center; gap: 4px; }
    .result-toggle-btn { font-size: 11px; padding: 3px 10px; height: 24px; line-height: 1; color: var(--text-dim); background: var(--surface-2); border: 1px solid var(--border); border-radius: 5px; cursor: pointer; white-space: nowrap; }
    .result-toggle-btn:hover { color: var(--text); background: #22222a; }
    .result-clear-btn { display: flex; align-items: center; justify-content: center; background: none; border: none; cursor: pointer; color: var(--text-dim); min-width: 28px; min-height: 28px; font-size: 14px; padding: 4px 6px; line-height: 1; border-radius: 5px; }
    .result-clear-btn:hover { color: var(--red); background: var(--red-dim); }
    .result-body { padding-top: 4px; }
    .result-hdr-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 5px; flex-shrink: 0; background: var(--green-dim); color: var(--green); margin-left: 8px; }
    .result-status { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 600; margin-bottom: 8px; }
    .status-ok { color: var(--green); }
    .status-err { color: var(--red); }
    .status-na { color: var(--text-dim); }
    .status-warn { color: var(--yellow, #e8a838); }
    .server-blocks { display: flex; flex-direction: column; gap: 7px; }
    .server-block { border-radius: 6px; border: 1px solid var(--border); overflow: hidden; }
    .server-block.server-ok { border-left: 3px solid var(--green); }
    .server-block.server-err { border-left: 3px solid var(--red); }
    .server-block-hdr { display: flex; align-items: center; justify-content: space-between; padding: 7px 12px; background: var(--surface-2); }
    .server-name { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; color: var(--text); }
    .server-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
    .server-badge.ok { background: var(--green-dim); color: var(--green); }
    .server-badge.err { background: var(--red-dim); color: var(--red); }
    .server-raw { padding: 4px 12px 8px; }
    .server-raw summary { font-size: 11px; color: var(--text-dim); cursor: pointer; margin-bottom: 4px; }
    .server-raw pre { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text); background: #0d0d10; border: 1px solid var(--border); border-radius: 4px; padding: 8px; white-space: pre-wrap; word-break: break-all; max-height: 180px; overflow-y: auto; margin: 0; }
    .result-table-wrap { overflow-x: auto; max-width: 100%; }
    .result-table { width: 100%; border-collapse: collapse; font-size: 12px; font-family: 'JetBrains Mono', monospace; }
    .result-table th { text-align: left; padding: 6px 10px; background: var(--surface-2); border-bottom: 1px solid var(--border); color: var(--text-dim); font-size: 11px; white-space: nowrap; }
    .result-table td { padding: 6px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); color: var(--text); max-width: 400px; white-space: normal; word-break: break-word; overflow: visible; text-overflow: unset; }
    .result-table tr:last-child td { border-bottom: none; }
    .result-text { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text); background: #0d0d10; border: 1px solid var(--border); border-radius: 6px; padding: 11px; white-space: pre-wrap; word-break: break-all; max-height: 280px; overflow-y: auto; }

    /* ── Clear-all bar ── */
    #clear-all-bar { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 7px 14px; margin-bottom: 14px; font-size: 12px; }
    .clear-all-count { color: var(--text-dim); }
    .btn-clear-all { background: none; border: 1px solid var(--border); color: var(--text-dim); font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 5px; cursor: pointer; }
    .btn-clear-all:hover { color: var(--red); border-color: var(--red); }

    /* ── Service Status cards ── */
    .svc-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .svc-section-title { font-size: 13px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: .07em; }
    .svc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px; margin-bottom: 14px; }
    .svc-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; transition: border-color 0.15s; }
    .svc-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .svc-name { font-size: 13px; font-weight: 600; }
    .svc-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; flex-shrink: 0; }
    .svc-badge.ok       { background: var(--green-dim); color: var(--green); }
    .svc-badge.warning  { background: var(--yellow-dim); color: var(--yellow); }
    .svc-badge.critical { background: var(--red-dim); color: var(--red); }
    .svc-badge.unknown  { background: var(--surface-2); color: var(--text-dim); border: 1px solid var(--border); }
    .svc-detail { font-size: 11px; color: var(--text-dim); line-height: 1.4; }
    .svc-loading { display: flex; align-items: center; gap: 10px; padding: 16px 0; color: var(--text-dim); font-size: 13px; }
    .svc-no-data { padding: 14px 0; font-size: 13px; color: var(--text-dim); }
    .svc-resources-section { margin-top: 14px; }
    .svc-resources-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-dim); margin-bottom: 8px; }
    .svc-resources-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
    .svc-resource-item { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; display: flex; flex-direction: column; gap: 3px; }
    .svc-resource-label { font-size: 11px; font-weight: 600; color: var(--text-dim); }
    .svc-resource-val { font-size: 12px; color: var(--text); }
    .svc-resource-item.svc-resource-ok       { border-left: 3px solid var(--green); }
    .svc-resource-item.svc-resource-warning  { border-left: 3px solid var(--yellow); }
    .svc-resource-item.svc-resource-critical { border-left: 3px solid var(--red); }

    /* ── Link cards ── */
    .link-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    .link-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; text-decoration: none; color: var(--text); display: flex; align-items: flex-start; gap: 14px; }
    .link-card:hover { border-color: rgba(240,168,48,0.4); box-shadow: 0 4px 16px rgba(240,168,48,0.07); }
    .link-icon { width: 38px; height: 38px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
    .link-body { flex: 1; min-width: 0; }
    .link-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .link-desc { font-size: 12px; color: var(--text-dim); line-height: 1.5; }
    .link-tag { margin-top: 8px; display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; background: var(--surface-2); color: var(--text-dim); border: 1px solid var(--border); }
    .link-arrow { font-size: 16px; color: var(--accent); margin-left: auto; transition: transform 0.15s; flex-shrink: 0; align-self: center; }
    .link-card:hover .link-arrow { transform: translateX(4px); }

    /* ── Section sub-header ── */
    .sub-header { display: flex; align-items: center; gap: 10px; margin: 24px 0 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .sub-header:first-child { margin-top: 0; }
    .sub-header-icon { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
    .sub-header-label { font-size: 13px; font-weight: 700; }
    .sub-header-desc { font-size: 11px; color: var(--text-dim); margin-left: 4px; }

    /* ── Spinner / empty ── */
    .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 48px 0; color: var(--text-dim); }
    .empty-state .icon { font-size: 36px; margin-bottom: 10px; }
    .empty-state h3 { font-size: 15px; color: var(--text); margin-bottom: 6px; }

    @media (max-width: 768px) {
      .ops-grid { grid-template-columns: 1fr; }
      .link-grid { grid-template-columns: 1fr; }
      .svc-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
      .conn-select { min-width: 0; width: 100%; }
      .tab { padding: 8px 12px; font-size: 12px; }
    }
  </style>
</head>

<div class="grain"></div>
<nav><div id="nav-root"></div></nav>

<div class="breadcrumb-bar">
  <a href="/connections">Connections</a>
  <span class="bc-sep">›</span>
  <a href="/ebs-ops">EBS Ops</a>
  <span class="bc-sep">›</span>
  <span id="bc-conn-name" style="color:var(--text-dim)">—</span>
</div>

<script src="/adop-banner.js"></script>

<div class="page-wrap">

  <div id="adopBannerRoot" style="display:none;"></div>

  <!-- Toolbar -->
  <div class="toolbar">
    <h1>🏗️ EBS Operations Center</h1>
    <div class="conn-row">
      <select class="conn-select" id="conn-select" onchange="onConnChange()">
        <option value="">— Select EBS connection —</option>
      </select>

        <div class="status-dot" id="status-dot"></div>

      </div>

        Operations are visible — they unlock once an EBS app tier is connected.

  <!-- Clear all results bar -->
  <div id="clear-all-bar" style="display:none">
    <span class="clear-all-count"></span>
    <button class="btn-clear-all" onclick="clearAllResults()">✕ Clear all</button>
  </div>

  <!-- Main content -->
  <div id="main-content"></div>

</div>

<script>
window.tvNav.init('ebs-ops');

// ── State ────────────────────────────────────────────────────────────────────
let connections = [];
let selectedConn = null;
let activeTab = 'middleware';
const resultStore = new Map(); // opKey → { summaryText, bodyHtml, collapsed, isOk }
let isRefreshing = false;      // true while sequential auto-run / Refresh is in progress
let lastRefreshAt = 0;         // ms timestamp of last completed Refresh kick-off (for 10s debounce)

// ── SQL ops catalog (frontend copy for display + copy-SQL) ────────────────────
const CONCURRENT_OPS = [
  { key: 'running_requests', label: 'Running Requests', icon: '🟢', desc: 'Live running concurrent requests with start time and status code.',
    sql: `SELECT request_id, concurrent_program_name, requested_by,
       actual_start_date, phase_code, status_code
FROM fnd_concurrent_requests
WHERE phase_code='R' ORDER BY actual_start_date` },
  { key: 'long_running', label: 'Long Running (>30 min)', icon: '⏱️', desc: 'Requests running more than 30 minutes — potential hangs.',
    sql: `SELECT request_id, concurrent_program_name, requested_by,
       ROUND((SYSDATE-actual_start_date)*24*60,1) AS running_minutes
FROM fnd_concurrent_requests
WHERE phase_code='R' AND actual_start_date < SYSDATE-30/1440
ORDER BY actual_start_date` },
  { key: 'pending_requests', label: 'Pending Requests', icon: '⏳', desc: 'Queued requests waiting to run, ordered by priority.',
    sql: `SELECT request_id, concurrent_program_name, requested_by,
       requested_start_date, priority
FROM fnd_concurrent_requests
WHERE phase_code='P' ORDER BY priority, requested_start_date
FETCH FIRST 50 ROWS ONLY` },
  { key: 'failed_requests', label: 'Failed Requests (24h)', icon: '❌', desc: 'Requests that failed in the last 24 hours with completion text.',
    sql: `SELECT request_id, concurrent_program_name, requested_by,
       actual_completion_date, completion_text
FROM fnd_concurrent_requests
WHERE phase_code='C' AND status_code='E'
AND actual_completion_date > SYSDATE-1
ORDER BY actual_completion_date DESC
FETCH FIRST 50 ROWS ONLY` },
  { key: 'cm_managers', label: 'CM Manager Status', icon: '🏭', desc: 'Enabled Concurrent Managers with process counts.',
    sql: `SELECT concurrent_queue_name, manager_type,
       running_processes, target_processes, max_processes
FROM fnd_concurrent_queues_vl
WHERE enabled_flag='Y'
ORDER BY running_processes DESC` },
  { key: 'opp_queue', label: 'OPP Queue Depth', icon: '📊', desc: 'Output Post Processor pending queue depth — counts requests awaiting OPP post-processing.',
    sql: `SELECT COUNT(*) AS pending_opp_requests
FROM FND_CONCURRENT_REQUESTS
WHERE REQUEST_ID IN (
    SELECT CONCURRENT_REQUEST_ID
    FROM FND_CONC_PP_ACTIONS
    WHERE ACTION_TYPE >= 6 AND PROCESSOR_ID IS NULL
) AND PHASE_CODE != 'C'` },
  { key: 'opp_programs', label: 'OPP Pending Programs', icon: '📋', desc: 'Programs with requests currently waiting for OPP post-processing.',
    sql: `SELECT DISTINCT b.USER_CONCURRENT_PROGRAM_NAME AS program_name
FROM FND_CONCURRENT_REQUESTS a
JOIN FND_CONCURRENT_PROGRAMS_TL b ON a.CONCURRENT_PROGRAM_ID = b.CONCURRENT_PROGRAM_ID
WHERE a.REQUEST_ID IN (
    SELECT CONCURRENT_REQUEST_ID
    FROM FND_CONC_PP_ACTIONS
    WHERE ACTION_TYPE >= 6 AND PROCESSOR_ID IS NULL
) ORDER BY 1` },
  { key: 'opp_heap_size', label: 'OPP Heap Size', icon: '🔬', desc: 'OPP JVM heap size configuration from FND_CP_SERVICES.',
    sql: `SELECT DEVELOPER_PARAMETERS
FROM FND_CP_SERVICES
WHERE SERVICE_ID = (
    SELECT MANAGER_TYPE FROM FND_CONCURRENT_QUEUES
    WHERE CONCURRENT_QUEUE_NAME = 'FNDCPOPP'
)` },
];

const PATCHING_OPS = [
  { key: 'adop_status', label: 'ADOP Session Status', icon: '🔧', desc: 'Current and recent ADOP patch session state — phase, status, node.',
    sql: `SELECT session_id, phase, status, start_date, end_date,
       applied_on_node
FROM ad_adop_sessions
ORDER BY start_date DESC FETCH FIRST 10 ROWS ONLY` },
  { key: 'applied_patches', label: 'Recent Patches (90 days)', icon: '🩹', desc: 'AD_APPLIED_PATCHES — patches applied in the last 90 days.',

// ── Bootstrap ────────────────────────────────────────────────────────────────
(async function init() {
  try {
    const r = await fetch('/api/connections', { credentials: 'include' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    connections = tvConn.parseList(data).filter(c =>
      c.server_type === 'apps' || c.server_type === 'both'
    );

    const hasConns = connections.length > 0;
    document.getElementById('no-conn-banner').classList.toggle('visible', !hasConns);

    if (!hasConns) { renderMain(); return; }

    const sel = document.getElementById('conn-select');
    connections.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.name || (c.host + ':' + (c.port || 1521));
      sel.appendChild(opt);
    });
    tvConn.bind(sel, connections);
    if (sel.value) {
      onConnChange();
    } else if (connections.length === 1) {
      sel.value = connections[0].id;
      tvConn.save(connections[0].id);
      onConnChange();
    } else {
      renderMain();
    }
  } catch (err) {
    document.getElementById('status-label').textContent = 'Failed to load connections';
    renderMain();
  }
})();

// ── Connection change ─────────────────────────────────────────────────────────
function onConnChange() {
  const sel = document.getElementById('conn-select');
  const connId = sel.value;
  if (connId) tvConn.save(connId);
  selectedConn = connections.find(c => String(c.id) === connId) || null;

  const bcName = document.getElementById('bc-conn-name');
  if (selectedConn) {
    bcName.textContent = selectedConn.name || (selectedConn.host + ':' + (selectedConn.port || 1521));
    bcName.style.color = 'var(--text)';
  } else {
    bcName.textContent = '—'; bcName.style.color = 'var(--text-dim)';
  }

  setStatusDot('');
  document.getElementById('status-label').textContent = '';

  if (!selectedConn) { renderMain(); return; }

  if (selectedConn.connection_type === 'proxy') {
    setStatusDot('checking');
    document.getElementById('status-label').textContent = 'Checking…';
    fetch('/api/connections/' + connId + '/agent-status', { credentials: 'include' })
      .then(r => r.ok ? r.json() : {})
      .then(d => {
        const online = d.status === 'healthy';
        setStatusDot(online ? 'online' : 'offline');
        document.getElementById('status-label').textContent = online ? 'Agent online' : 'Agent offline';
      })
      .catch(() => { setStatusDot('offline'); document.getElementById('status-label').textContent = 'Unknown'; });
  } else {
    setStatusDot('online');
    document.getElementById('status-label').textContent = 'Direct TCP';
  }

  renderMain();
}

function setStatusDot(state) {
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot' + (state ? ' ' + state : '');

// ── Sequential runner — runs all middleware ops one at a time ─────────────────
async function runAllMiddlewareOpsSequential() {
  if (isRefreshing) return;
  isRefreshing = true;
  lastRefreshAt = Date.now();

  const refreshBtn = document.getElementById('mw-refresh-btn');
  if (refreshBtn) { refreshBtn.disabled = true; refreshBtn.textContent = '⏳ Running…'; }

  try {
    for (const op of MIDDLEWARE_OPS) {
      await runMiddlewareOp(op.key);
    }
  } finally {
    isRefreshing = false;
    if (refreshBtn) { refreshBtn.disabled = false; refreshBtn.textContent = '↺ Refresh'; }
  }
}

// ── Refresh all Service Status ops (debounced, sequential) ───────────────────
function refreshMiddlewareOps() {
  if (isRefreshing) return;
  const elapsed = Date.now() - lastRefreshAt;
  if (elapsed < 10000) return; // 10-second debounce

  MIDDLEWARE_OPS.forEach(op => {
    const storeKey = 'mw-' + op.key;
    resultStore.delete(storeKey);
    const panel = document.getElementById('result-mw-' + op.key);
    const badge = document.getElementById('result-hdr-badge-mw-' + op.key);
    if (panel) { panel.innerHTML = ''; panel.classList.remove('visible'); }
    if (badge) { badge.style.display = 'none'; badge.textContent = ''; }
  });
  updateClearAllBar();
  runAllMiddlewareOpsSequential();
}

// ── Run middleware op ─────────────────────────────────────────────────────────
async function runMiddlewareOp(opKey) {
  if (!selectedConn) return;
  const btn      = document.getElementById('run-mw-' + opKey);
  const resultEl = document.getElementById('result-mw-' + opKey);
  const storeKey = 'mw-' + opKey;

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Running…';
  resultEl.classList.add('visible');
  resultEl.innerHTML = '<div class="result-panel-hdr"><span class="result-hdr-summary ok" style="opacity:.5">Running…</span></div>';

  const ctrl  = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 38000);
  try {
    const r = await fetch('/api/ebs-ops/middleware-run', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ connection_id: selectedConn.id, op_key: opKey }),
      signal: ctrl.signal,
    });
    clearTimeout(timer);
    const data = await r.json();
    if (data.ok !== undefined) {
      storeAndRenderMiddlewareResult(storeKey, data);
    } else {
      storeAndRenderMiddlewareResult(storeKey, { ok: false, error: data.error || data.detail || 'Operation failed' });
    }
  } catch (err) {
    clearTimeout(timer);
    const msg = err.name === 'AbortError' ? 'Request timed out (38s)' : err.message;
    storeAndRenderMiddlewareResult(storeKey, { ok: false, error: msg });
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = '▶ Run'; }
  }
}

function parseServerBlocks(stdout) {
  const lines = stdout.split('\n');
  const blocks = [];
  let cur = null;
  for (const line of lines) {
    if (line.startsWith('TV_SERVER_NAME ')) {
      cur = { name: line.slice('TV_SERVER_NAME '.length).trim(), output: '', exit: null };
      blocks.push(cur);
    } else if (line.startsWith('TV_SERVER_EXIT ') && cur) {
      cur.exit = parseInt(line.slice('TV_SERVER_EXIT '.length).trim(), 10);
      cur = null;
    } else if (cur) {
      cur.output += (cur.output ? '\n' : '') + line;
    }
  }
  return blocks;
}

function renderServerBlocks(blocks) {
  if (!blocks.length) return '';
  let html = '<div class="server-blocks">';
  for (const b of blocks) {
    const ok = b.exit === 0;
    html += `<div class="server-block ${ok ? 'server-ok' : 'server-err'}">`;
    html += `<div class="server-block-hdr"><span class="server-name">${escHtml(b.name)}</span><span class="server-badge ${ok ? 'ok' : 'err'}">${ok ? '✓ Running' : '✗ Stopped'}</span></div>`;
    if (b.output.trim()) {
      html += `<details class="server-raw"><summary>Raw output</summary><pre>${escHtml(b.output.trim())}</pre></details>`;
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function storeAndRenderMiddlewareResult(storeKey, data) {
  const isOk     = !!(data.ok);
  const exitCode  = data.exit_code;
  const stdout    = (data.stdout || '').trim();

  // Detect sentinel strings emitted by the bash script
  const isNoPasswords   = !data.error && stdout.includes('NO_PASSWORDS');
  const isSkipAdmin     = !data.error && stdout.includes('SKIP_ADMIN_HOST');
  const isNoServers     = !data.error && stdout.includes('NO_SERVERS_FOUND');
  const isNoWlsPwd      = !data.error && stdout.includes('NO_WLS_PWD');

  let summaryText;
  if (data.error) {
    summaryText = '✗ Error';
  } else if (isNoPasswords || isSkipAdmin) {
    summaryText = '— Skipped';
  } else if (isNoServers) {
    summaryText = '— No servers configured';
  } else if (isNoWlsPwd) {
    summaryText = '⚠ WLS password required';
  } else if (isOk) {
    summaryText = '✓ OK' + (data.durationMs ? ' · ' + data.durationMs + 'ms' : '');
  } else {
    summaryText = '✗ Not running' + (exitCode !== undefined ? ' (exit ' + exitCode + ')' : '');
  }

  let bodyHtml;
  if (data.error) {
    bodyHtml = `<div class="result-status status-err">✗ ${escHtml(friendlyError(data.error))}</div>`;
  } else if (isNoPasswords) {
    bodyHtml = `<div class="result-status status-na">WLS password and APPS password required to check Admin Server. Set them in the connection edit form.</div>`;
  } else if (isSkipAdmin) {
    const adminHost = (stdout.match(/SKIP_ADMIN_HOST:(\S+)/) || [])[1] || 'another host';
    bodyHtml = `<div class="result-status status-na">Admin Server runs on <strong>${escHtml(adminHost)}</strong> — auto-skipped on this node.</div>`;
  } else if (isNoServers) {
    bodyHtml = `<div class="result-status status-na">No servers of this type found in the EBS context file.</div>`;
  } else if (isNoWlsPwd) {
    const known = [...stdout.matchAll(/KNOWN_SERVER (\S+)/g)].map(m => m[1]);
    bodyHtml = `<div class="result-status status-warn">⚠ WLS password required to check managed servers. Set it in the connection edit form.</div>`;
    if (known.length) {
      bodyHtml += `<div class="result-text">Servers in context file: ${escHtml(known.join(', '))}</div>`;
    }
  } else {
    const serverBlocks = parseServerBlocks(stdout);
    if (serverBlocks.length > 0) {
      bodyHtml = renderServerBlocks(serverBlocks);
    } else {
      bodyHtml = `<div class="result-status ${isOk ? 'status-ok' : 'status-err'}">${isOk ? '✓ Running / OK' : '✗ Not running or failed'} (exit ${exitCode !== undefined ? exitCode : '?'})</div>`;
      if (stdout) bodyHtml += `<div class="result-text">${escHtml(stdout)}</div>`;
    }
  }

  const stored = { summaryText, bodyHtml, collapsed: false, isOk: isOk && !data.error };
  resultStore.set(storeKey, stored);

  const opKey = storeKey.replace(/^mw-/, '');
  const panel = document.getElementById('result-mw-' + opKey);
  const badge = document.getElementById('result-hdr-badge-mw-' + opKey);
  if (panel) { panel.classList.add('visible'); panel.innerHTML = buildMiddlewareResultPanelHtml(storeKey, stored); }
  if (badge) {
    badge.textContent = summaryText;
    badge.style.display = '';
    const isNeutral = isNoPasswords || isSkipAdmin || isNoServers;
    badge.style.background = isNeutral ? 'var(--surface-2)' : (stored.isOk ? 'var(--green-dim)' : 'var(--red-dim)');
    badge.style.color      = isNeutral ? 'var(--text-dim)'  : (stored.isOk ? 'var(--green)' : 'var(--red)');
  }
  updateClearAllBar();
}

function buildMiddlewareResultPanelHtml(storeKey, stored) {
  const opKey      = storeKey.replace(/^mw-/, '');
  const toggleLabel = stored.collapsed ? 'Show Results' : 'Hide Results';
  const bodyStyle   = stored.collapsed ? 'style="display:none"' : '';
  return `
    <div class="result-panel-hdr" onclick="toggleMiddlewareResult('${storeKey}')">
      <span class="result-hdr-summary ${stored.isOk ? 'ok' : 'err'}">${escHtml(stored.summaryText)}</span>
      <div class="result-hdr-right">
        <button class="result-toggle-btn" id="result-chevron-mw-${opKey}" onclick="toggleMiddlewareResult('${storeKey}');event.stopPropagation()">${toggleLabel}</button>
        <button class="result-clear-btn" onclick="clearMiddlewareResult('${storeKey}', event)" title="Dismiss">✕</button>
      </div>
    </div>
    <div class="result-body" id="result-body-mw-${opKey}" ${bodyStyle}>${stored.bodyHtml}</div>`;
}

function toggleMiddlewareResult(storeKey) {
  const stored = resultStore.get(storeKey);
  if (!stored) return;
  stored.collapsed = !stored.collapsed;
  const opKey = storeKey.replace(/^mw-/, '');
  const body  = document.getElementById('result-body-mw-' + opKey);
  const btn   = document.getElementById('result-chevron-mw-' + opKey);
  if (body) body.style.display = stored.collapsed ? 'none' : '';
  if (btn)  btn.textContent    = stored.collapsed ? 'Show Results' : 'Hide Results';
}

function clearMiddlewareResult(storeKey, event) {
  if (event) event.stopPropagation();
  resultStore.delete(storeKey);
  const opKey = storeKey.replace(/^mw-/, '');
  const panel = document.getElementById('result-mw-' + opKey);
  const badge = document.getElementById('result-hdr-badge-mw-' + opKey);
  if (panel) { panel.innerHTML = ''; panel.classList.remove('visible'); }
  if (badge) { badge.style.display = 'none'; badge.textContent = ''; }
  updateClearAllBar();
}

    <div class="op-preview" id="preview-${op.key}">${escHtml(op.sql)}</div>
    <div class="op-actions">
      <button class="btn btn-run" id="run-${op.key}"
        onclick="${noConn ? '' : `runEbsOp('${op.key}')`}"
        ${noConn ? 'disabled' : ''}
        title="${noConn ? 'Select a connection first' : ''}">
        ▶ Run
      </button>
      <button class="btn btn-outline" onclick="copyEbsSql('${op.key}', this)">Copy SQL</button>
    </div>
    <div class="result-panel" id="result-${op.key}"></div>`;

  container.appendChild(card);
}

// ── Run EBS op ────────────────────────────────────────────────────────────────
async function runEbsOp(opKey) {
  if (!selectedConn) return;
  const btn = document.getElementById('run-' + opKey);
  const resultEl = document.getElementById('result-' + opKey);

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Running…';
  resultEl.classList.add('visible');
  resultEl.innerHTML = '<div class="result-panel-hdr"><span class="result-hdr-summary ok" style="opacity:.5">Running…</span></div>';

  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 35000);
  try {
    const r = await fetch('/api/ebs-ops/run', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ connection_id: selectedConn.id, op_key: opKey }),
      signal: ctrl.signal,
    });
    clearTimeout(timer);
    const data = await r.json();
    if (data.ok) {
      storeAndRenderResult(opKey, data, true);
    } else {
      storeAndRenderResult(opKey, { error: data.error || data.detail || 'Operation failed' }, false);
    }
  } catch (err) {
    clearTimeout(timer);
    const msg = err.name === 'AbortError' ? 'Request timed out (35s)' : err.message;
    storeAndRenderResult(opKey, { error: msg }, false);
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = '▶ Run'; }
  }
}

// ── Result store helpers ──────────────────────────────────────────────────────
function buildResultPanelHtml(opKey, stored) {
  const toggleLabel = stored.collapsed ? 'Show Results' : 'Hide Results';
  const bodyStyle = stored.collapsed ? 'style="display:none"' : '';
  return `
    <div class="result-panel-hdr" onclick="toggleResult('${opKey}')">
      <span class="result-hdr-summary ${stored.isOk ? 'ok' : 'err'}">${escHtml(stored.summaryText)}</span>
      <div class="result-hdr-right">
        <button class="result-toggle-btn" id="result-chevron-${opKey}" onclick="toggleResult('${opKey}');event.stopPropagation()">${toggleLabel}</button>
        <button class="result-clear-btn" onclick="clearResult('${opKey}', event)" title="Dismiss">✕</button>
      </div>
    </div>
    <div class="result-body" id="result-body-${opKey}" ${bodyStyle}>${stored.bodyHtml}</div>`;
}

function toggleResult(opKey) {
  const stored = resultStore.get(opKey);
  if (!stored) return;
  stored.collapsed = !stored.collapsed;
  const body = document.getElementById('result-body-' + opKey);
  const btn  = document.getElementById('result-chevron-' + opKey);
  if (body) body.style.display = stored.collapsed ? 'none' : '';
  if (btn)  btn.textContent = stored.collapsed ? 'Show Results' : 'Hide Results';
}

function clearResult(opKey, event) {
  if (event) event.stopPropagation();
  resultStore.delete(opKey);
  const panel = document.getElementById('result-' + opKey);
  const badge = document.getElementById('result-hdr-badge-' + opKey);
  if (panel) { panel.innerHTML = ''; panel.classList.remove('visible'); }
  if (badge) { badge.style.display = 'none'; badge.textContent = ''; }
  updateClearAllBar();
}

function clearAllResults() {
  for (const storeKey of [...resultStore.keys()]) {
    if (storeKey.startsWith('mw-')) clearMiddlewareResult(storeKey, null);
    else clearResult(storeKey, null);
  }
}

function updateClearAllBar() {
  const bar = document.getElementById('clear-all-bar');
  if (!bar) return;
  const n = resultStore.size;
  bar.style.display = n > 0 ? '' : 'none';
  const lbl = bar.querySelector('.clear-all-count');
  if (lbl) lbl.textContent = n + ' result' + (n !== 1 ? 's' : '') + ' showing';
}

function restoreResults() {
  for (const [storeKey, stored] of resultStore.entries()) {
    if (storeKey.startsWith('mw-')) {
      // Middleware op result
      const opKey = storeKey.replace(/^mw-/, '');
      const panel = document.getElementById('result-mw-' + opKey);
      const badge = document.getElementById('result-hdr-badge-mw-' + opKey);
      if (panel) { panel.classList.add('visible'); panel.innerHTML = buildMiddlewareResultPanelHtml(storeKey, stored); }
      if (badge) { badge.textContent = stored.summaryText; badge.style.display = ''; }
    } else {
      // SQL op result
      const panel = document.getElementById('result-' + storeKey);
      const badge = document.getElementById('result-hdr-badge-' + storeKey);
      if (panel) { panel.classList.add('visible'); panel.innerHTML = buildResultPanelHtml(storeKey, stored); }
      if (badge) { badge.textContent = stored.summaryText; badge.style.display = ''; }
    }
  }
  updateClearAllBar();
}

function buildResultBodyHtml(data, isOk) {
  if (!isOk) {
    return `<div class="result-status status-err">✗ ${friendlyError(data.error || 'Operation failed')}</div>`;
  }
  let html = '';
  if (data.rows && data.rows.length > 0) {
    const cols = data.columns || [];
    html += '<div class="result-table-wrap"><table class="result-table"><thead><tr>';
    cols.forEach(c => { html += `<th>${escHtml(c)}</th>`; });
    html += '</tr></thead><tbody>';
    data.rows.forEach(row => {
      html += '<tr>';
      row.forEach(cell => {
        const cellVal = String(cell ?? '');
        const cellHtml = cellVal.length > 100
          ? `<td><div style="font-family:monospace;font-size:11px;white-space:pre-wrap;word-break:break-all;max-width:500px;padding:4px">${escHtml(cellVal)}</div></td>`
          : `<td title="${escHtml(cellVal)}">${escHtml(cellVal)}</td>`;
        html += cellHtml;
      });
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    html += `<div style="font-size:11px;color:var(--text-dim);margin-top:6px">${data.rows.length} row${data.rows.length !== 1 ? 's' : ''}</div>`;
  } else {
    html += '<div style="font-size:12px;color:var(--text-dim);margin-top:4px">No rows returned.</div>';
  }
  return html;
}

function friendlyError(msg) {
  if (!msg) return String(msg);
  if (/not connected|agent.*offline|agent check failed/i.test(msg)) {
    return 'Agent is not connected — check agent status or wait for it to reconnect.';
  }
  if (/direct tcp.*not.*supported|proxy.*connection/i.test(msg)) {
    return 'This operation requires a proxy (agent) connection, not Direct TCP.';
  }
  if (/ORA-\d+/i.test(msg)) return escHtml(msg);
  return escHtml(msg);
}

function storeAndRenderResult(opKey, data, isOk) {
  const rowCount = isOk && data.rows ? data.rows.length : 0;
  let summaryText;
  if (isOk) {
    summaryText = '✓ ' + rowCount + ' row' + (rowCount !== 1 ? 's' : '');
    if (data.durationMs) summaryText += ' · ' + data.durationMs + 'ms';
  } else {
    summaryText = '✗ Error';
  }
  const stored = { summaryText, bodyHtml: buildResultBodyHtml(data, isOk), collapsed: false, isOk };
  resultStore.set(opKey, stored);

  const panel = document.getElementById('result-' + opKey);
  const badge = document.getElementById('result-hdr-badge-' + opKey);
  if (panel) { panel.classList.add('visible'); panel.innerHTML = buildResultPanelHtml(opKey, stored); }
  if (badge) {
    badge.textContent = summaryText;
    badge.style.display = '';
    badge.style.background = isOk ? 'var(--green-dim)' : 'var(--red-dim)';
    badge.style.color = isOk ? 'var(--green)' : 'var(--red)';
  }
  updateClearAllBar();
}

// ── Copy SQL ──────────────────────────────────────────────────────────────────
function copyEbsSql(opKey, btn) {
  const el = document.getElementById('preview-' + opKey);
  const sql = el ? el.textContent.trim() : '';
  if (!sql) return;
  navigator.clipboard.writeText(sql)
    .then(() => { const orig = btn.textContent; btn.textContent = '✓ Copied'; setTimeout(() => { btn.textContent = orig; }, 1500); })
    .catch(() => { btn.textContent = 'Failed'; setTimeout(() => { btn.textContent = 'Copy SQL'; }, 1500); });
}

// ── Util ──────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Initial render
renderMain();
</script>
