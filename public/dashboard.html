<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fleet Dashboard — TuneVault</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://tunevault.app/dashboard">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg:          #0a0a0c;
      --surface:     #111114;
      --surface-2:   #1a1a1f;
      --border:      #2a2a30;
      --border-h:    #3a3a42;
      --text:        #e8e8ed;
      --text-dim:    #b8b8c8;
      --text-muted:  #7878a8;
      --accent:      #f0a830;
      --green:       #34d399;
      --red:         #f87171;
      --yellow:      #fbbf24;
      --blue:        #60a5fa;
      --purple:      #a78bfa;
    }
    body {
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }
    .grain {
      position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    }

    /* ── Layout ── */
    .page { max-width: 1300px; margin: 0 auto; padding: 0 32px 80px; }

    /* ── Topbar ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 0 22px; border-bottom: 1px solid var(--border); margin-bottom: 26px; gap: 16px;
    }
    .topbar-title { font-size: 21px; font-weight: 700; letter-spacing: -0.4px; }
    .topbar-sub   { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    .topbar-actions { display: flex; gap: 10px; align-items: center; flex-shrink: 0; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; text-decoration: none; transition: all 0.15s;
      font-family: inherit; border: none; white-space: nowrap;
    }
    .btn-primary  { background: var(--accent); color: #0a0a0c; }
    .btn-primary:hover { background: #e09820; }
    .btn-ghost { background: var(--surface-2); border: 1px solid var(--border); color: var(--text-dim); }
    .btn-ghost:hover { border-color: var(--border-h); color: var(--text); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; pointer-events: none; }

    /* ── Metric strip ── */
    .metric-strip {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px;
    }
    .metric-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 20px; cursor: default; user-select: none;
    }
    .metric-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--text-muted); margin-bottom: 10px;
      font-family: 'JetBrains Mono', monospace;
    }
    .metric-value {
      font-size: 34px; font-weight: 700; letter-spacing: -1.5px; line-height: 1; margin-bottom: 5px;
    }
    .metric-sub { font-size: 12px; color: var(--text-muted); }
    .metric-value.good { color: var(--green); }
    .metric-value.warn { color: var(--yellow); }
    .metric-value.bad  { color: var(--red); }

    /* ── Panel rows ── */
    .panels-row { display: grid; grid-template-columns: 58fr 42fr; gap: 12px; margin-bottom: 12px; }
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .panel-title { font-size: 13px; font-weight: 600; }
    .panel-meta  { font-size: 12px; color: var(--text-muted); }
    .panel-link  { font-size: 12px; color: var(--accent); text-decoration: none; font-weight: 500; }
    .panel-link:hover { text-decoration: underline; }

    /* ── Fleet table ── */
    .fleet-table { width: 100%; border-collapse: collapse; }
    .fleet-table th {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--text-muted); font-weight: 500; padding: 9px 18px;
      text-align: left; border-bottom: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
    }
    .fleet-table td {
      padding: 11px 18px; font-size: 13px;
      border-bottom: 1px solid rgba(42,42,48,0.5); vertical-align: middle;
    }
    .fleet-table tr:last-child td { border-bottom: none; }
    .fleet-table tbody tr:hover td { background: rgba(255,255,255,0.018); }
    .fleet-table a { color: var(--text); text-decoration: none; }
    .fleet-table a:hover { color: var(--accent); }

    /* Status dot */
    .dot {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0;
    }
    .dot-green  { background: var(--green);  box-shadow: 0 0 5px rgba(52,211,153,0.45); }
    .dot-amber  { background: var(--yellow); box-shadow: 0 0 5px rgba(251,191,36,0.45); }
    .dot-red    { background: var(--red);    box-shadow: 0 0 5px rgba(248,113,113,0.45); }
    .dot-grey   { background: var(--text-muted); }

    /* Badges */
    .badge {
      display: inline-flex; align-items: center;
      font-size: 10px; font-weight: 600; letter-spacing: 0.4px; padding: 2px 6px;
      border-radius: 4px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase;
    }
    .badge-ebs  { background: rgba(167,139,250,0.12); color: var(--purple); border: 1px solid rgba(167,139,250,0.22); }
    .badge-db   { background: rgba(96,165,250,0.1);  color: var(--blue);   border: 1px solid rgba(96,165,250,0.2); }
    .badge-prod { background: rgba(248,113,113,0.1); color: var(--red);    border: 1px solid rgba(248,113,113,0.2); }
    .badge-uat  { background: rgba(251,191,36,0.1);  color: var(--yellow); border: 1px solid rgba(251,191,36,0.2); }
    .badge-dev  { background: rgba(52,211,153,0.08); color: #6ee7b7;       border: 1px solid rgba(52,211,153,0.15); }
    .badge-stg  { background: rgba(156,163,175,0.1); color: #9ca3af;       border: 1px solid rgba(156,163,175,0.18); }

    /* Score cell */
    .score { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; }
    .score.good { color: var(--green); }
    .score.warn { color: var(--yellow); }
    .score.bad  { color: var(--red); }
    .score.dim  { color: var(--text-muted); }

    /* ── Alert list ── */
    .alert-item {
      display: flex; align-items: flex-start; gap: 11px;
      padding: 13px 18px; border-bottom: 1px solid rgba(42,42,48,0.5);
      text-decoration: none; color: inherit;
    }
    .alert-item:last-child { border-bottom: none; }
    .alert-item:hover { background: rgba(255,255,255,0.018); }
    .alert-icon {
      width: 26px; height: 26px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
    }
    .alert-icon.crit { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.22); color: var(--red); }
    .alert-icon.warn { background: rgba(251,191,36,0.1);   border: 1px solid rgba(251,191,36,0.2);  color: var(--yellow); }
    .alert-conn  { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
    .alert-title { font-size: 12px; color: var(--text-dim); line-height: 1.4; }
    .alert-counts { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

    /* ── Recent checks ── */
    .check-item {
      display: flex; align-items: center; gap: 12px; padding: 11px 18px;
      border-bottom: 1px solid rgba(42,42,48,0.5); text-decoration: none; color: var(--text);
    }
    .check-item:last-child { border-bottom: none; }
    .check-item:hover { background: rgba(255,255,255,0.018); }
    .check-ring {
      width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 11px; font-weight: 700;
      font-family: 'JetBrains Mono', monospace; flex-shrink: 0; border: 2px solid;
    }
    .check-ring.good    { border-color: var(--green);  color: var(--green); }
    .check-ring.warn    { border-color: var(--yellow); color: var(--yellow); }
    .check-ring.bad     { border-color: var(--red);    color: var(--red); }
    .check-ring.pending { border-color: var(--border); color: var(--text-muted); font-size: 8px; letter-spacing: 0; }
    .check-ring.error   { border-color: rgba(248,113,113,0.35); color: var(--red); font-size: 14px; }
    .check-name { font-size: 13px; font-weight: 500; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .check-counts { font-size: 11px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
    .check-time  { font-size: 11px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; margin-left: 8px; }

    /* ── Top findings ── */
    .finding-item {
      display: flex; align-items: center; gap: 10px; padding: 11px 18px;
      border-bottom: 1px solid rgba(42,42,48,0.5);
      text-decoration: none; color: inherit;
    }
    .finding-item:last-child { border-bottom: none; }
    .finding-item:hover { background: rgba(255,255,255,0.018); }
    .finding-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .finding-dot.red   { background: var(--red); }
    .finding-dot.amber { background: var(--yellow); }
    .finding-label { font-size: 13px; flex: 1; min-width: 0; }
    .finding-servers {
      font-size: 11px; color: var(--text-muted); background: var(--surface-2);
      border: 1px solid var(--border); padding: 2px 7px; border-radius: 4px;
      font-family: 'JetBrains Mono', monospace; flex-shrink: 0;
    }

    /* ── Empty states ── */
    .empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 36px 20px; color: var(--text-muted); font-size: 13px; gap: 6px; text-align: center;
    }
    .empty-icon { font-size: 22px; margin-bottom: 2px; }
    .empty a { color: var(--accent); font-size: 12px; text-decoration: none; margin-top: 4px; }
    .empty a:hover { text-decoration: underline; }

    /* ── Skeleton ── */
    .skel {
      background: linear-gradient(90deg, var(--surface-2) 25%, rgba(40,40,50,0.8) 50%, var(--surface-2) 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 5px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── Nav ── */
    .nav-wrapper {
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,12,0.95);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 9999;
    }
    #nav-root {
      max-width: 1400px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 48px; gap: 16px;
    }

    /* ── Responsive ── */
    @media (max-width: 1024px) {
      .panels-row { grid-template-columns: 1fr; }
      .metric-strip { grid-template-columns: repeat(2, 1fr); }
      #nav-root { padding: 14px 24px; }
    }
    @media (max-width: 600px) {
      .page { padding: 0 16px 60px; }
      .topbar { flex-direction: column; align-items: flex-start; }
      .metric-strip { grid-template-columns: 1fr 1fr; }
      #nav-root { padding: 12px 16px; }
    }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="nav-wrapper">
    <nav id="nav-root"></nav>
  </div>

  <div class="page">

    <!-- ── Topbar ── -->
    <div class="topbar">
      <div>
        <div class="topbar-title" id="greeting">Oracle Fleet Overview</div>
        <div class="topbar-sub" id="topbar-sub">Loading fleet data…</div>
      </div>
      <div class="topbar-actions">
        <a class="btn btn-primary" href="/connections/new">+ Add server</a>
      </div>
    </div>

    <!-- ── Metric strip ── -->
    <div class="metric-strip">
      <div class="metric-card">
        <div class="metric-label">Fleet Health Score</div>
        <div class="metric-value" id="m-score"><div class="skel" style="width:52px;height:30px;"></div></div>
        <div class="metric-sub" id="m-score-sub">&nbsp;</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Critical Findings</div>
        <div class="metric-value" id="m-crit"><div class="skel" style="width:36px;height:30px;"></div></div>
        <div class="metric-sub" id="m-crit-sub">&nbsp;</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Servers Monitored</div>
        <div class="metric-value" id="m-servers"><div class="skel" style="width:30px;height:30px;"></div></div>
        <div class="metric-sub" id="m-servers-sub">&nbsp;</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Last Check</div>
        <div class="metric-value" id="m-last" style="font-size:20px;letter-spacing:-0.5px;"><div class="skel" style="width:70px;height:24px;"></div></div>
        <div class="metric-sub" id="m-last-sub">&nbsp;</div>
      </div>
    </div>

    <!-- ── Row 1: Fleet status + Alerts ── -->
    <div class="panels-row">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Fleet Status</span>
          <a class="panel-link" href="/connections">Manage servers →</a>
        </div>
        <div id="fleetWrap"><div class="empty"><div class="skel" style="width:220px;height:13px;"></div></div></div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Active Alerts</span>
          <span class="panel-meta" id="alert-total"></span>
        </div>
        <div id="alertsWrap"><div class="empty"><div class="skel" style="width:180px;height:13px;"></div></div></div>
      </div>
    </div>

    <!-- ── Row 2: Recent checks + Top findings ── -->
    <div class="panels-row">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Recent Health Checks</span>
          <span class="panel-meta" id="checks-meta"></span>
        </div>
        <div id="checksWrap"><div class="empty"><div class="skel" style="width:200px;height:13px;"></div></div></div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Top Findings Across Fleet</span>
          <span class="panel-meta" id="findings-meta"></span>
        </div>
        <div id="findingsWrap"><div class="empty"><div class="skel" style="width:180px;height:13px;"></div></div></div>
      </div>
    </div>

  </div><!-- /.page -->

  <script src="/nav-component.js"></script>
  <script>
  (function () {
    'use strict';

    // ── Auth ──────────────────────────────────────────────────────────────────

    function authFetch(url, opts) {
      opts = opts || {};
      opts.credentials = 'include';
      return fetch(url, opts).then(function (r) {
        if (r.status === 401) {
          window.location.href = '/login?redirect=' + encodeURIComponent('/dashboard');
        }
        return r;
      });
    }

    async function initAuth() {
      try {
        const r = await fetch('/api/auth/me', { credentials: 'include' });
        if (r.status === 401) {
          window.location.href = '/login?redirect=' + encodeURIComponent('/dashboard');
          return;
        }
        const data = await r.json();
        const user = data.user || {};
        const name = user.name || (user.email ? user.email.split('@')[0] : null);
        const greet = greeting();
        document.getElementById('greeting').textContent =
          name ? greet + ', ' + name : greet + ' — Oracle fleet overview';
      } catch (_) {
        window.location.href = '/login?redirect=' + encodeURIComponent('/dashboard');
      }
    }

    // ── Helpers ───────────────────────────────────────────────────────────────

    function greeting() {
      const h = new Date().getHours();
      return h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
    }

    function relTime(iso) {
      if (!iso) return '—';
      const ms = Date.now() - new Date(iso).getTime();
      const m = Math.floor(ms / 60000);
      const h = Math.floor(m / 60);
      const d = Math.floor(h / 24);
      if (d > 0) return d + 'd ago';
      if (h > 0) return h + 'h ago';
      if (m > 0) return m + 'm ago';
      return 'just now';
    }

    function esc(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function scoreClass(n) {
      if (n == null) return 'dim';
      return n >= 85 ? 'good' : n >= 70 ? 'warn' : 'bad';
    }

    function statusDotClass(status) {
      if (status === 'ok')    return 'dot-green';
      if (status === 'amber') return 'dot-amber';
      if (status === 'red')   return 'dot-red';
      return 'dot-grey';
    }

    function envBadgeHtml(tag) {
      if (!tag) return '';
      const cls = { PROD:'prod', UAT:'uat', DEV:'dev', STG:'stg', TEST:'stg' }[tag] || 'stg';
      return ' <span class="badge badge-' + cls + '">' + esc(tag) + '</span>';
    }

    function formatCheckId(id) {
      if (!id) return 'Unknown finding';
      return id.replace(/_/g, ' ').replace(/\b\w/g, function (c) { return c.toUpperCase(); });
    }

    // ── Data state ────────────────────────────────────────────────────────────

    var _fleet = null;
    var _conns = null;
    var _hcs   = null;

    // ── Load ──────────────────────────────────────────────────────────────────

    async function loadDashboard() {
      try {
        const [fr, cr, hr] = await Promise.all([
          authFetch('/api/fleet/overview'),
          authFetch('/api/connections'),
          authFetch('/api/health-checks'),
        ]);

        const [fj, cj, hj] = await Promise.all([fr.json(), cr.json(), hr.json()]);

        _fleet = (fj && fj.connections) ? fj.connections.filter(function (c) { return !c.is_demo; }) : [];
        _conns = Array.isArray(cj) ? cj.filter(function (c) { return !c.removed_connection; }) : [];
        _hcs   = Array.isArray(hj) ? hj : [];

        render();

        var total = _conns.length;
        document.getElementById('topbar-sub').textContent =
          total + ' server' + (total !== 1 ? 's' : '') +
          ' · Refreshed ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      } catch (err) {
        console.error('Dashboard load error:', err);
        document.getElementById('topbar-sub').textContent = 'Failed to load — retrying in 30s…';
        setTimeout(loadDashboard, 30000);
      }
    }

    // ── Render all ────────────────────────────────────────────────────────────

    function render() {
      var fleet = _fleet || [];
      var conns = _conns || [];
      var hcs   = _hcs   || [];

      // Build maps
      var connById = {};
      conns.forEach(function (c) { connById[c.id] = c; });

      // Latest completed score per connection from health-checks history
      var scoreByConn = {};
      hcs.forEach(function (hc) {
        if (hc.connection_id && hc.status === 'completed' && !hc.is_demo &&
            scoreByConn[hc.connection_id] === undefined) {
          scoreByConn[hc.connection_id] = hc.overall_score;
        }
      });

      // Latest completed HC id per connection (used by fleet table + alert links)
      var latestHcById = {};
      hcs.forEach(function (hc) {
        if (hc.connection_id && hc.status === 'completed' && !hc.is_demo &&
            !latestHcById[hc.connection_id]) {
          latestHcById[hc.connection_id] = hc.id;
        }
      });

      renderMetrics(fleet, conns, scoreByConn);
      renderFleet(fleet, connById, scoreByConn, latestHcById);
      renderAlerts(fleet, latestHcById);
      renderChecks(hcs);
      renderFindings(fleet);
    }

    // ── Metric strip ──────────────────────────────────────────────────────────

    function renderMetrics(fleet, conns, scoreByConn) {
      // Fleet health: avg score of non-app connections with at least one completed check
      var scores = fleet
        .filter(function (f) {
          var c = connById(f.connection_id);
          return (!c || c.server_type !== 'apps') && scoreByConn[f.connection_id] !== undefined;
        })
        .map(function (f) { return scoreByConn[f.connection_id]; });

      var scoreEl = document.getElementById('m-score');
      var scoreSubEl = document.getElementById('m-score-sub');
      if (scores.length > 0) {
        var avg = Math.round(scores.reduce(function (a, b) { return a + b; }, 0) / scores.length);
        scoreEl.textContent = avg;
        scoreEl.className = 'metric-value ' + scoreClass(avg);
        scoreSubEl.textContent = 'avg across ' + scores.length + ' connection' + (scores.length !== 1 ? 's' : '');
      } else {
        scoreEl.innerHTML = '<span style="font-size:20px;color:var(--text-muted);">—</span>';
        scoreEl.className = 'metric-value';
        scoreSubEl.textContent = 'no checks run yet';
      }

      // Critical findings
      var totalRed   = fleet.reduce(function (s, f) { return s + (f.red_count   || 0); }, 0);
      var totalAmber = fleet.reduce(function (s, f) { return s + (f.amber_count || 0); }, 0);
      var critEl = document.getElementById('m-crit');
      critEl.textContent = totalRed;
      critEl.className = 'metric-value ' + (totalRed > 0 ? 'bad' : 'good');
      document.getElementById('m-crit-sub').textContent =
        totalAmber > 0 ? '+' + totalAmber + ' warning' + (totalAmber !== 1 ? 's' : '') : 'none this run';

      // Servers monitored
      var total     = conns.length;
      var dbCount   = conns.filter(function (c) { return c.server_type !== 'apps'; }).length;
      var appCount  = conns.filter(function (c) { return c.server_type === 'apps'; }).length;
      var ebsCount  = conns.filter(function (c) { return c.is_ebs || c.ebs_opt_in; }).length;
      var serverEl  = document.getElementById('m-servers');
      serverEl.textContent = total;
      serverEl.className = 'metric-value';
      var sub = '';
      if (appCount > 0) {
        sub = dbCount + ' DB · ' + appCount + ' App';
      } else if (ebsCount > 0) {
        sub = ebsCount + ' with EBS detected';
      } else {
        sub = 'Oracle DB connections';
      }
      document.getElementById('m-servers-sub').textContent = sub;

      // Last check
      var lastAt = fleet.map(function (f) { return f.last_check_at; }).filter(Boolean).sort().pop();
      var lastEl  = document.getElementById('m-last');
      var lastSub = document.getElementById('m-last-sub');
      if (lastAt) {
        lastEl.textContent = relTime(lastAt);
        lastEl.className = 'metric-value';
        lastSub.textContent = new Date(lastAt).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
      } else {
        lastEl.innerHTML = '<span style="font-size:18px;color:var(--text-muted);">—</span>';
        lastEl.className = 'metric-value';
        lastSub.textContent = 'no checks run yet';
      }
    }

    function connById(id) {
      return (_conns || []).find(function (c) { return c.id === id; }) || null;
    }

    // ── Fleet status table ────────────────────────────────────────────────────

    function renderFleet(fleet, connMap, scoreByConn, latestHcById) {
      var wrap = document.getElementById('fleetWrap');
      if (fleet.length === 0) {
        wrap.innerHTML = '<div class="empty"><div class="empty-icon">🔌</div>' +
          '<div>No servers connected yet.</div>' +
          '<a href="/connections/new">Add your first server →</a></div>';
        return;
      }

      // Severity-first sort: red → amber → ok → stale → never_run
      var order = { red: 0, amber: 1, ok: 2, stale: 3, never_run: 4 };
      var sorted = fleet.slice().sort(function (a, b) {
        return ((order[a.status] || 4) - (order[b.status] || 4)) ||
               (b.red_count - a.red_count);
      });

      var rows = sorted.map(function (f) {
        var c = connMap[f.connection_id] || {};
        var isApp = c.server_type === 'apps';
        var dotCls = statusDotClass(f.status);
        var score = scoreByConn[f.connection_id];

        // App servers link to connections page; DB servers link to latest report
        var nameHtml = esc(f.name);
        var reportId = latestHcById[f.connection_id];
        if (isApp) {
          nameHtml = '<a href="/connections">' + nameHtml + '</a>';
        } else if (reportId) {
          nameHtml = '<a href="/report/' + esc(reportId) + '">' + nameHtml + '</a>';
        }

        var typeBadge = f.ebs_detected
          ? '<span class="badge badge-ebs">EBS</span>'
          : '<span class="badge badge-db">DB</span>';

        var scoreTd;
        if (isApp) {
          scoreTd = '<td class="score dim">—</td>';
        } else if (score !== undefined && score !== null) {
          scoreTd = '<td class="score ' + scoreClass(score) + '">' + score + '</td>';
        } else {
          scoreTd = '<td class="score dim">—</td>';
        }

        return '<tr>' +
          '<td style="width:22px;padding-right:0;"><span class="dot ' + dotCls + '"></span></td>' +
          '<td>' + nameHtml + '</td>' +
          '<td style="width:130px;">' + typeBadge + envBadgeHtml(f.env_tag) + '</td>' +
          scoreTd +
          '<td style="color:var(--text-muted);font-size:12px;">' + relTime(f.last_check_at) + '</td>' +
          '</tr>';
      }).join('');

      wrap.innerHTML = '<table class="fleet-table">' +
        '<thead><tr>' +
        '<th style="width:22px;padding-right:0;"></th>' +
        '<th>Server</th><th>Type</th><th>Score</th><th>Last Check</th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
        '</table>';
    }

    // ── Active alerts ─────────────────────────────────────────────────────────

    function renderAlerts(fleet, latestHcById) {
      var wrap  = document.getElementById('alertsWrap');
      var total = document.getElementById('alert-total');

      var issues = fleet
        .filter(function (f) { return f.red_count > 0 || f.amber_count > 0; })
        .sort(function (a, b) { return (b.red_count - a.red_count) || (b.amber_count - a.amber_count); })
        .slice(0, 4);

      if (issues.length === 0) {
        total.textContent = '';
        wrap.innerHTML = '<div class="empty">' +
          '<div class="empty-icon" style="color:var(--green);">✓</div>' +
          '<div>No active critical or warning findings.</div></div>';
        return;
      }

      var grandTotal = fleet.reduce(function (s, f) { return s + (f.red_count || 0) + (f.amber_count || 0); }, 0);
      total.textContent = grandTotal + ' finding' + (grandTotal !== 1 ? 's' : '');

      wrap.innerHTML = issues.map(function (f) {
        var isCrit = f.red_count > 0;
        var iconCls = isCrit ? 'crit' : 'warn';
        var icon = isCrit ? '!' : '▲';
        var title = f.top_finding_title ? formatCheckId(f.top_finding_title) : 'Multiple findings';
        var countStr = '';
        if (f.red_count)   countStr += f.red_count   + ' critical';
        if (f.amber_count) countStr += (countStr ? ' · ' : '') + f.amber_count + ' warning';
        var reportId = latestHcById[f.connection_id];
        var href = reportId ? '/report/' + reportId : '/connections';

        return '<a class="alert-item" href="' + esc(href) + '">' +
          '<div class="alert-icon ' + iconCls + '">' + icon + '</div>' +
          '<div style="flex:1;min-width:0;">' +
          '<div class="alert-conn">' + esc(f.name) + '</div>' +
          '<div class="alert-title">' + esc(title) + '</div>' +
          '<div class="alert-counts">' + countStr + '</div>' +
          '</div></a>';
      }).join('');
    }

    // ── Recent health checks ──────────────────────────────────────────────────

    function renderChecks(hcs) {
      var wrap = document.getElementById('checksWrap');
      var meta = document.getElementById('checks-meta');

      var recent = hcs.filter(function (h) { return !h.is_demo; }).slice(0, 5);
      meta.textContent = hcs.filter(function (h) { return !h.is_demo; }).length + ' total';

      if (recent.length === 0) {
        wrap.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>' +
          '<div>No health checks run yet.</div>' +
          '<a href="/connections">Run your first check →</a></div>';
        return;
      }

      wrap.innerHTML = recent.map(function (hc) {
        var sc   = hc.overall_score;
        var done = hc.status === 'completed';
        var err  = hc.status === 'error';
        var ring = done
          ? (sc >= 85 ? 'good' : sc >= 70 ? 'warn' : 'bad')
          : err ? 'error' : 'pending';
        var label = done ? (sc != null ? sc : '—') : err ? '✕' : hc.status.slice(0, 4) + '…';

        return '<a class="check-item" href="/report/' + esc(hc.id) + '">' +
          '<div class="check-ring ' + ring + '">' + label + '</div>' +
          '<div class="check-name">' + esc(hc.connection_name || 'Unknown') + '</div>' +
          '<div class="check-time">' + relTime(hc.completed_at || hc.created_at) + '</div>' +
          '</a>';
      }).join('');
    }

    // ── Top findings across fleet ─────────────────────────────────────────────

    function renderFindings(fleet) {
      var wrap = document.getElementById('findingsWrap');
      var meta = document.getElementById('findings-meta');

      // Tally check_id occurrences across fleet, tracking worst severity
      var tally = {};
      fleet.forEach(function (f) {
        if (!f.top_finding_title) return;
        var key = f.top_finding_title;
        if (!tally[key]) tally[key] = { count: 0, sev: 'amber' };
        tally[key].count++;
        if (f.top_finding_severity === 'red' || f.top_finding_severity === 'critical') {
          tally[key].sev = 'red';
        }
      });

      var entries = Object.keys(tally).map(function (k) { return [k, tally[k]]; });
      entries.sort(function (a, b) {
        var sa = (a[1].sev === 'red') ? 0 : 1;
        var sb = (b[1].sev === 'red') ? 0 : 1;
        return sa !== sb ? sa - sb : b[1].count - a[1].count;
      });
      var top = entries.slice(0, 6);

      if (top.length === 0) {
        meta.textContent = '';
        wrap.innerHTML = '<div class="empty">' +
          '<div class="empty-icon" style="color:var(--green);">✓</div>' +
          '<div>No findings recorded across fleet.</div></div>';
        return;
      }

      meta.textContent = Object.keys(tally).length + ' unique';
      wrap.innerHTML = top.map(function (entry) {
        var id   = entry[0], info = entry[1];
        var dot  = info.sev === 'red' ? 'red' : 'amber';
        var srv  = info.count === 1 ? '1 server' : info.count + ' servers';
        return '<a class="finding-item" href="/fleet">' +
          '<div class="finding-dot ' + dot + '"></div>' +
          '<div class="finding-label">' + esc(formatCheckId(id)) + '</div>' +
          '<span class="finding-servers">' + srv + '</span>' +
          '</a>';
      }).join('');
    }

    // ── Boot ──────────────────────────────────────────────────────────────────

    if (window.tvNav && typeof window.tvNav.init === 'function') {
      window.tvNav.init('dashboard');
    }

    (async function () {
      await initAuth();
      await loadDashboard();
      setInterval(loadDashboard, 5 * 60 * 1000); // refresh every 5 min
    })();

  }());
  </script>
  <script src="/tunebot.js"></script>
</body>
</html>
