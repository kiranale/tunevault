name: Installer Smoke — post-deploy (live containers)

# Triggered after a successful Render deployment.
# Runs scripts/smoke-test-installer.sh against the LIVE API using real Docker containers
# (ubuntu:22.04 + oraclelinux:8) with systemd as PID 1 — the exact customer path.
#
# Unlike installer-smoke-test.yml (which uses --headless with no real API),
# this workflow proves the FULL path: install.sh → systemd → agent registers
# at tunevault-wney.polsia.app → heartbeat flows → Installer Health card turns green.
#
# Required GitHub Secrets:
#   SMOKE_ADMIN_TOKEN    — TuneVault session token for an admin account
#                          (used to call POST /api/admin/smoke-token)
#   SMOKE_REPORT_SECRET  — must match the SMOKE_REPORT_SECRET env var on Render
#                          (used to authenticate POST /api/admin/smoke-runs)
#
# On failure: dumps journalctl + container logs to the workflow log.
# Results are also written to /admin/agents → Installer Health card.

on:
  deployment_status:
    # Only run when Render reports the deployment succeeded
    # "success" is the deployment_status.state that Render emits

jobs:
  installer-smoke:
    name: Installer Smoke (ubuntu22 + ol8)
    # Only run on successful deployments to production
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    # Full live smoke can take up to 10 min (install + wait for registration + command)
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Docker is available
        run: docker info

      # Pull both container images in parallel before the script runs
      # so image-pull time doesn't count against the registration timeout.
      - name: Pre-pull container images
        run: |
          docker pull jrei/systemd-ubuntu:22.04 &
          docker pull oraclelinux:8 &
          wait
          echo "Images ready"

      - name: Run installer smoke test (ubuntu22 + ol8 in parallel)
        env:
          SMOKE_ADMIN_TOKEN:   ${{ secrets.SMOKE_ADMIN_TOKEN }}
          SMOKE_REPORT_SECRET: ${{ secrets.SMOKE_REPORT_SECRET }}
          API_URL:             https://tunevault-wney.polsia.app
          TRIGGER_SOURCE:      post_deploy
          RESULTS_DIR:         /tmp/smoke-results
          REGISTER_TIMEOUT:    "45"
          COMMAND_TIMEOUT:     "60"
        run: |
          bash scripts/smoke-test-installer.sh

      - name: Upload smoke-results.json on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-results-${{ github.run_id }}
          path: /tmp/smoke-results/
          retention-days: 14

      - name: Upload smoke-results.json always (for trend tracking)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-results-always-${{ github.run_id }}
          path: /tmp/smoke-results/smoke-results.json
          retention-days: 30
          if-no-files-found: ignore
