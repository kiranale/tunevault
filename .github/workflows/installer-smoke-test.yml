name: Installer Smoke Test

# Runs on every push to main and every PR that touches installer-related files.
# A broken install.sh that can't get drivers running → CI red, merge blocked.
#
# Strategy: run install.sh --headless in Docker containers for each target OS.
# --headless skips API provisioning + systemd, starts oracle-proxy.py directly,
# asserts /health returns 200 and probe_1 (driver import) passes.
#
# Target matrix: OracleLinux 7 (OEL7, Python 3.6), OracleLinux 8, Ubuntu 22.04.
# These cover the three most common Oracle DB server platforms.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'install.sh'
      - 'oracle-proxy.py'
      - 'uninstall.sh'

jobs:
  smoke-test:
    name: Smoke Test — ${{ matrix.os_label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # run all matrix cells even if one fails; see all broken platforms at once
      matrix:
        include:
          - image: oraclelinux:7
            os_label: OracleLinux 7 (Python 3.6)
            pkg_mgr: yum
          - image: oraclelinux:8
            os_label: OracleLinux 8
            pkg_mgr: dnf
          - image: ubuntu:22.04
            os_label: Ubuntu 22.04
            pkg_mgr: apt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Run the smoke test inside the target OS container.
      # We mount the repo into the container and run install.sh --headless.
      # The container runs as root (required by install.sh's root check).
      - name: Run installer smoke test in ${{ matrix.os_label }} container
        run: |
          docker run --rm \
            --privileged \
            -v "${{ github.workspace }}:/tunevault:ro" \
            -w /tunevault \
            "${{ matrix.image }}" \
            bash /tunevault/tests/e2e/installer-container-smoke.sh "${{ matrix.pkg_mgr }}"

  # This job blocks merge — required in branch protection settings.
  smoke-test-gate:
    name: Installer Smoke Test Gate
    runs-on: ubuntu-latest
    needs: smoke-test
    if: always()
    steps:
      - name: Check all matrix jobs passed
        run: |
          if [ "${{ needs.smoke-test.result }}" != "success" ]; then
            echo "One or more installer smoke test matrix jobs failed."
            echo "Result: ${{ needs.smoke-test.result }}"
            exit 1
          fi
          echo "All installer smoke tests passed."
